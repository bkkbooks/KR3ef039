body:
  text: 上集傷寒正名萬病莫逃於傷寒傷寒之祖斷推仲景而後人輒議仲景之書詳於風寒略於溫熱豫謂此非惟不知仲景並亦不知傷寒按仲景本素問及八十一難等書而作傷寒論考難經云傷寒有五一曰中風二曰傷寒三曰濕溫四曰溫病五曰熱病其所苦各不同形既曰傷寒有五則傷寒只屬病之總名而五者之中病又不專屬寒因若風若濕若溫若熱同隸傷寒有五條下仲景作書而以傷寒命名者義取諸此今從仲景原文反覆互勘其實仲景大法合之難經傷寒有五之例若合符契其法總從太陽病辨起如所云太陽病發熱汗出惡風脈緩者名為中風太陽病或已發熱或未發熱必惡寒體重嘔逆脈陰陽俱緊者名曰傷寒太陽病發熱而渴不惡寒者為溫病太陽病關節疼痛而煩脈沉而細者此名濕痹太陽中熱者暍是也其人汗出惡寒身熱而渴也以此分配難經傷寒有五之例界劃分明仲景傷寒論此傷寒字即難經傷寒有五之傷寒而傷寒類中專有一種太陽病或已發熱或未發熱必惡寒體重嘔逆脈陰陽俱緊者獨名之曰傷寒此外若風若濕若溫若熱同屬傷寒之類而各異其名欲識傷寒之病須先定傷寒之名語云名不正則言不順故豫急正其名以冠於篇首論王叔和仲景傷寒論本散亡之餘王叔和編輯成帙觀其序例云搜採舊論録其對病真方擬防世急此非仲景原本可知矣然則仲景之書賴叔和而傳叔和之名亦賴仲景而傳後之編次傷寒者不下數十家徒相爭於篇次之間紛如聚訟究之吾輩讀書苟能深明其義理奚必相爭於篇目獨其序例誠有可訾前明方中行僅從削去至國朝喻嘉言程郊倩始痛加貶駁雖立言未免過激然以余平心而論叔和傳書之功誠不可沒其序例之可議者內如所陳溫熱異氣拉雜不清至如以時論病以日分經與夫先汗後下之法實與本論多相矛盾反將仲景之圓機活法説成呆相豫非敢輕詆前賢乃沿此説者其禍至今而未有已故不得不為之辨辨在後篇闢泥四時論病之謬天有四時以布五運而分六氣人身應之則有六經以分主五行人在氣交之中果能奉若天道御氣調神則寒暑溫涼亦自循乎天地自然之令氣何至於病惟逆之而病生焉則言病當窮乎人事之變故仲景但就人身表裡腑臟上審其所犯者何證即知六氣中之病屬何氣六經中之病在何經因其證之異同而病名斯定焉其辨證之法如同一太陽病而以證之有汗無汗脈之浮緩浮緊分別風與寒又以口之渴與不渴分別風寒與溫同一渴而又以惡寒不惡寒分別溫與熱至於傳變之後或出表或入里剖晰毫芒隨證通變又施種種誤治救逆之法何等精細何等圓活今乃謂冬月中而即發者名為正傷寒春為溫夏為熱不惟仲景論中並無此語且如執是説則冬月中豈無患太陽病發熱而渴者乎夏月中豈無患太陽病惡寒無汗者乎將安所適從乎豈一時之中只許人生此一病不許更生他病乎此説實倡自叔和之序例而疑團至今未破故豫亟打破此機關為千百年來一掃魔障闢泥日數分經之謬子謂傷寒有五其辨證先從太陽病辨起而病正有不必盡從太陽起者且即從太陽起而亦有傳有不傳仲景以病靜者為不傳若傳胃者不復更傳即傳經之中亦不能泥定太陽之後必傳陽明有由太陽而徑傳少陽者有由太陽而徑傳三陰者有由太陽不傳陽明而傳太陽之府者且傳府之中有傳氣分者有傳血分者又有病不起於太陽由陽明而太陽者由少陽而太陽者更有直中陰經者有由陰而還返於陽者有陰陽分傳者有陽證似陰者有陰證似陽者種種變化更僕難數總不能以日數為拘只宜在表裡腑臟上探消息如一二日即見里證斷無發表之理五六日仍見表證斷無攻裡之理里證急於表證者先治其里後治其表表證急於里證者先治其表後治其里仲景論中朗若列眉能解此活變之法則先汗後下之邪説更不煩言而知其謬矣論陶節庵陶氏之學盛行於世久矣人謂仲景之學得陶節庵而始彰吾謂仲景之書得陶節庵而遂廢非苛論也節庵畢生精神致力於仲景傷寒論非不費一番苦功而卒為王叔和所掩故其論傷寒仍指為冬月正病以桂枝麻黃二方專為冬月正傷寒説法此外論溫論熱仍按節氣論病此仍沿序例之説而於傷寒開手辨證功夫尚未透徹至其六經分證牽入內經熱病法與仲景傷寒法一併砌入混同無別其論脈尤為可議仲景識病大法全憑脈證互參方能諦實病因論中辨脈平脈兩篇精微圓妙非寤寐神遊焉能窺其奧窔且其脈法之散見於六經篇中者更當隨證體認節庵乃謂但憑浮中沉三部及指下之有力無力分別表裡陰陽寒熱虛實殊不知此僅持脈之大綱惡足以盡病情之變而其尤悖謬者謂小柴胡湯可以通治溫疫時證見熱甚合解毒湯不須論脈此病定一七或二三七自然汗出身涼而愈信如此言更不必辨其何經何證並不必再辨浮中沉三部之脈並不必辨其脈之有力無力但用一小柴胡湯聽其延久自愈此説一開病之輕者延久始愈病之重者後救亦無及矣乃此書偏盛行於後世者皆由今人無不避難而趨易得如此簡便之法誰不樂從而節庵自序乃云後之同志但須熟玩此書不必集間方而觀別論是分明教人以不必復讀仲景書矣試思仲景妙蘊安能闡發得盡縱日諄諄教人以宜學仲景人猶畏難而思阻今如集中所輯方論即果搜剔無遺亦只拾糟粕而遺神髓何如汲汲直追仲景淵源語云取法乎上僅得乎中欲學傷寒舍仲景其誰與歸論吳又可吳又可撇開仲景而自作溫疫論則似非仲景之徒者而吾謂吳又可正深於仲景者也仲景於風傷衛寒傷營傷風兼寒傷寒兼風尚不許混同施治奚況溫病又可易麻黃桂枝成法於病之初起而立達原飲一方誠可補仲景之未備至其傳變之後仍恪遵仲景成法絲絲入扣非枕籍仲景者惡能解此但書以溫疫命名殊有未稱溫病之中有風溫有濕溫有新邪所傷有伏邪為病今論中所指三陽表證而兼胸膈痞悶心下脹滿或腹中痛或燥結便祕或熱結旁流或協熱下利或嘔吐噁心舌胎滿布如積粉而渴者此確是今之濕溫病又可之法允為至當喻嘉言謂濕溫即包疫而言命名之義當在乎此然此特溫病中之一而尚未該溫病之全至於疫字之義凡病長幼率相似者名曰疫疫毒之最厲者如大頭瘟蝦蟆瘟絞腸瘟軟腳瘟瓜瓤瘟疙瘩瘟種種危證呼吸死生另有治法非達原飲一方所能該括且不獨陽毒之病為疫即陰經之病亦能成疫試以近事徵之嘉慶年間民患咽瘡者多甚則下利此少陰證也道光之初民病霍亂者多甚則轉筋此厥陰證也皆疫也仲景論中具有成法依法治之率多痊可然則又可之書非不足以輔翊仲景豫謂當易其名曰濕溫論則名斯稱矣諸家編次門人問曰仲景傷寒論固非完書諸家編次各一是非當奉何為定本答曰此不能定並亦不必定者也仲景書當漢魏之交久已散佚脫不有叔和今日安能復睹其書叔和裒集舊論自以序例冠於篇首各篇之中亦間有增入仲景本論逼真漢文筆法叔和筆力去仲景奚啻天淵此就文義本屬可辨內如辨痙濕暍篇云傷寒所致太陽病痙濕暍三種宜應別論以為與傷寒相似故此見之此一段便是叔和集論發端語氣又如可吐可汗可下篇云大法春宜吐春夏宜發汗秋宜下此種斷非仲景話頭自喻嘉言而後叔和序例既加駁斥而各篇中叔和綴入之條諸家亦多有當作聖經詳加詮注者至於篇目序次則古本已亡又安能確指某條必在某條之下此豫所謂不能定者也然而不能定者篇目也其可定者理也法也欲讀是書先要使六經辨證之法分得開分得開則一經有一經之定證而不為旁議所撓可以識病體之常又要使六經辨證之法合得攏合得攏則此經有彼經之兼證而不為疑似所惑可以窮病情之變此條之脈證有與彼條互見者則當參酌以觀其通此家之注釋有與彼家不合者則當折衷以求其是夫如是不拘何人所注之傷寒論任彼節目之顛倒錯亂而以吾定識定力寤寐神遊則正可因其參伍錯綜而悟出仲景當日之圓機活法仲景之圓機活法既得而吾心之圓機活法自生矣特此詣難遽期之中智以下困勉之功惡可少哉司天運氣司天運氣仲景不言非忽也上古聖人欲通天之紀從地之理以調民之氣五運者即金木水火土運行之數六氣者即寒暑燥濕風火臨御之化因按十二辰紀歲以明其氣太陽寒水陽明燥金少陽相火太陰濕土少陰君火厥陰風木子午之歲上少陰火下陽明金丑未之歲上太陰土下太陽水寅申之歲上少陽相火下厥陰木卯酉之歲上陽明金下少陰火辰戌之歲上太陽水下太陰土巳亥之歲上厥陰木下少陽相火此天地之氣運行旋轉以是綰定上下分別司天在泉其次可按歲而紀然上下旋轉雖有定位而其中所乘之運又按歲上所臨之天干分別異運且六氣皆有左右間一歲之間分別循環作主此外又有天符歲會三命之不齊南政北政之易位與夫氣之勝與不勝脈之應與不應以及初終勝復氣至先後自非通天徹地參贊位育之聖人焉能知化窮神洞燭無間乃今人開口輒言司天運氣置一切精義於不講但言本年何氣司天是年之民當生何病此種耳食之談殊堪噴飯且必按司天運氣以言民病則歲不一氣民不一病轉使學者無著實下手工夫故仲景但就人身上三陰三陽諦實病因而天之五運六氣即已範圍於莫能外經云善言天者必有驗於人內經所言天人合一之學仲景所言盡人合天之學醫之有仲景猶儒之有孔子試觀四子書中所言皆日用倫常之事雖極參天地贊化育之功能總在倫常日用上做起端木子曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也此誠悟道之言也分別陰陽天地之陰陽數之可十推之可百數之可千推之可萬莫窺其始孰既其終其切於人身者則內經言人之陰陽則外為陽內為陰言人身之陰陽則背為陽腹為陰言人身之臟腑中陰陽則臟者為陰腑者為陽肝心脾肺腎五臟皆為陰膽胃大腸小腸膀胱三焦六腑皆為陽此言人身上分陰分陽之定位然有陰中之陽有陰中之陰有陽中之陽有陽中之陰若背為陽陽中之陽心也陽中之陰肺也腹為陰陰中之陰腎也陰中之陽肝也陰中之至陰脾也按五臟皆為陰而其表裡內外雌雄相輸應者仍不離陰陽互根之義由是則六腑概可推矣要之陰在內陽之守也陽在外陰之使也陰勝則陽病故陽病治陰陽勝則陰病故陰病治陽陽勝則熱陰勝則寒者病體之常也重寒則熱重熱則寒者病情之變也此軒岐之宗旨而仲景當日平脈辨證分別三陰三陽之治其大旨不越乎此然泛言陰陽無從把握其下手工夫先要在表裡臟腑上分別清楚仲景辨脈法有四語足以蔽之曰浮為在表沉為在裡數為在腑遲為在臟此大綱也從此悟入思過半矣十二經離合內經金匱真言論以肝心脾肺腎五臟為陰膽胃大腸小腸膀胱三焦六腑為陽至靈蘭祕典論以五臟六腑合膻中為十二官臟者為陰足太陰脾手太陰肺足少陰腎手少陰心足厥陰肝手厥陰膻中總之陰也者藏精而起亟者也腑者為陽足太陽膀胱手太陽小腸足陽明胃手陽明大腸足少陽膽手少陽三焦總之陽也者衛外而為固者也然陰陽必相維附故臟與腑相為表裡脾與胃為表裡同從土化也肺與大腸為表裡同從金化也腎與膀胱為表裡同從水化也肝與膽為表裡同從木化也心與小腸相表裡同從火化也膻中與三焦為表裡乃手少陰之別脈攝行君火者也此三陰三陽之定位至其離合之數則更合前後上下內外互為環抱三陽之離合太陽為開陽明為闔少陽為樞三陰之離合太陰為開厥陰為闔少陰為樞內經陰陽離合論可覆按也不觀陰陽之所以分無以識病體之常不觀陰陽之所以合無以達病情之變故善診者察色按脈分別陰陽陽病治陰陰病治陽定其血氣各守其鄉其旨遠矣察脈大法自王叔和脈經而後宋之崔嘉彥明之李時珍其脈訣皆盛行於世然皆繁瑣莫得其要領仲景脈法有最要一字訣曰緩仲景云陽脈浮大而濡陰脈浮大而濡陰脈與陽脈同等者此名曰緩緩則不疾不徐以周行於營衛之間無太過亦無不及因推及太過之脈則若衛氣盛名曰高營氣盛名曰章高章相搏名曰綱不及之脈則若衛氣弱名曰惵營氣弱名曰卑惵卑相搏名曰損此於緩脈外別著此二條以明有餘不足之脈態然遲與緩亦微有別緩則衛氣和遲則營氣和脈緩而遲剛柔相得此名曰強若緩遲相搏即名曰沉凡診本脈及病脈總以相得者為平脈相搏處認病脈此是仲景當日言下宗旨至於表裡腑臟固從浮沉遲數上看然合之高章卑惵互相體認則陰陽之間虛實判焉故以大浮數動滑列為陽脈沉澀弱弦微列為陰脈由是引伸觸類則若芤若革若牢之屬種種不一其名俱從相搏處分別脈狀以審病因更以呼吸按之則若代若結若促之類亦即從此推出後世脈訣皆宗此分門別類然此中參伍錯綜之妙具有徹上徹下徹表徹里工夫使非從仲景經文反覆討論一番惡能通其精微哉寸口脈論五臟六腑死生吉凶之法獨取決於寸口內經脈法以左寸屬心右寸屬肺而難經云寸口者脈之大會手太陰之脈動也手太陰肺之經也其獨責在肺者何也蓋以左寸屬心心為一身營氣之主右寸屬肺肺為一身衛氣之主此位之分寄者也然營衛之氣全賴穀氣以為輸布穀氣入胃以傳於肺五臟六腑皆以受氣其清者為營濁者為衛營行脈中衛行脈外營衛行陽二十五度行陰二十五度為一周五十度復會於手太陰人一呼一吸皆出於肺以此為呼吸之門而營衛之主實兩而一者也仲景於寸口脈先示以十六字金針曰浮為在表沉為在裡數為在腑遲為在臟夫以人身為論則背為陽腹為陰外為陽內為陰腑為陽臟為陰以脈象而論則寸為陽尺為陰浮為陽沉為陰數為陽遲為陰寸本屬陽而何以並得為藏陰之診故仲景復申言之曰假令脈遲故知在臟也由此觀之不特陽經之病宜取決於寸口即病之由陽入陰或直入陰經者寸口之診皆不容忽矣有此十六字以為大綱此外之相搏而成病脈者即從此引伸觸類以審病因之所在此在平日熟玩工夫趺陽少陰脈論寸口脈為一身營衛之主設非胃氣何以上輸津液而分布營衛趺陽者正陽也居中土為五行之母是持脈必以胃氣為本少陰屬腎腎為水臟與三焦合為一氣人身之真水真火根蒂於此水賴土製少陰必得趺陽鎮伏而後能交合三焦蒸布津液經曰少陰負趺陽者順也趺陽以候胃氣為中焦之主少陰以候腎氣為下焦之主實與寸口脈分配上中下三部按叔和脈訣以衝陽穴在足跗上五寸骨間動脈上去陷谷三寸者為趺陽之診然脈法未有按足之明文且本論明言脈有三部陰陽相乘又何以言寸口而不及關尺則知兩關主中焦脾胃之所司即趺陽之診兩尺主下焦腎之所司即少陰之診趺陽診在關以右統左少陰診在尺以左統右亦猶寸口脈之專主手太陰也欲明趺陽少陰之診還在三部內推詳脈分陰陽死生論門人問曰仲景云陰病見陽脈者生陽病見陰脈者死世遂謂仲景之書專主扶陽而抑陰然與答曰此陰陽二字只須就表裡虛實上講凡邪之中人在表為輕在裡為重出表為順入里為逆陰病見陽脈則里邪有出表之機故主生陽病見陰脈則表邪有陷里之勢故主死大浮動數滑五者為陽脈陽脈主表主實陰病見陽脈則正復而邪自退病雖重可生沉澀弱弦微五者為陰脈陰脈屬裡屬虛陽病見陰脈則正衰而邪孰御病雖輕亦死陽病本主生然見陰脈則生中伏有死機陰病本主死然見陰脈則死中具有生路兩見字即中庸莫見乎隱莫顯乎微之義臨病之工可不知戒懼乎至於扶陽抑陰乃是元明以來相沿之陋説易言一陰一陽之謂道陽統乎陰然而陽亢有悔陰承乎陽然而陰疑必戰故經云陰平陽祕精神乃治所謂病者悉由乎陰陽之偏也仲景治病諸法第就其陰陽之偏勝者劑其偏而病自已故有時陽氣亢極但用純陰之劑不雜一毫陽藥非毗於陰也育陰正以劑陽有時陰氣盛極但用純陽之劑不雜一毫陰藥非毗於陽也扶陽正以劑陰其有陰陽氣雖偏勝而尚未至於偏極者陽藥方中必少加陰藥以存津陰藥方中必少加陽藥以化氣雖有時寒熱互投補瀉兼進似乎處方之甚雜其實原乎陰陽互根之理劑其偏勝以協於中人受中以生聖人之道中道也後世聖道不明流為曲説因之丹溪有陰常不足陽常有餘之論景嶽闢丹溪而又為陽常不足陰常有餘之論則學者漫無適從而惑滋甚矣內經生氣通天論明言生之氣本於陰陽其論司天運氣治諸勝復之法則但曰寒者熱之熱者寒之溫者清之清者溫之無問其數以平為期是明言陰陽貴得其平矣仲景之學直接軒岐歷聖相傳之道不外一中偏陰偏陽總屬邪説讀仲景書當在中字上著眼仲景六經辨證與內經熱病論互異仲景六經辨證之法與內經不盡相合余嘗深思之而不得其解及讀程郊倩傷寒後條辨其貶駁叔和序例內有一段入理深談殊為可採內經云熱病者皆傷寒之類也著一類字見熱病特傷寒中之一類耳然類而不類亦不類而類蓋同此六經而病因之寒熱有不同如一日巨陽受之頭項痛腰脊強類也其不類者惡寒與不惡寒也二日陽明受之身熱目痛鼻乾不得眠類也其不類者傷寒入胃熱病不入胃入胃則不傳故也三日少陽受之胸脅痛而耳聾類也其不類者傷寒有往來寒熱熱病但有半里之熱而無半表之寒也傷寒三陰證有寒熱錯雜之不齊熱病則但有熱而無寒四日太陰受之則腹滿嗌乾全不類傷寒腹滿吐利食不下之太陰也五日少陰受之則口燥舌乾而渴雖類傷寒少陰負趺陽之一證而總不類傷寒脈微細但欲寐之少陰也六日厥陰受之則煩滿而囊縮在傷寒煩或有之而卻不類傷寒食不下下即吐蛔之厥陰也似此剖晰精詳可稱千古隻眼而吾更謂內經之言日數者使人知其常仲景之不言日數者欲人通其變學傷寒家先須打破此疑團於仲景法始有把握矣辨中風一仲景書以傷寒命名而首列中風內經云風者百病之始也清靜則肉腠閉拒雖有大風苛毒弗之能害是則中風之為病多由於腠理之疏而後風邪得以易襲故本論云太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之所言太陽中風之病狀皆就皮毛上形容邪本由外而入亟當驅之外出但腠理本疏又不可大發其汗故仲景桂枝湯之取義但主調和營衛以解肌表取其漐漐微似有汗不可令如水流漓方中芍藥甘棗主固營氣以托出衛邪使風邪不敢內入而外出然後桂枝合生薑得建驅邪之續今人不識此義改用一派風藥迫之使汗甚或加辛熱之藥擾動營血其不致召變逆而成危證者鮮矣醫者可不慎之於始歟辨中風二門人問曰金匱所稱中風歷節病與傷寒論中之中風何以異答曰傷寒例中之中風其病先犯太陽逗留於肌表之間治不如法傳變之後方始入里若金匱所指中風外不見頭痛發熱諸表證總因絡脈空虛賊邪不瀉正氣引邪喎僻不遂邪在於絡肌膚不仁邪在於經即重不勝此猶淺者也若邪入於腑即不識人邪入於臟舌即難言口吐涎則入之深矣同一風因而其間深淺緩急迥乎不同以金匱所指不從太陽病起不待傳變故不入傷寒之例辨中風三門人問曰世俗所稱傷風病又何以別之答曰此病頭痛惡寒發熱與傷寒例中之中風同以其咳嗽鼻塞涕自出是由皮毛以入於肺與鬲間痰飲相合並不傳變然人每視為尋常感冒病家醫家皆從忽略殊不知此病一經誤治久而不愈肺金立敗肺敗則腎水之子失蔭而腎亦與俱敗且本氣既傷日盜脾胃母氣以供其挹取久之而中土亦敗其始不覺其繼莫救者比比皆然徐靈胎曰傷風之疾由皮毛以入於肺肺為嬌臟寒熱皆所不宜太寒則邪氣凝而不出太熱則火爍金而動血太潤則生痰飲太燥則耗精液太泄則汗出而陽虛太澀則氣閉而邪結並有視為微疾不避風寒不慎飲食經年纍月病機日深或成血症或成肺痿或成哮喘或成怯弱誤治之害不可勝數至哉言也辨傷寒一仲景書以傷寒命名此傷寒乃外感病之統名也而傷寒類中專有一種太陽病或已發熱或未發熱必惡寒體重嘔逆脈陰陽俱緊者獨名之曰傷寒傷寒與中風同見頭項強痛惡寒之太陽病同一浮脈最易牽混最宜分別脈浮而緩汗自出者此屬風因脈浮而緊汗不出者此屬寒因風則傷衛寒則傷營營衛界限綦嚴絲毫不容錯認而叔和序例謂凡傷寒之病多從風寒得之風與寒尚混同無別奚況溫熱耶又謂冬時嚴寒中而即病者名曰傷寒無論仲景當日未有此説即指定冬時發者始為正傷寒設當嚴寒之時遇有頭痛發熱之太陽病或其人脈緩汗自出或但發熱不惡寒而渴者將概從仲景大發其汗之例其不誤人者幾希然則從時乎從證乎惑滋甚矣要之仲景之圓機活法初未嘗泥定四時言病但教人從平脈辨證上認取太陽病無論已未發熱必惡寒體重嘔逆脈陰陽俱緊者即此便是真正寒傷營病似此辨得真確自不得以風混寒並不至以熱亂寒矣辨傷寒二傷寒病有同一發熱其邪不在太陽而直入陰經者按三陰經中惟少陰一經最易與太陽病牽混以太陽膀胱與少陰腎一臟一腑相為表裡其在陰精素虛之人寒邪不俟由表傳經徑從膀胱之腑襲入腎臟者有之矣故仲景於大青龍湯一證傷寒脈浮緩身不疼但重乍有輕時必辨其無少陰證方豫以大發其汗若誤施之少陰病則腎中真陽隨汗飛騰可不慎歟太陽傷寒其脈浮緊或兼風因間有浮緩若少陰病其脈必沉而微細仲景於少陰病始得之反發熱脈沉者特有麻黃附子細辛湯之制蓋必以附子鎮攝腎中真陽而後麻黃細辛始得引少陰之邪驅之出表其有寒邪初犯太陽以次傳經漸入三陰者又多寒熱錯雜之證不必盡屬寒因更有種種救逆諸法或徑從里解或還從表解隨證施治又各不同矣若寒邪直入三陰絶不見一毫表證者其證或吐利或厥冷或煩躁種種危候死生之機只爭俄頃則當急用回陽猛劑直破重扃收復真陽迅掃陰霾稍緩須臾即屬不救仲景大法森森俱列誰謂傷寒之病可概從表散哉辨溫病一溫病之於風寒在太陽病初起時已自不同仲景於傷寒中風而外明揭出太陽病發熱而渴不惡寒者為溫病太陽中風嗇嗇惡寒翕翕發熱太陽傷寒或已發熱或未發熱必惡寒太陽溫病但發熱不惡寒而其辨證最要之訣又全在渴之一字蓋風寒之邪由外而入必待傳變后里熱熾盛方始口渴若溫病初起便渴此在太陽病時早與裡熱相合消爍津液不即善治真陰之亡可立而待且風寒之病或微汗或大汗或戰汗病隨汗解溫病雖汗不解若汗出熱不退而脈反躁盛者內經即決為死證陰精亡故也故凡治溫病者當以陰精為至寶此自軒岐以來一脈相傳之宗旨仲景既揭明溫病苦無專方後人以意造方思補仲景之缺究未可為典要以豫度之仲景於中風病以風為陽邪衛氣易泄尚不取大發其汗則溫病之不宜發汗此理斷然莫易內經云溫者清之意者當以清裡為主而微兼解肌可乎辨溫病二仲景既言太陽病發熱而渴不惡寒為溫病更剔出風溫之為病而特申發汗之禁是有二説焉溫邪內發誤責其汗衛氣既疏風邪又襲兩陽相合身反灼熱此一説也溫邪內伏少陰既病腎精不藏內風易動由里出表汗出之後身乃灼熱此又一説也二説可以並存而其不宜發汗則一也余按溫之為病本有新邪伏邪之不同新邪者內熱本郁適與時令之溫邪相感召身乃灼熱此病之兼內外因者伏邪者陰分自病風自內生雖見表熱其病全屬內因而絶不關外因若發汗後而身反灼熱者不惟陽脈本浮即陰津與汗俱泄陰脈亦浮故脈陰陽俱浮若自汗出身重多眠睡息必鼾語言難出何一非津傷之象更逆之以誤下則陰虛重泄其陰逆之以誤火則陽亢益擾其陽一誤再誤不至促命期不止仲景禁例如此森嚴能知其所禁而治法可微會矣然則治溫病者亦當於未發汗之前詳審病因慎勿誤治焉可矣辨溫病三門人問曰內經言冬傷於寒春必病溫又言冬不藏精春必病溫仲景但言溫病並未指明春溫溫病果專屬春時發乎答曰冬三月此謂閉臟古聖人順冬氣以養臟使志若伏若匿若有私意若已有得去寒就溫無泄皮膚使氣亟奪此養臟之道預為來春奉生地步故月令先王以至日閉關商旅不行後不省方誠慎之也冬傷於寒者以無固密居室之功致泄皮膚而寒氣內薄然當其時不即病感春月之溫氣始發肌膚乃陽明胃經之所主寒毒藏於肌膚陽明經中久郁之邪一旦發出而外達於太陽是由陽明而太陽不盡由太陽而陽明少陽故與風寒之邪由表入里者治法不同然此猶病溫之輕者若冬不藏精之溫病則更不守閉臟之令數犯房室其人腎水先虧一遇溫邪感觸乘虛直入遂有勃然不可御之勢此邪往往直入少陰更不得以太陽論治大凡冬傷於寒之溫病病在太陽即當急存胃中之津液冬不藏精之溫病病入少陰尤當急顧腎中之津液至謂病溫必在春時則四時之中非其時有其氣者當亦不免即如內經言秋傷於濕冬生咳嗽豈咳嗽必在冬時耶故仲景大法斷不泥四時言病也辨溫病四門人問曰有病溫而反宜用溫藥愈者何也答曰此正仲景所指伏氣之為病仲景云伏氣之病當須脈之若脈微弱者當喉中痛似傷非喉痹也病人云實喉中痛雖爾今復欲下利按喉痹一證多由溫邪鬱結三陽宜按陽經論治今咽中雖痛似傷而非真傷又脈見微弱則病不在太陽陽明而在少陰冬不藏精之人少陰腎臟先已自病少陰之脈夾咽故為咽痛陽僭於上陰亦無以自固故雖咽痛熱必復作下利咽痛復下利此為少陰證若誤作喉痹而以陽經論治亡可立待矣更有身體灼熱絶似陽經表證而脈見微弱且多雜以少陰證者是內挾真寒外顯假熱誤進寒涼即速其斃凡此皆當急溫之證仲景大法森森俱列同一病溫而陰陽寒熱判然不同藉非脈法辨別真確毫釐千里幾何不為疑似所惑哉辨濕溫一仲景論濕病未嘗明言濕溫然濕溫之病狀可即仲景論中比類得之王叔和於仲景傷寒論剔出痙濕暍三種以為宜應別論其於濕病首列濕痹即從太陽辨證曰太陽病關節疼痛而煩脈沉而細者此名濕痹則是濕證中同有頭項強痛惡寒之太陽病其類於傷寒者以此然濕痹之病其人小便不利大便反快故當利小便使濕邪從太陽之腑而解是濕也而不必其兼溫也又云濕家之為病一身盡疼發熱身色如似熏黃此又示人以諦實濕病之法然濕病多端亦不必盡屬兼溫因思仲景已分明揭出太陽病發熱而渴不惡寒者為溫病以所言種種濕證與此條之溫病互勘則濕溫之病狀可得而言矣濕溫初起所見之太陽病頭痛腰痛骨節煩痛與太陽傷寒同以濕病本主身疼也發熱汗出惡風與太陽中風同以溫邪本易汗出也但風寒之邪由表入里濕溫之邪由里出表故當太陽病初起時其蒸郁之氣即已彌布三焦故或往來寒熱胸膈痞滿嘔吐不欲食或腹中痛不大便或下利稀臭水表裡之病往往一時並見以上各證不必悉具必兼口渴舌上胎者此屬濕溫之定證又濕病脈多沉細濕既兼溫脈不盡沉溫病脈浮溫復挾濕其脈又不盡浮不浮不沉之間其中候必數以數之甚與不甚別邪之輕重病之緩急合此脈證互參始知仲景不言濕溫而濕溫之脈證在其中濕溫之治法即在其中矣讀仲景書當知比類不知比類即風寒之顯然者尚且目眩奚況濕溫哉辨濕溫二門人問曰夫子本仲景法而言濕溫之為病既可比類以通其義矣然仲景言濕病曰風濕曰寒濕此顯然可稽者不識治法可與濕溫相通否答曰此同一濕病而治法判然不同今且與子先論風濕仲景言風濕相搏一身盡疼痛其稍輕者身體煩疼不能自轉側重則骨節煩疼掣痛不得屈伸近則痛劇或身微腫甚至汗出短氣小便不利惡風不欲去衣此其證雖有輕重不同總由風濕中入關節浸淫於皮膚筋骨之間並無里邪故仲景於風濕相搏證特著出不嘔不渴四字以明與濕溫有別風濕相搏之證法當汗出而愈但大發其汗風氣去濕氣在只取微微似欲汗出者此為風濕俱去閲仲景方主用術以理脾勝濕更藉附子之大力迅走衛外追風逐濕絶不雜一毫風藥自得微汗而解此與中風病之主用桂枝必賴芍藥甘棗和營分以托出衛邪者同義設以此等劑而誤施之既渴且嘔之濕溫病不立速其斃者幾希又濕家之為病身色如似熏黃發黃之證不惟濕熱已也寒濕在裡亦能發黃仲景有不可下之戒以其別於濕溫病也而曰當從寒濕中求之則當以溫藥祛寒勝濕不言可知矣子欲知濕溫當知濕證中又各有表裡寒溫之不同能辨於其似則濕溫之真面目始見欲知濕溫之別於風濕寒濕當先審其口之渴與不渴在他證皆可或有或無斷未有溫邪內伏而口不渴者此要訣也辨濕溫三門人問曰仲景言太陽病發熱而渴不惡寒者為溫病濕症兼溫以渴辨證矣然太陽中暍其初起亦汗出而渴與濕溫之渴又何以別之答曰此當以舌上胎為辨凡熱邪之在經者口雖渴舌上無胎且渴能引飲濕溫之病陽明胃腑先為濕困內伏之溫邪被濕邪郁遏不能遽出於陽經故當濕溫病初起之時雖渴不能引飲必待傳變之後邪入於胃而成陽明可攻之證方大渴引飲故仲景云濕家病舌上如胎者以丹田有熱胸中有寒渴欲飲水而不得飲則口燥煩也此一段文字雖未明言濕溫恰確是濕溫初起之候仲景於此證雖有下早則噦之禁若邪已入胃大渴引飲而成陽明可攻之證則此時下不宜遲又仲景言外之意矣而謂仲景書中無從窺濕溫真面目者彼其人實未窺仲景藩籬惡足與言治病哉辨濕溫四門人問曰夫子本仲景法而勘破濕溫之源流可謂詳且盡矣究之主治若何願並明之答曰欲知其治當先明其禁豫從仲景書推廣其義按仲景言濕家不可發汗又溫病不宜發汗若見頭痛發熱之太陽病而妄發其汗卒之汗出熱不退且津液內奪里邪愈錮變證蜂起此首禁也濕溫病一經傳胃便當急下以存陰切不可誤信後人下不厭遲之謬説若當初起之時全是一團蒸郁之氣未傳到胃遽豫妄下轉致壅遏胃氣無由輸邪外泄此二禁也燥能勝濕此理之常今濕邪又兼溫邪若純用香燥破氣立致劫津化熱此三禁也溫者清之亦理之常今溫邪又兼濕邪若純用寒涼直折轉致助濕壅邪此四禁也濕痹之病可利小便若兼溫邪全藉內中津液足勝病氣病雖劇可治若用苓澤等滲泄之劑強責其小便則有著之邪安能從膀胱宣泄一經傳變內外灼熱真陰隨涸此五禁也溫邪內伏與濕交蒸熱淫之氣上蒙清竊往往病起即見昏譫但當逐去其邪則神識自清若遽指為熱入心營遂豫犀角牛黃之屬是謂誅伐無過究之膈間之邪分毫不動徒擾營血反致引邪深入立召斑狂喘厥諸變此六禁也凡此皆濕溫病初起之禁例至於傳變之後仍當按仲景種種救逆諸法分別施治然則初起之時汗之不可下之又不可燥之不可清之又不可利之不可開之又不可果何從著手耶則惟化濕之中佐以清溫其庶幾乎辨濕溫五門人又問曰夫子向言吳又可溫疫論其所列溫疫各證即今之濕溫病今言濕溫初起治法但當於化濕之中佐以清溫則吳氏達原飲當必有合而今人每訾吳氏為偏於用下夫子亦言濕溫初起不宜妄下若吳氏之書其不能無弊與答曰吳又可覷破此等證與風寒之邪由外而入者不同其所定達原飲一方厚朴檳榔草果破結以化濕知母黃芩芍藥甘草和陰以清溫當時服之者稱為仙方然吳氏目此病為溫疫指為異氣所致未嘗明言濕溫至喻嘉言辨明溫疫謂濕溫即包疫而言今以吳氏所列種種各證與今病相參始知其所指溫疫即今之濕溫病此則無心暗合至於傳變之後仍不離仲景種種救逆諸法故吾謂吳氏立論雖似撇開仲景反足為仲景之功臣至濕家病仲景本有下早之禁而吳氏亦有邪未入胃不宜妄下之戒若入胃之後不豫以急下大下則津液立涸且風寒之邪傳入陽明而成胃實可攻之證一下即解濕溫系黏著之邪多有下之未盡仍須再下者此實病機之使然而不得議其偏於用下也倘不傳入胃便不得妄下凡風寒之種種傳變濕溫病皆得有之並有轉屬寒證宜用溫藥而愈者此又吳氏論中之所未及亟當從仲景追尋淵源矣辨熱病一劉河間闡發素問元機敘熱病凡三十有三證此泛言熱因之病機而傷寒例中所稱之熱病卻不繫此此亦猶傷寒例中之中風不與金匱中風歷節病一例看者同義凡風寒之病一經傳變之後大率轉成熱證其最難辨者莫如太陽病初起時此傷寒例中之熱病卻要在初見頭痛項強惡寒發熱之太陽病時辨起按仲景云太陽中熱者暍是也其人汗出惡寒身熱而渴也仲景分明指此為暍病則合之內經熱病論所云先夏至日為病溫後夏至日為病暑者即從此例矣同一太陽病溫病渴而不惡寒熱病渴而惡寒中風汗出而不渴熱病汗出而渴傷寒不渴而惡寒無汗熱病汗出惡寒而渴仲景辨證如此明確其主治不與風寒溫濕同法又可推矣蓋熱則傷寒故反惡寒熱則耗津故見口渴至於汗出身熱罔非陽邪怫鬱之狀金匱明設人參白虎湯之制取其益氣生津滌除煩熱此又顯示人以可循之矩矱後世之用六一散即祖此意設遇此等病而妄行解肌發汗其不致貽誤者幾希誰謂同一頭項強痛惡寒之太陽病而可不辨之於微哉辨熱病二問曰病熱而反惡寒者何也答曰此義內經明言之經云惡寒戰栗者皆屬於熱又云禁栗如喪神守皆屬於火故河間云病熱甚而反覺其寒此為病熱實非寒也夫火鬱於內逼陰向外陽盛拒陰往往見外寒之證且惡寒而渴自與中風傷寒之惡寒不同但當直徹其熱則惡寒之表證自罷又難經云熱病之脈陰陽俱浮浮之而滑沉之散澀此病機之常然以今人當夏月盛暑或坐臥當風或恣啖生冷內熱被外寒所束熱益鬱而不得泄因反病熱故仲景於太陽中暍別出脈弦細芤遲脈微弱兩條以盡病情之變此又仲景當日之圓機活法以牖後人臨症之靈心善悟遇此等證便不宜用寒涼直折後賢治夏月暑病有用大順散香薷飲者正自此義且內經云人傷於寒則為病熱正惟熱病中亦見頭項強痛惡寒之太陽病故得類於傷寒之例夫上古聖人夏三月養長之道夜臥早起無厭於日使氣得泄若所受在外熱固欲其外泄不欲其內壅也旨深哉太陽問答一問曰何以識為太陽病答曰太陽之為病脈浮頭項強痛而惡寒凡論中所稱為太陽病者即指此脈此證而言假如病家云苦頭項強痛惡寒診之脈浮此即太陽病便當察其身熱之微與甚視其有汗無汗若身熱汗自出脈浮而緩者此太陽中風證或未發熱或已發熱無汗而喘脈浮而緊者此太陽傷寒證又如病家云苦頭項強痛發熱問之不惡寒反渴者此屬溫病若視之舌上胎一身盡疼身色如似熏黃者此屬濕溫又如病家云苦頭項強痛惡寒視之汗出身熱而渴者此屬熱病凡此五者乃太陽病初起平脈辨證之大綱然又有傷風兼寒傷寒兼風或風兼溫或風兼濕或寒兼濕或風兼熱甚或寒熱錯雜皆從此定證定脈參伍錯綜以觀其通太陽一經乃傷寒家開手工夫能從此處諦實病因則投劑悉中肯綮手到病除更無傳變之足言矣學傷寒家首宜識此太陽問答二問曰太陽病主頭項強痛惡寒者何義答曰太陽之脈起於目內眥上額交顛從顛入絡腦還出別下項連風腑循肩膊內俠脊抵腰中故頭項強痛惡寒是太陽病必有之證仲景特挈此為提綱此外或已發熱或未發熱或體重腰痛或自汗或無汗皆太陽病中或然或不然之證故但散見於諸條而不入提綱之內至溫病之不惡寒者以溫病由里而出表雖見太陽病其病因本不關太陽故微有別按內經云巨陽者諸陽之屬其脈連於風腑故為諸陽主氣夫手太陽小腸為受盛之官足太陽膀胱為州都之官小腸受盛之物全藉膀胱氣化而始能出此氣字即巨陽為諸陽主氣之氣膀胱小腸位居腹下當至陰之地內經謂太陽根起於至陰結於命門心與小腸同資火化設膻中之使道絶而肺之治節不行何以下注膀胱而輸津液心主營肺主衛太陽一經統司營衛故為諸陽主氣而冠六經之首謂太陽主表義系諸此自後世注傷寒家專責太陽膀胱經遂有傳足不傳手之謬説又謂太陽為寒水之氣以寒召寒故有傷寒之名亦未免失之穿鑿但從營衛上討消息則於太陽病已思過半矣太陽問答三問曰太陽病不解即傳入陽明乎答曰此不盡然仲景云傷寒一日太陽受之脈若靜者為不傳頗欲吐若燥煩脈數急者為傳也傷寒二三日陽明少陽證不見者為不傳也可見病之輕者不傳即病之重者治之如法亦不必盡傳其必欲傳者亦不必盡傳陽明有本經自傳而從太陽之經轉入太陽之腑者此謂犯本太陽病由經入腑其中又有氣血之殊熱傷膀胱氣分則為蓄水熱傷膀胱血分則為蓄血蓄水之證利其水則愈蓄血之證下其血則愈蓋邪既入腑即從腑解治仍不離乎太陽也至於誤治之後種種變逆亦非一致尤當按證分別施治設拘於一日太陽二日陽明之説使當其時陽明之脈證不見亦可從陽明論治乎故夫泥日數以分經者其貽誤必不少也太陽問答四問曰凡病傷寒其傳為熱而有反寒者何也答曰太陽病誤治致逆救逆之法當分水火為二大綱足太陽膀胱與足少陰腎為表裡手太陽小腸與手少陰心為表裡脈法以左尺屬水為元陰之根坎象也右尺屬火為元陽之根離象也太陽寒水之氣全資火化第心君之火寂然不動賴膻中為臣使之官下合三焦以生趺陽而伏少陰方合坎離既濟之妙太陽主表病本當從表解但解表之中須相其人之津液夫此所謂津液者水火合化而陰陽互為其根者也太陽病治不如法陽虛則陰盛而水邪致逆陰虛則陽盛而火邪致逆水邪之為病水入即吐甚則心下支滿腹中雷鳴又其甚者氣從少腹上衝心或臍下悸欲作奔豚若此之類皆以陽微而致水逆火邪之為病其人腰以下必重而痹或圊血或大渴引飲甚則譫語又其甚者手足躁擾捻衣摸床若此之類皆以劫陰而致火逆水盛則火就滅急當扶陽以制水火盛則水立涸急當瀉火以存陰此在太陽病誤治之後其傳變便有水火寒熱之不同正不必盡傳為熱又況誤汗誤下之後或大汗出筋惕肉瞤或下利不止此亡陽之候以大劑參附駟馬追之猶虞不及此尤當急溫者矣若謂某日當在某經而計日以定汗下豈理也哉太陽問答五問曰太陽誤汗其變有別否答曰最危者誤發少陰汗仲景於大青龍湯證必辨無少陰證相雜者方可大發其汗蓋太陽與少陰相表裡少陰病亦有發熱身重之證然脈微細但欲寐便與太陽病不同若誤認為太陽病而大發其汗則腎中真氣與汗俱泄以致筋惕肉瞤真陽之亡可立而待又有太陽病本宜汗解或其人陽氣素虛不相其人之津液妄豫大發其汗亦足召亡陽之變更有發汗後衛陽已虛外風又襲此屬漏風其人惡風小便難四肢微急難已屈伸其證與亡陽微有別皆當以回陽為急者也若發汗之後津液被劫真陰受戕其人大渴引飲不大便甚則譫語口乾咽爛手足躁擾甚則熱深厥逆此真陰將涸之候但看陰液尚有一線未亡可施灌溉之力若陰已涸者救亦無及要之陽亡之候其死速急回其陽而取效轉易陰亡之候其死遲急顧其陰而取效反難果當太陽病初起時治之如法何遽至此哉乃知今人妄稱傷寒不察其人之病因不顧其人之津液謂病在太陽概從汗散者誠操刃之事也太陽問答六問曰誤下若何答曰太陽病誤下後若作協熱利者法當挽下陷之邪仍從太陽之表而解若中土陷者以理中為急若下元憊者以固下為急若下利清穀不止者急溫其里非四逆湯不救此皆真陽將隨下利而亡挽回陽氣不容稍稽時日若熱邪在表因誤下之故致表邪陷入搏聚於心胸因有為痞為結之變仲景云病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞治心下痞仲景有諸瀉心法治結胸仲景有大小陷胸法各因其勢之輕重緩急分別救療其法絲絲入扣不容分毫假借宜熟玩也今人於太陽病下法亦不敢輕試然但屏去硝黃以為慎下至一切香燥導氣之品最耗散正氣者反恣行無忌致釀成種種變逆我見甚多矣夫豈必待用硝黃而後為妄下哉太陽問答七問曰誤火者其變亦有別否答曰太陽病脈浮者當以汗解汗者心之液心主營必使營與衛和則汗出津津而解若以火迫汗火氣內攻營氣受灼故或圊血或發黃或譫語甚至口乾舌爛骨焦筋傷種種皆亡陰之象此證之易辨者又有其人心陽素虛一遇火灼心陽隨之外越以致驚狂臥起不安者亟亟挽飛越之陽神間有可救然亦危矣同屬誤火其變證亦有亡陰亡陽之別誤火之弊今人亦不敢妄試然當太陽病時習用辛熱迫汗者其弊與誤火等可不慎哉陽明問答一問曰何以識為陽明病答曰陽明之為病胃家實是也然泛言胃實恰從何處辨證而知陽明之為病此其間亦有經府之別發熱汗自出不惡寒反惡熱甚則舌上乾燥而煩渴欲飲水者此是陽明經證若潮熱不大便譫語腹滿痛者此屬陽明府證傳經之邪在經則傳入府則不傳故曰陽明居中土也萬物所歸無所復傳惟有亟從下奪而解其欲作經者陽明一經來路自太陽去路自少陽其太陽證未罷而陽明證已見者亟當從太陽領出其邪以斷陽明從入之路若陽明證具而少陽證未見者當直折本經散漫之熱使胃中津液和而愈以斷陽明從出之路若陽明證未罷而少陽證已見者又當亟從少陽和解之法即以斷從少陽轉入三陰之路此傳經之邪亟當相其人胃中之津液前後照顧預防變逆不必盡屬可攻之證至既入於府無所復傳不豫亟攻津液隨竭則惟當急下以存陰更不必有所瞻顧欲識陽明病先要在經府上辨明真確而或謂病在陽明概從清涼攻下者此非法也陽明問答二問曰太陽病傳入陽明其狀何若答曰太陽之為病頭項強痛而惡寒其後惡寒將自罷濈濈然微汗出此欲傳陽明之候汗出潮熱不惡寒反惡熱則陽明之外證悉具矣然陽明病從太陽傳入必審太陽病全罷方可從陽明論治若陽明證已見而太陽證未罷者治當仍從太陽而不從陽明故仲景於太陽初入陽明之候特挈出兩條謂陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯陽明病脈浮無汗而喘者發汗則愈宜麻黃湯蓋風寒之邪由表而入里此將入未入之界當逆挽其邪使仍從太陽而解至溫病初起即不惡寒熱病初起即汗出而渴此在太陽病時陽明證同時並見更當急顧陽明之津液不與風寒同法此又仲景言外之意可從無字句處悟入故凡讀仲景書既從有字句處知其定法又當從無字句處參其活法則庶幾其可進於道乎陽明問答三問曰陽明經病可解表乎答曰陽明為水穀之海輸布津液外主肌肉無津液何由得汗汗過多即傷津液陽明病本自汗出汗雖出熱仍不解正當急存胃中之津液豈有再行發汗之理今人誤以葛根湯為陽明表藥殊不知仲景葛根湯之制以麻桂合葛根仍屬太陽與陽明同治不得執是方以治陽明經熱若潮熱汗出大渴引飲此陽明證悉具而太陽證全罷亟當顧陽明之津液以除渴而滌熱設誤發其汗則津液隨竭至入府之候其宜下不宜汗更不必言矣仲景於太陽中風太陽傷寒宜發汗之證尚慎重不敢過發其汗正以胃中津液為重也風寒如此奚況溫熱哉太陽如此奚況陽明哉陽明問答四問曰陽明府病攻之宜矣然不大便豈皆屬陽明病乎答曰不大便不必盡屬陽明病陽明病亦不必悉皆不大便按脈法云脈有陰結陽結者何以別之曰其脈浮而數能食不大便者此為實名曰陽結也其脈沉而遲不能食身體重大便反硬名曰陰結也即此可見不大便之病因內有陰結陽結之不同不必盡屬陽明可攻之證又仲景於陽明病提綱既揭明云陽明之為病胃家實是也又云有太陽陽明有正陽陽明有少陽陽明太陽陽明者脾約是也正陽陽明者胃家實是也少陽陽明者發汗利小便已胃中燥煩實大便難是也此在仲景恐人誤以陽明病概屬胃實可攻之證故於陽明之來路去路別出太陽少陽兩條以示下法不宜孟浪之意必於陽明病發熱汗多不大便腹滿痛或繞臍痛煩躁譫語者此當急下之證然或大便乍難乍易喘冒不能臥或自利清水色純青心下痛口乾燥者亦宜急下之證由此觀之則所謂陽明之為病胃家實者更不得泥定不大便矣不此之察或不應下而下或應下而反失下其弊正相等安得呆執下法以治陽明府病哉陽明問答五問曰陽明病其傳入之路皆從太陽乎答曰不然太陽病不解潮熱汗自出不惡寒反惡熱者此太陽傳入陽明之候然溫熱之病汗出而渴其初起多由陽明而太陽者已不侔矣更有太陽病甫傳陽明只在於經腹中矢未定成硬慎不可攻久之矢定硬乃可攻之此邪由經入府此謂本經自相傳又少陽病服柴胡湯已渴者屬陽明也此少陽亦有轉屬陽明之候此在三陽經中其傳入之路已別然猶顯而易辨者至三陰經病多有寒熱錯雜之證若熱邪之傳入三陰者亦有從陽明下奪之法如太陰病之大實痛宜取桂枝大黃微利以約脾陰少陰病之口燥咽乾當用大承氣急下以救腎水至厥陰病熱深厥深之後下利譫語者亦主有燥矢則可見三陰經病亦有還返陽明者故曰陽明居中土萬物所歸一入陽明之府則邪自無所復傳惟有下奪而解然則陽明病之來路種種不齊於何辨之亦先辨之於經與府而已矣經與府之辨亦辨之於脈與證而已矣而益信計日以定經者誠謬説也陽明問答六問曰陽明病有寒證否答曰胃為水穀之海胃中實熱者胃陰就涸當存胃陰為急胃中虛冷者胃陽將憊當顧胃陽為急凡熱入胃而成可攻之證者其攻法當在不先不後之界攻之太早誅伐無過徒傷胃氣攻之太遲坐延時日劫盡胃液仲景於陽明病既臚列種種當急下之證復別出種種不可攻之戒誠以胃中虛冷者水穀不別則欲作固瘕若不能食者攻其熱必噦又食谷欲嘔者更當急溫其胃此中寒熱殊因絲毫不容假借然而疑似之間尤當細辨即以嘔證論若太陽之惡寒嘔逆少陽之心煩喜嘔便與陽明之食谷欲嘔者不同且同屬食谷欲嘔之一證若豫吳茱萸湯而反劇者則又屬熱格上焦之證又陽明病誤攻其熱必噦然太陽誤火劫津甚亦至噦則同一噦而寒熱又不同至於水穀不別而作固瘕者更與協熱下利者不同仲景辨證如此森嚴藉非寤寐神遊其理則臨證之間幾何不為他岐所惑哉陽明問答七問曰陽明病傳入少陽其狀何若答曰凡邪入陽明之府者不傳其在經者有傳有不傳其必欲傳者在陽明病一見少陽證便當從少陽和解故仲景云陽明病發潮熱大便溏小便自可胸脅滿不去者小柴胡湯主之若陽明病脅下硬滿不大便而嘔舌上白胎者亦當與小柴胡湯此正陽明傳入少陽之候亟當從少陽逆奪其邪使上焦得通津液得下則胃氣和而病自解喻嘉言謂陽明之邪來自太陽去自少陽太陽欲傳陽明者當推其邪使速還太陽來路陽明欲傳少陽者當推其邪使速往少陽去路此非深得仲景三昧者不能有些微論且陽明病一見少陽證即從少陽逆奪其邪不惟少陽證罷即陽明證亦罷且從少陽傳入三陰之證一罷而無不罷必識此意始足與語傷寒之傳變而豫防於未然否則必待傳到一經專治一經總使辨證無訛總屬粗工非聖法也少陽問答一問曰何以識為少陽病答曰少陽之為病口苦咽乾目眩也少陽之脈起於目鋭眥從耳後入耳中挾咽出頤頷中其支者會缺盆下胸中循脅以足少陽膽與三焦相火合化此經受邪多從升處而走所絡之空竅故仲景以口苦咽乾目眩括少陽病之提綱至若往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔皆邪入少陽當然之證其或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳此又少陽病中或然或不然之證總不離一小柴胡湯加減之法故又曰傷寒中風有柴胡證但見一證即是不必悉具又少陽受病其脈尺寸俱弦故仲景言傷寒脈弦細頭痛發熱者屬少陽此又不從證而從脈雖見頭痛發熱之表證不責太陽而責少陽則可見弦為少陽之定脈有此定脈定證以審實少陽之為病自不至誤汗誤下犯少陽之大禁矣少陽問答二問曰少陽病盡傳自陽明乎答曰此不盡然內經謂三陽之離合太陽為開陽明為闔少陽為樞凡邪中太陽有陽明以為之迎正賴有少陽以為之拒傷寒以出表為順入里為逆設非少陽之樞居中攔截則外來之邪長驅直入而無所御是少陽一經關係甚巨太陽病往往有初得之二三日不傳陽明徑傳少陽者有太陽與少陽同時病見者正不必盡俟陽明經盡始傳少陽且邪入三陰之後亦有還返少陽而解者總以定證定脈為據就脈證上審實其為少陽病即可主用少陽之治法而無疑矣少陽問答三問曰少陽病不解即傳三陰乎答曰有傳有不傳仲景云傷寒三日三陽為盡三陰當受邪其人反能食不嘔此謂三陰不受邪也若此者其病機本不傳又少陽證一見即從少陽治法而病速已則亦不傳凡陽經之病在太陽則頭痛發熱陽明則潮熱汗自出少陽則往來寒熱若久之無大熱其人躁煩者此為陽去入陰之候其中具有先見之機然則治傷寒家何如乘其機之未動亟從少陽解去其邪以預弭陽去入陰之變何便如之太陰問答一問曰何以識為太陰病答曰太陰之脈起於大指之端上循膝股內廉入腹屬脾絡胃上膈挾咽連舌本仲景以腹滿而吐食不下自利益甚時腹自痛屬太陰之為病蓋太陰為陰中之至陰太陰之前名曰陽明太陰之後名曰少陰太陰受病不能為陽明行其津液而少陰腎水因泛浸而無所制故見吐利滿痛等證仲景以是為太陰病之提綱太陰屬裡吐利滿痛皆里證也凡傷寒之邪在陽經誤治轉陷入陰者必種種表證全罷但見吐利滿痛等證卻是邪入太陰之候然又必以脈為辨故仲景云太陰病脈浮者可發汗宜桂枝湯太陰病脈本當沉今反浮則是雖見太陰病而邪尚逗遛於表仍可逆挽其邪使從表解由是推之則太陰之脈必主沉又不必言矣太陰證具而脈又沉即宜專就太陰論治若邪直犯太陰不因傳經而本經自病者亦當專就太陰論治內經言三陰之離合太陰為開厥陰為闔少陰為樞飲食入胃全恃太陰司轉輸之職太陰受病則轉輸之道窒故食不下腹滿時痛因之上湧則吐下注則利其主治之法大約宜扶植中州陽氣使復其轉輸之常職則病自已仲景辨列六經而太陰獨略然就此義而引伸觸類大旨初不越乎此奚俟繁言哉太陰問答二問曰太陰病治宜主溫乎答曰此不可執一而論寒邪直中太陰而本經自病者是當急溫無疑矣其有陽經之邪熱過寒生而轉入太陰者亦當主溫若屬熱邪陷入太陰而見吐利滿痛等證者純溫非宜純清亦不可則惟有和之一法如所謂太陽病脈浮者可發汗宜桂枝湯此逆挽其陷入之邪仍從外解而方中甘芍薑棗亦足以奠安太陰是和法也若本太陽病因誤下而腹滿時痛轉屬太陰者用桂枝加芍藥湯此仍用桂枝升舉陽邪但倍芍藥以收太陰之逆氣是亦和法也若大實痛者不下則痛勢須臾難緩峻下又恐脾陰隨下利而盡泄故仍用桂枝升舉陽邪但加大黃以微和胃氣是亦和法也三陰經中以少陰厥陰尚有實熱之證可用大寒大下者太陰濕土位處中州全賴陽氣布護以資健運轉輸之力病在太陰雖屬熱因切不可用寒涼直折遏抑陽氣陰邪愈錮故仲景又謂太陰為病設當行大黃芍藥者宜減之以其人胃氣弱易動故也觀此則太陰病之治當主溫可知矣而治太陰之病不可呆執溫法又可知矣不知溫法者不可與議太陰本臟虛寒之病徒執溫法者不可與議太陰他經傳變之病仲景治太陰病法大約以升舉陽氣為主或當急溫或宜兼清兼下隨證變通後世李東垣脾胃論殆能覷破此旨其處方似甚夾雜而於陰陽升降之機庶乎其得之矣少陰問答一問曰何以識少陰之為病答曰少陰腎水上承心火合化人身之元陰元陽根蒂於此故脈法以兩尺屬腎分配水火為人一身之根本此經之病熱因寒因變幻不一其中陰陽消息之機甚微不得呆執一證論治故仲景獨以脈微細但欲寐為少陰病之提綱以衛氣行陽則寤行陰則寐邪入少陰則氣行於陰不行於陽故但欲寐少陰病本在裡無論陰寒直中於本經者脈固微細即由陽邪陷入少陰者雖屬熱因其脈亦必微細則是微細為少陰之定脈但欲寐為少陰之定證緣少陰病所見各證或惡寒發熱與太陽證易混或口燥咽乾腹脹不大便與陽明證易混或嘔咳欲吐與少陽證易混或下利不止與太陰證易混甚或手足逆冷更與厥陰證易混總憑此定脈定證以審實其病之不在他經只在少陰或當急存其陰或當急回其陽絲毫不容誤治傷寒之邪以出表為順入里為逆三陽在表三陰在裡三陽經中惟太陽頭緒最繁三陰經中惟少陰頭緒最繁然太陽病誤治致逆尚有種種救逆諸法邪入少陰急救已危若更誤治死可立待尚何及救哉籲可懼也已少陰問答二問曰少陰病傳經屬熱直中屬寒然否答曰論中所列一二日二三日之少陰病即直中之邪五六日七八日之少陰病即傳經之邪傳經固多熱而亦有從寒化者直中固多寒而亦有由熱伏者脈微細但欲寐是少陰病之定脈定證而寒熱之分要在兼證上推詳寒不至於過甚者猶當溫經以散寒若陽將脫非急溫不足以回陽熱不至於過亢者尚可潤燥以清熱若陰將涸非急下不足以存陰病機至此不惟不容誤治即因循瞻顧亦足誤人然非辨之至確鮮有不生疑畏者則平日體認工夫自不容已矣少陰問答三問曰有犯房勞而病傷寒者責在少陰否答曰不然傷寒病適當房勞後而發仍當責其本病陽經之證仍責陽經陰經之證始責陰經仲景於汗下諸法兢兢必顧其人之津液虛家患傷寒原有不從正治之例正不必問其曾犯房勞與否虛象果見即非房勞亦不得妄施汗下若房勞之後而所患仍系實證則應汗者仍當汗應下者仍當下邪去而正自安所謂陰病者必實見有三陰證也房勞後之傷寒亦有陽證不得概從陰病論治此説前賢久經辨正而近日醫家猶沿其陋我見有誤補致邪壅而死者有誤溫致陰竭而死者既死而猶歸咎於房勞惑滋甚矣厥陰問答一問曰何以識為厥陰病答曰厥陰之為病其證亦錯雜不一而仲景以消渴氣上撞心心中疼熱飢而不欲食食即吐蛔括厥陰病之提綱蓋以厥陰當兩陰交蓋其脈起足大指循股內入陰中環陰器抵少腹貫心膈邪入厥陰循經上逆致見前證又厥者逆也逆則陰陽不相順接故又因之致厥厥陰乃陰盡之臟陰盡則陽生陰陽消長大伏危機此際出表則生入里則死故仲景以厥多熱少為病進熱多厥少為病退然邪入既深寒熱錯雜極難辨認喻嘉言謂厥陰篇中有純陽無陰之證有純陰無陽之證有陰陽差多差少之證有陽進欲愈陰進未愈之證復有陰居八九陽居一二之證厥而發熱熱深厥深上攻而成喉痹下攻而便膿血此純陽無陰之證也脈微細欲絶厥冷灸之不溫惡寒大汗大利躁不得臥與夫冷結關元此純陰無陽之證也厥三日熱亦三日厥五日熱亦五日手足厥冷而邪熱在胸水熱在胃此陰陽差多差少之證也渴欲飲水飢欲得食脈滑而數手足自溫此陽進欲愈之證也默默不欲食寸脈雖浮數尺脈自澀嘔吐涎沫腹脹身疼此陰進未愈之證也下利清穀裡寒外熱嘔而脈弱小便復利本自寒下復誤吐下脈沉微厥面反戴陽此陰居八九陽居一二之證也條分縷晰序次最為明暢厥陰皆里證惟發熱則有遠出於表之機大約病專屬裡者亟當治其里由表陷入者宜挽之出表屢寒者利在急溫屬熱者不宜直折豫統會仲景大法如此神而明之存乎其人厥陰問答二問曰厥之寒熱何以別之答曰仲景言諸四逆厥者不可下虛家亦然又曰厥陰下之其語似涉兩歧然要認明病之來路彼因四逆而厥故不可下此因發熱而厥故應下之此中消息言下本自躍然再推厥深熱深之義溫熱病一二日或五六日沉昏譫妄手足厥逆是熱邪入膻之候膻中屬手厥陰是亦厥陰證也仲景雖未明言而厥深熱深一語已包括無遺矣誰謂溫熱之法不可向仲景推尋哉統論六經仲景六經之法一經有一經之證先要分看分看宜在有字句處精研而或此經雜彼經之症又要合看合看全在無字句處善悟而尤要在於辨似有陽中之陰有陰中之陽有陽中之陽有陰中之陰有陽證似陰有陰證似陽有陽證轉陰有陰證轉陽有陽證雜陰有陰證雜陽有陰陽錯雜非細心體認惡能窺其萬一今人輒畏仲景書難讀而從事於後世之方書是猶涉海問津從仲景傷寒入手始覺甚難久之則其易焉者至矣從後世方書入手始覺甚易久之則其難焉者至矣總之凡病不外此六經能解仲景六經辨證之法可以識傷寒即推此六經辨證之法可以識萬病傷寒既瞭然無遺於雜證乎何有此一以貫之之道也故曰萬病莫逃乎傷寒中集發熱凡發熱必察其表裡有無兼證而後可窮其致熱之因其但發熱而表裡別無兼證者此內傷發熱不在此例所謂兼證者以外兼頭痛惡寒身疼腰痛等證此邪在表者也內兼煩渴胸腹痛不大便或下利等證此邪在裡者也發熱特其見端耳必互勘明確辨證方的凡發熱必責重太陽者以太陽屬表統司營衛而為諸陽之主氣經云陽者衛外而為固也外邪之傷人多由於衛之不固故論外感病必自太陽起然太陽雖主表而其根起於至陰此實表裡上下互相呼應故由太陽而陽明而少陽以及三陰皆互見發熱證詳列於後太陽之為病脈浮頭項強痛而惡寒不即發熱也其惡寒正發熱之機也論中所稱為太陽病者即指此脈此證而言他經皆仿此太陽中風發熱有汗其脈浮緩風則傷衛宜桂枝以解肌太陽傷寒發熱無汗其脈浮緊寒則傷營宜麻黃以發汗然桂枝證全在啜熱稀粥以助藥力取其漐漐微似有汗不可令如水流漓至麻黃證始取大發其汗此麻黃桂枝分治風寒截然二法不能混同施治其或風寒兩傷營衛同病經云太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之又云傷寒脈浮緩身不疼但重乍有輕時無少陰證者大青龍湯發之蓋中風脈宜浮緩而反見浮緊之脈傷寒脈宜浮緊而反見浮緩之脈即易桂枝麻黃之成法而主用大青龍湯大發其汗此仲景治風寒之法成方具在而或謂仲景之法詳於風寒略於溫熱此大不然仲景於風寒之外特揭明太陽病發熱而渴不惡寒者為溫病此其辨證最要之訣所以與風寒異者全在渴不惡寒四字風寒發熱必兼惡寒今不惡寒此宜辨者也風寒發熱口全不渴必待傳變之後口始作渴今病初起即渴此又宜辨者也又有所謂濕溫者經云濕家之為病一身盡疼發熱身色如似熏黃又云太陽病關節疼痛而煩脈沉而細者此名濕痹此仲景但言濕不言溫也而以論中所列種種濕證加以發熱而渴不惡寒則濕溫之情狀自可比類而得至於熱病仲景明云太陽中熱者暍是也其人汗出惡寒身熱而渴也此與溫病同一口渴而暍病惡寒溫病不惡寒又自有別仲景處以人參白虎湯則不惟有其法而並有其方矣此太陽病初起發熱辨證之大法乃傷寒切實下手工夫有謂翕翕發熱者但表不里也有謂蒸蒸發熱者自里而表也太陽主表其發熱必兼頭項強痛身疼痛等證此皆太陽之部署純乎表者也至陽明發熱則兼有煩滿口渴等證少陽發熱則兼有胸脅滿痛口苦喜嘔等證而其脈皆主浮太陽之脈或浮緩或浮緊陽明之脈浮大少陽之脈浮弦若脈沉而不浮三陰證中亦互見發熱證其發熱同而所以致熱之因不同不得以發熱為邪在表概從太陽發表例施治陽明發熱與太陽異者經云陽明病外證云何答曰身熱汗自出不惡寒反惡熱也蓋始則惡寒發熱今惡寒自罷雖汗出而熱仍不解者即轉屬陽明之候當此時無論風寒暑濕所感不同而同歸火化陽明病仲景有發汗之禁而治法宜分經府其熱雖甚而尚在於經者宜以甘寒直撤其熱如經云傷寒若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌乾燥而煩欲飲水數升者白虎加人參湯主之是也其邪已入腑而猶汗出發熱者如經云太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之又云陽明病發熱汗多者急下之宜大承氣湯是也少陽發熱仲景亦申發汗之禁少陽病本主往來寒熱而亦有發熱屬少陽者必兼脅下滿心煩喜嘔諸證且其脈必弦故經云傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者小柴胡湯主之又云傷寒發熱汗出不解心下痞硬嘔吐而下利者大柴胡湯主之蓋脅痛嘔渴已明見少陽之半里證雖發熱表證未除不得從太陽發表之例而當以大小柴胡湯半表半裡治之也又曰傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈胃不和則煩而悸蓋弦為少陽之定脈細則邪不在表仲景恐人以頭痛發熱誤為太陽證故明指之曰此屬少陽而又申言之曰少陽不可發汗其所以辨其發熱之屬少陽者前二條以證辨此一條以脈辨也太陰發熱者其脈不浮而沉而更兼吐利腹痛諸證經云病發熱惡寒頭痛身疼吐下者此屬何病答曰此名霍亂霍亂自吐下又利止復更發熱也吐利本太陰病利止復熱者陰病轉陽也既已轉陽其脈當浮故又曰太陰病脈浮者可發汗宜桂枝湯吐下之後津液已傷復又往往口渴發熱故又曰霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中湯主之此與陽經之發熱治各不同也少陰病發熱最易與太陽牽混故仲景於大青龍證必辨其無少陰證者方取大發其汗而又申言之曰少陰病脈沉細數病為在裡不可發汗又曰少陰病脈微不可發汗亡陽故也則少陰之不可發汗明矣陰病必當轉陽故曰少陰病吐利手足不逆冷反發熱者不死蓋太陽寒水之氣與少陰君火相濟為用此之吐利少陰為寒所抑茲得陽熱之氣而其氣還返於太陽故反發熱不死也然何以辨其為少陰之發熱也經云少陰之為病脈沉細但欲寐也沉細為少陰之定脈但欲寐為少陰之定證且太陰病吐利手足自溫此則手足逆冷更加之以惡寒身蜷其甚者厥冷無脈又或咽痛煩躁便膿血種種危證死生呼吸蓋因少陰腎藏分配水火為先天根本故其病情寒熱錯雜變幻不測有如此至發熱則陰寒之中猶寓陽熱之氣而強責少陰汗者將其人之根本先拔至於下厥上竭則難治矣其有寒邪直犯少陰而即發熱者如經云少陰病始得之反發熱脈沉者麻黃附子細辛湯主之又曰少陰病得之二三日麻黃附子甘草湯微發汗以二三日無里證故微發汗也蓋必以附子鎮攝腎中真陽俾根本先固而後可以引邪外出此於微發汗之中而仍寓不發汗之義也厥陰發熱者以其人厥與熱之多少辨病之進退厥陰者兩陰交盡之名然陰盡之中實寓陽生之義故其時陰陽不相順接便為厥厥熱相等其病可愈厥多熱少此為病進熱多厥少此為病退所謂厥者手足逆冷是也逆甚而至於冷過肘膝則不名曰逆冷而直名曰厥此時正藉發熱為一線生陽可續故發熱為病欲愈之機也故曰傷寒先厥後發熱而利者必自止又傷寒熱少厥微欲得食者其病為愈若發熱下利至甚厥不止者死又傷寒六七日不利便發熱而利其人汗出不止者亦死要知發熱之後其脈必不沉而浮乃為陰病轉陽之真候故曰脈微浮為欲愈不浮為未愈此又與少陰發熱同一義也傷寒之脈始終一以靜為主故經云傷寒二三日脈若靜者為不傳若脈數急者為欲傳也內經云汗出而脈尚躁盛者死是始熱以脈靜為易愈而傳變之後又必以脈靜為真愈之候凡病之自表而里者以太陽為始病之由里而表者以厥陰為始太陽雖主表而其脈連於風府其根起於至陰又與少陰為表裡仲景慎重不敢妄發其汗者以此三陰病固不宜發汗即三陽經發熱其致熱之因又不全屬太陽如病起發熱即兼口渴汗出大便閉等證此由陽明而太陽者也又如病起發熱即兼喜嘔胸脅滿痛等證此由少陽而太陽者也皆不得藉口於傷寒一日太陽受之概與發表也大約溫熱病起於陽明者居多至濕溫病其邪伏於募原募原屬半表半裡故其發熱每兼胸痞腹滿煩渴不大便等證加以骨節煩疼舌胎如積粉其病先犯少陽與太陰而內連於胃府外溢於太陽濕家本自易汗出尤不可重發其汗也至所謂異氣者非於六氣之外別具一氣蓋六氣本天地自然之令氣因其氣之偏勝而釀為厲氣故其病沿門傳染長幼相似乃稱曰疫而治法仍不離乎六氣之中也有病已愈而復又發熱者此名遺熱由於起居飲食之不慎凡病後飲食最宜清淡使胃中津液漸復邪氣全盡自然健啖而世俗每飫肥鮮兼之喜投補益皆所不宜故內經曰病熱少愈食肉則復多食則遺此其禁也然其熱之復發亦有虛有實故內經云視其虛實調其逆從可使必已矣至仲景食後勞復以及大病瘥後種種各法載明論中更不待他求矣惡寒太陽之為病脈浮頭項強痛而惡寒是惡寒乃太陽病一定之證始而惡寒繼且發熱矣其惡寒與發熱相兼非如寒熱往來之熱時自熱寒時自寒也所謂身大熱而不欲去衣者此也凡風寒客於營衛之中而灑淅惡寒者其脈必浮浮為在表故曰惡寒者表未解也雖里證悉具而表未解不可攻裡必俟外解已乃可攻也若太陽病傳入陽明者則惡寒將自罷即濈濈汗出而不惡寒反惡熱矣此太陽病初起發熱惡寒之大概也惡寒屬表者脈必浮其有不浮而沉者陰病也經云發熱惡寒者發於陽也無熱惡寒者發於陰也發於陽者病在表宜解表為主發於陰者病在裡宜溫里為主若陰病而誤發其汗則陽亡之變頃刻即至矣陰病惡寒以手足溫者易治手足逆冷者難治故經云少陰病惡寒而蜷時自煩欲去衣被者可治又曰少陰病惡寒身蜷而利手足逆冷者不治又曰少陰病下利若利止惡寒而蜷臥手足溫者可治此其義也惡寒屬表者在未汗以前是謂表實若既發汗之後當不惡寒矣而反惡寒者則又不屬實而屬虛故經云發汗病不解反惡寒者虛故也芍藥甘草附子湯主之蓋以芍藥甘草兩和營衛而必藉附子以溫經則同一惡寒而未汗以前與既汗以後又各不同如此更有裡熱郁盛致陽氣不得宣泄而外惡寒者此即內經所謂諸病惡寒皆屬於火者是也辛溫發表大屬非宜而表陽被遏其脈又多沉與陰病相似而又不可誤於溫里其外顯假寒內實真熱一經誤用反掌生殺其辨之之法則不以脈辨而以證辨蓋風寒之邪未經入里口中必和此則口中先干其舌上燥白如積粉甚或兼黃黑色胸膈痞滿不大便或下利如深醬色其兼厲氣者口中必有穢氣此即熱甚陽郁之候治宜宣發伏邪使裡氣通而鬱陽發則惡寒自罷反大熱而煩渴矣然熱作之後人皆信為熱而當惡寒時鮮有識其為熱者不可不細心體認也又有背惡寒者夫惡寒則一身皆惡何以止稱背惡寒內經云人身之陰陽腹為陰背為陽背者胸中之府諸陽受氣於胸中而轉行於背陰寒之氣盛陽虛不足御之則背為之惡寒經云少陰病一二日口中和其背惡寒者當灸之附子湯主之論中口中和三字最宜著眼惟其口中和故可放膽用附子又或乘陰氣不足陽氣內陷入陰中而不轉行於背則背亦為之微惡寒經云傷寒無大熱口燥渴心煩背微惡寒白虎加人參湯主之二者治法天淵於何辨之亦辨之於口之渴與不渴而已矣惡風惡風與惡寒異惡寒者不待風而自寒雖置之密室之中幃帳之內甚至覆被向火而猶不能禁其寒也惡風者風至斯惡一居密室之中幃帳之內而即坦然自若矣故惡寒者未有不惡風而惡風者不必皆惡寒惡風屬表者風邪客於衛也經云太陽病發熱汗出惡風脈緩者名曰中風又云太陽中風嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之此有風者必惡風也而寒邪亦有惡風以有汗無汗為辨經云太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之此太陽病初起風寒異治不易之定法其有太陽病循經下入其勢未趨入陽明而猶戀於太陽之表致頭痛已瘥惡風仍在者如經云太陽病項背強𠘧𠘧無汗惡風者葛根湯主之又云太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯主之則仍以有汗無汗為辨也亦有太陽病其勢徑趨入少陽而惡風證仍未罷者經云傷寒四五日身熱惡風頭項強脅下滿手足溫而渴者小柴胡湯主之是其里證已具而惡風為表未解故以半表半裡治之也蓋惡寒有屬於陽者有屬於陰者惡風則主表而專屬於陽此皆治表之大略也其有發汗太過致漏不止而惡風者經云太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯主之蓋汗出既多即召亡陽之變故於桂枝湯中加附子以扶陽固衛同一惡風而前宜和衛以解肌此宜固衛以實表其治法又各不同矣更有裡熱熾甚而外反惡風者經云傷寒若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之蓋必直撤其熱則表裡俱和而惡風自止又非解表所能愈也又有風濕相搏而外惡風者經云風濕相搏骨節煩疼掣痛近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之其所謂濕蓋寒濕非濕熱也寒濕之內郁者自里而搏乎表風邪之外入者自表而搏乎里其相搏在骨節之間則陽氣被遏遂惡風不欲去衣必以甘草附子湯宣達陽氣則風與濕俱去痛止而惡風自罷矣潮熱潮熱者不惡寒但惡熱其來如潮之至不失其時謂之潮熱其證屬裡而不屬表凡惡寒發熱屬太陽至少陽則往來寒熱此之潮熱則屬陽明往往發於日晡日晡未申之時陽明居中土王於未申邪入中土無所復傳故郁為實熱隨王而潮經云日晡所發潮熱者屬陽明也惟其屬陽明則胃實為可下之證故曰潮熱者實也潮熱固可下而下法要有次第經云太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之此因胃已實而熱未潮故但用調胃承氣微利之而已又云陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下按三承氣俱用大黃大承氣重用枳朴兼以芒硝上承邪熱而下用以攻堅破結蕩滌腸胃乃峻下之劑小承氣去芒硝而輕用枳朴止取通利腸胃其下較輕調胃承氣佐以甘草又於下中兼和三承氣各有所主仲景下法不敢妄施其慎細如此又云太陽病重發汗而復下之舌上燥而渴日晡小有潮熱從心下至少腹硬滿而痛不可近者大陷胸湯主之夫病至心下及少腹硬滿而痛不可近則勢已劇甚此又非大承氣所能勝任宜兼破胸膈之結以下通於腸胃則必主以大陷胸湯而無疑矣其有陽明病潮熱未去而已趨入少陽者經云陽明病發潮熱大便溏小便自可胸脅滿不去者小柴胡湯主之此非小柴胡湯之能治潮熱也胸脅滿不去已具少陽證且大便已溏雖潮熱未罷未可再攻也更有疸瘧者但熱不寒發作有時此亦陽明經熱其熱止在於經未入於府且病不從傷寒來故名之曰疸瘧仲景不立方而但曰以飲食消息之要之甘寒徹熱與治陽明經熱同法也寒熱寒熱往來者主半表半裡其病屬少陽蓋少陽當陰陽出入之樞邪至其地與正氣相爭相爭則寒爭勝則熱矣此與惡寒發熱有別惡寒發熱者寒熱互見此則寒時自寒而不見熱熱時自熱而不見寒也又與寒熱如瘧者有別寒熱如瘧者作止有時此則寒已而熱熱已而寒一日三五發甚者十數套與瘧狀有以異也小柴胡湯專治往來寒熱蓋以柴胡治半表半夏治半里黃芩生薑交除寒熱而加以人參甘棗扶正逐邪蓋病至少陽發汗攻裡皆所不宜故以是為和解之劑乃少陽病之定法也小柴胡湯主治往來寒熱人皆知之此特半表證而半里證人多忽焉不講所謂半里者如口苦心煩喜嘔胸脅滿痛之類是也凡邪從太陽而來其人仍發熱而少陽半里證已見雖未往來寒熱即當從少陽和解如經云傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者小柴胡湯主之又云傷寒後六七日發熱微惡寒支節煩疼心下支結外證未去者柴胡桂枝湯主之是也至少陽病來路自太陽而其去則入陽明之府其來自太陽者如經云傷寒五六日已發汗而復下之脅滿微結小便不利渴而不嘔往來寒熱心煩者此為未解也柴胡桂枝幹薑湯主之是也其欲入府而猶未入者如經云傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯是也寒熱往來屬半表半裡證然有由表而里者又有由里而表者不可不辨也大凡風寒之邪多自表而里濕熱之邪多自里而表風寒法仲景論中詳矣至濕熱之邪伏於募原其起病即見嘔渴胸腹滿不大便諸里證及其發熱往往熱已而寒寒已而熱此其里證重於表證宜察其里證之輕重使里先和則表自解蓋病自里而表少陽正當往來出入之界故其始往來寒熱繼則熱多寒少再則但熱不寒至晝夜壯熱而譫妄煩渴畢見此病之由輕入重也至於由重出輕則必使譫妄煩渴諸里證先罷身熱漸和其時邪氣已退正氣未復又復相爭而為往來寒熱此乃病出入之大機而前之寒熱往來為病進後之寒熱往來為病退總視其里證之輕重有無為據也其有邪氣全退表裡俱和而仍寒熱未去往來如瘧者此因正氣未復宜調其飲食和其營衛自然漸愈切不可驟與峻補恐餘邪為戀反增其害矣又傷寒往來寒熱與瘧相似而實非凡瘧當未作之時飲啖如平人至瘧作而始作此則默默不欲飲食兼有口苦心煩喜嘔胸脅痛諸里證以此為辨煩熱煩熱者因熱而煩與發熱異發熱者但身熱而不煩此則為熱所煩故謂之煩熱經云病人煩熱汗出則解此證得之於陽熱者居多欲作汗而未能遽汗往往先有此候故經又云欲自解者必當先煩乃有汗而解何以知之脈浮故知汗出解也浮為在表在表者宜汗故汗出則解也凡風寒之邪由太陽而入者不即發煩也至煩而熱為汗解之佳兆發其汗則熱解而煩亦除矣故經云太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗服藥已微除其人發煩熱目瞑劇者必衄衄乃解所以然者陽氣重故也又云傷寒發汗已半日許復煩脈浮數者可更發汗宜桂枝湯此皆邪之在太陽者也太陽病當汗不汗或誤與以冷水或誤下者仲景又施種種救逆諸法如經云傷寒若下之而煩熱胸中窒者梔子豉湯主之又云病在陽應以汗解之反以冷水噀之若灌之其熱被卻不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不瘥與五苓散蓋一因誤下而陽氣陷入胸中則必解去其胸中之邪一因誤與冷水而其邪由太陽之經轉入太陽之府故不從經解而從府解也更有太陽證未罷已轉屬陽明者如經云傷寒表裡俱熱舌上乾燥而煩白虎加人參湯主之此由表裡俱熱則必以甘寒徹熱使表裡俱和自然得汗而解又法之變也凡稱煩熱者因熱而煩煩在外者也若煩在內者另立虛煩一門詳後虛煩虛煩者其人無大熱心中溫溫欲吐而又不能吐致內擾而煩然名為虛煩而其證有因於虛者亦有因於實者皆邪熱傳裡之候宜分別施治有邪熱傳入少陽而發煩者經云傷寒五六日往來寒熱心煩喜嘔或胸中煩而不嘔小柴胡湯主之蓋少陽既不可發汗而里未實又不可下故以小柴胡湯兩和其表裡表裡俱和則煩自除矣又有陽熱之氣下陷入胸中而作虛煩宜用吐法以宣其熱如經云發汗吐下後虛煩不得眠若劇者必反復顛倒心中懊憹梔子豉湯主之若少氣者梔子甘草豉湯主之若嘔者梔子生薑豉湯主之心煩腹滿臥起不安者梔子厚朴湯主之又傷寒醫以丸藥大下之身熱不去微煩者梔子乾薑湯主之此皆取吐之劑宜按其兼證分別加減其吐中有發散之義足以升舉下陷之陽邪此乃吐虛煩之大法至於煩之實者非大吐不能除如經云病人手足厥冷脈下緊者邪結在胸中心中滿而煩飢不能食者病在胸中當吐之宜瓜蒂散則同一取吐而輕重又不同矣病在胸中者當吐其胃實者又非吐法所能除經云陽明病不吐不下心煩者調胃承氣湯主之所謂陽明病者胃家實是也與調胃承氣以滌其煩是於微利之中仍寓和解之義也煩熱者因熱而煩其所患皆陽熱之證無陰證也至虛煩則有陽病又有陰病經云少陰病二三日心中煩不得臥者黃連阿膠湯主之少陰病胸滿心煩者豬膚湯主之又云少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之蓋少陽為陽中之樞少陰為陰中之樞熱傷少陰津液被耗邪熱內擾故各以其兼證施種種存陰滌煩之法亦和解之義也至陰寒證則反以煩為可轉陽之機故又云少陰病惡寒而蜷時自煩欲去衣被者為可治也少陽病有煩而悸者此屬胃胃不和則煩而悸和胃為主又有悸而煩者如經云傷寒二三日心中悸而煩者小建中湯主之是也大凡先煩而後悸者屬實先悸而後煩者屬虛補虛泄實治各不同矣別有所謂懊憹者比煩而甚者也宜因證而分別吐下如經云陽明病其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者宜梔子豉湯此宜吐者也又經云陽明病心中懊憹而煩胃有燥矢者可攻此宜下者也更有因蛔厥而時自煩者經云傷寒蛔厥者其人當吐蛔病者靜而復時煩者此為藏寒蛔上入其膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之此得之於時煩時止得食復煩與熱鬱者不同臨證時當細辨也有病已愈而猶煩者經云吐利發汗脈平小煩者以新虛不勝穀氣故也又云病人脈已解而日暮微煩以脾胃尚弱不能消穀故令微煩損谷即愈此可勿藥即藥亦不過平調脾胃慎勿再與泄熱重傷胃氣也煩躁煩熱者病在外虛煩者病在內至所稱煩躁者謂心中鬱郁而煩又加以手足躁擾則謂之煩躁有屬於陽者有屬於陰者其中表里殊因溫涼異用宜細辨之有邪熱在表欲汗不汗因作煩躁者經云太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁大青龍湯主之此乃發汗之峻劑必辨其無少陰證相雜方可大發其汗蓋少陰病之煩躁由於陽氣微故忌發汗太陽病之煩躁由於陽氣盛故宜發汗何以辨之則以太陽之脈或浮緩或浮緊而少陰之脈必沉細也經云當汗不汗其人躁煩病在太陽宜以汗解矣然有發汗之後而煩躁者則以津液被奪胃中水竭如經云太陽病發汗後大汗出胃中乾躁煩躁不得眠欲得飲水者少少與飲之令胃氣和則愈者也至於胃已實者如經云陽明病若發汗則躁又云病人不大便五日繞臍痛煩躁發作有時此有燥屎是又不宜汗而宜下矣煩躁屬熱者為邪熱傳裡之候然有自表而傳裡者又有自里而傳表者大約濕熱之邪往往先里後表其病起即胸膈痞滿口渴譫語種種里證悉具其里邪欲出於表而又不能出因煩躁發熱者此等證便不可發汗發汗則津液被奪里邪愈錮宜先與疏里佐以透表使裡氣先和自然得汗而解蓋其病傳之先後有不同第就仲景汗下諸法隨其證之先後而錯綜之其治法可微會矣若風寒之邪其病初起不煩躁其後漸煩躁而身熱反去者如經云傷寒六七日無大熱其人躁煩此為陽去入陰故也病至此增劇矣凡邪入三陰而煩躁者雖所傳漸深始終總歸於熱其有陰盛陽微而作煩躁者經雲陽微發汗躁不得眠則深以發汗為戒矣蓋其人陽氣本微而陰盛又迫陽於外則外顯假熱內實真寒其脈必沉細口雖渴但欲漱水不欲咽者此其候也然其中有病本陰寒而致陽微者又誤施汗下而致陽微者如經云少陰病吐利手足逆冷煩躁欲死者吳茱萸湯主之是此病本陰寒而陽微者也又如經云下之後晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑附子湯主之又云發汗若下之病仍不解煩躁者茯苓四逆湯主之是誤施汗下而陽微者也然陽氣微者尚可施回陽之力其陰盛逼陽於外而陽已外脫者如經云少陰病吐利躁煩四逆者死少陰病四逆惡寒而身蜷脈不至不煩而躁者死少陰病脈微細沉但欲臥汗出不煩自欲吐至五六日自利復煩躁不得臥寐者死傷寒六七日脈微手足厥冷煩躁灸厥陰灸不還者死傷寒發熱下利厥逆躁不得臥者死如此之煩躁是陽已垂脫救亦無及矣又有因水氣而煩躁者金匱云肺脹咳而上氣煩躁而喘脈浮者心下有水小青龍加石膏湯主之蓋心下有水上射及肺肺為之脹故煩躁而喘乃立此泄肺行水之法然此病不獨風寒之從外入者足以與內飲相合即濕熱之在裡者或因熱甚而恣啖生冷或濕邪未解誤投寒涼皆能停飲於胸膈之間寒飲怫鬱其邪外不能達表內不能傳胃故煩躁轉甚必先消其水氣則邪得有出路而煩躁自能漸除又治法之變也無汗汗者心之液心主營寒傷營則血凝泣而無汗無汗則宜發汗矣然同一無汗而受病之因有不同宜審其邪之所在而善調之使陰陽氣和營衛流通自然汗出而解而非純用辛溫發散之劑可以迫之使汗也太陽病宜以汗解以太陽主表故也然風寒暑濕熱之邪起自太陽者往往多自汗出惟寒傷營則無汗必大發其汗而始解如經云太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之又云太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之又云太陽病項背強𠘧𠘧無汗惡風者葛根湯主之此皆邪在表而宜發汗者是也其有不從汗解而從衄解者經云太陽病脈浮緊發熱身無汗自衄者愈蓋寒傷營營主血得衄而解與汗同義即俗所稱為紅汗者是也其有病在陽明而無汗者如經云陽明病反無汗而小便利二三日嘔而咳手足厥者必苦頭痛又云陽明病無汗小便不利心中懊憹者身必發黃蓋邪在於表熏發腠理則使汗自出故經云病人濈然汗出者是轉屬陽明也此則邪向內傳不外熏發故無汗也有陽虛而無汗者經云脈浮而遲遲為無陽不能作汗其身必癢又云陽明病反無汗其身如蟲行皮中狀者此以久虛故也是陽虛而無汗者也有因陽熱熾盛陰液被奪而無汗者經云傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之蓋有表證者還宜治表此則表證除而熱渴熾盛故宜以人參白虎急救其陰俾陰氣和則陽熱外越自然汗出而解也三陰為病不得有汗以邪行於里故也同一無汗而陰與陽又何以別之蓋陽脈主浮而陰脈必沉也又有水飲內蓄而無汗者經云服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓白朮湯主之蓋汗者津液所布今水飲內蓄則津液內滲故外不得有汗也凡當汗之證服湯一劑病勢仍在至於服三劑而仍不得汗又加以脈躁盛者主死自汗太陽病惟寒傷營者無汗此外若風濕暑熱之邪初起即令汗自出至一入陽明即寒傷營者其始發熱無汗至此亦濈然汗出而不惡寒反惡熱矣此之自汗皆不得以表虛論治也有邪在於表汗出不徹應須再汗而愈者經云病常自汗出者此為榮氣和榮氣和者外不諧以衛氣不共營氣和諧故爾以榮行脈中衛行脈外復發其汗榮衛和則愈宜桂枝湯又曰病人臟無他病時發熱自汗出而不愈者此衛氣不和也先其時發汗則愈宜桂枝湯蓋麻黃乃發汗之峻劑惟無汗者宜之桂枝則於發汗之中仍寓固衛之氣故汗出而復發其汗者不取麻黃而取桂枝也經云酒客病不可與桂枝湯以酒客不喜甘故也蓋酒氣與穀氣相併其中必熱故不可與桂枝以其人濕熱重故也酒客如此則凡病之因暑濕而起者其不宜桂枝更明矣其有因裡實而汗自出者經云陽明病其人多汗以津液外出胃中燥大便必硬硬則譫語小承氣湯主之又云陽明病發熱汗多者急下之宜大承氣湯蓋裡氣既通則邪熱下行而汗自止矣又有汗多亡津液而邪猶在於經未入於府者經云服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之蓋必急救其陰則煩渴除而汗亦止矣更有汗多亡陽者經云太陽病發汗遂漏不止其人惡風小便難四支微急難以屈伸者桂枝加附子湯主之又云發汗病不解反惡寒者虛故也芍藥甘草附子湯主之蓋必以附子合芍藥以溫經固衛則陽回而汗自濈則同一汗出而虛實寒熱治又不同矣陰病不得有汗其有汗出如油喘而不休以及傷寒六七日不利便發熱而利其人汗出不止者皆死病也其間有可治者如經云下利清穀裡寒外熱汗出而厥者通脈四逆湯主之既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之又吐已下斷汗出而厥四支拘急不解脈微欲絶者通脈四逆湯主之此皆急溫之證不可須臾緩也頭汗附手足汗盜汗凡陽明病一身自汗出者謂之熱越此熱從外達也若熱不得越而從上達則有頭汗證從傍達則有手足汗證而其證皆屬陽而不屬陰仲景云陰不得有汗故以是列陽明證也頭為諸陽之會邪鬱於里不得外越熱蒸於陽則頭汗自出凡見此證者多發黃經云但頭汗出余處無汗劑頸而還身必發黃又云陽明病被火額上微汗出而小便不利者必發黃此以熱鬱在裡不得外越故也然其間有郁之淺者如經云陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯主之此可用吐法以宣其熱也有郁之深者如經云傷寒熱結在裡但結胸無大熱者此為水結在胸脅也但頭微汗出者大陷胸湯主之此可用下法以泄其熱也此皆陽明病其邪不能外出於陽明之表而鬱在陽明之裡也其有不屬陽明而屬少陽者經云傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有里也脈沉亦在裡也汗出為陽微假令純陰結不得復有外證悉入在裡此為半在裡半在外也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解又云傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝幹薑湯主之小柴胡本少陽之劑所以兩和表裡今里證已具而猶持於半表故尚見頭汗證也更有邪熱陷里而成頭汗證者經曰陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而泄之濈然汗出而愈蓋熱入血室而肝藏實故當刺肝之期門以泄其實血液為汗熱邪並汗而出則血自止矣然此猶入里之淺者也更有太陽中風以火劫發汗陰陽俱虛竭身體則枯燥但頭汗出劑頸而還此則津液垂涸之證惟小便利者則一線真陰未涸可以亟救其真陰故雖種種危證悉具而仲景曰小便利者其人可治也又有真陽上脫而頭汗者經云關格不通不得尿頭無汗者生有汗者死又云濕家下之其人額上汗出微喘者死此絶證不可治也手足汗乃專屬陽明證經云手足濈然汗出者此大便已硬也手足濈濈汗出大便難而譫語者下之則愈蓋陽明屬胃胃主四肢此由熱聚於胃也然又有不屬熱而屬寒者經云陽明病不能食小便不利手足濈然汗出此欲作固瘕必大便初硬後溏所以然者以胃中冷水穀不別故也熱聚於胃者可下寒聚於胃者不可下此又不可不辨也更有盜汗者乃半表半裡證邪氣侵行於里外連於表睡則衛氣行於里乘表中陽氣不致津液得泄故但睡而汗出覺則氣散於表而汗止矣故經云微盜汗出反惡寒者表未解也又陽明病當作裡實而脈浮者云必盜汗又三陽合病目合則汗凡若此者皆當清裡和表為治蓋傷寒盜汗與雜病之盜汗不同雜病盜汗可用補法傷寒盜汗則惟有和表而已無補法也戰汗戰汗者邪正相爭也經云脈浮而緊按之反芤此為本虛故當戰而汗出也其人本虛故當發戰以脈浮故當汗出而解觀此則知戰乃邪氣向外之徵而當欲出未出之界因本虛必先發戰而正猶足以拒邪故戰而汗出為病解之佳兆也戰邪向外者也若邪向內者則不名之曰戰而名之曰栗戰者身戰也栗者心戰也經云陰中於邪必內栗也又云胃無穀氣脾澀不通口急不能言其人則戰而栗戰與栗有陰陽之分不可不知又有名為振者與戰相近但戰則身為之戰搖振但森然聳動而已其人素虛至欲汗之時必蒸蒸而振卻發熱汗出而解是振較之戰為輕也如經所云亡血家發汗則寒栗而振與夫下後復發汗其人振寒者皆虛象也然此猶淺焉者也若經云若吐若下後心下逆滿氣上衝胸起則頭眩發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之又云太陽病發汗不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者真武湯主之此之振也亟與回陽猶恐不及又非戰汗所可同日語矣戰汗之脈以浮緩為主浮則邪出於表緩則胃氣自和可以托邪外出而又必察其氣氣細而長者吉氣粗而短者危戰汗之時不可服藥補則汗不透而留邪為患泄則正氣不支而成虛脫只宜多與熱湯養津液以助其作汗須靜候其脈靜氣長便屬無害不必驚慌俟戰止之後再察其有無留邪按法施治若當戰時而驚駭叫喚則神氣先亂邪反勝正轉為危候不可治矣大凡風寒之邪自表而里戰汗者少濕熱之邪自里而表戰汗者多戰汗之後脈靜身涼舌胎已淨胸腹無阻漸思飲食斯為全解否則餘邪未淨而復熱則有再作戰汗而解者有戰汗至三四次而解者總視里證以為據又或戰定之後其人忽沉沉睡去如死一般須察其脈仍和緩有根者勿訝俟其氣復即醒矣亦間有脈停者又必察其呼吸如呼吸尚長此屬脈厥久之自復亦勿訝也戰解固為佳兆又或其人脈促氣粗形體不仁水漿不下目直視舌痿不能言此則欲脫之象而非戰解之象矣戰汗非由發汗而得若病之可發汗者邪在於表也發汗則汗自出奚俟於戰戰汗者由里出表也故往往有清涼攻下之劑絶不參一毫表藥自得戰汗而解者此由表裡通達陰陽交和自然而然而非可逼之使汗也頭痛附項強太陽之為病脈浮頭項強痛而惡寒是頭項強痛專屬太陽證然他經亦互見特太陽其專主耳凡邪之自外而入者必主頭痛如經云太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之太陽病頭痛發熱汗出惡風者桂枝湯主之此與發熱同機風寒之邪自外而入其脈主浮故可發之使從汗解也其有不從太陽而從少陽者經云傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗此屬胃胃和則愈胃不和則煩而悸蓋弦為少陽定脈其頭痛特邪之外溢於太陽而非太陽之自病故仲景特申發汗之禁又太陽與少陽並病頭項強痛或眩冒時如結胸心下痞硬者慎不可汗而亦不可下汗下俱不可而從少陽和解之法仲景雖不言在人因證善會矣陽明病尤忌發汗經云傷寒六七日不大便頭痛有熱者與承氣湯其小便清者知不在裡仍在表也當鬚髮汗若頭痛者必衄此言風寒之邪由表而入熱未入里仍宜汗解既入於裡則宜以承氣湯下之矣由此推之濕熱之邪本在於里而外溢於表其初起每見頭痛證當以清裡為主微兼透表里和則表自解若徒與攻表非但頭痛不減恐里證增劇矣太陰病亦有頭痛者經云霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中湯主之霍亂太陰證也頭痛發熱是陰病有轉陽之機惟亟去其裡寒則病出於陽而可治矣少陰一經與太陽相表裡太陽之脈浮少陰之脈沉經云病發熱頭痛脈反沉若不瘥身體疼痛宜四逆湯蓋沉非太陽之脈即不得同太陽發表之例而與以大發其汗矣太陰少陰其脈上至頸胸中而還不循於頭應無頭痛證然陰陽出入互相輸應其機正妙於轉不能呆執而論至厥陰之脈循喉嚨之後上入頏顙連目眥上出額與督脈會於巔病亦有頭痛者如經云乾嘔吐涎沫頭痛者吳茱萸湯主之是也厥陰頭痛往往直升巔頂其有痛甚入連於腦而手足寒者不治太陽經病不解轉傳入府者其人頭痛而小便不利治當不從經解而從府解如經云服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓白朮湯主之蓋所以運胸中之陽以化寒水之氣使從小便則解故曰小便利則愈也由是推之其有熱結於府頭痛小便不利而又加以口渴則宜以甘寒瀉其府熱而頭痛自愈其法又可會矣太陽之邪並於上則頭項強痛並於下則項背強痛經云太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯主之太陽病項背強𠘧𠘧無汗惡風者葛根湯主之此以有汗無汗分別風寒與發熱同義又經云病者身熱足寒頸項強急惡寒時頭熱面赤目脈赤獨頭面搖卒口噤背反張者痙病也另詳痙門又結胸者項亦強如柔痙狀下之則和宜大陷胸丸蓋氣結於胸則項牽連而強故下之則和此雖見項強證而其邪又不關太陽也身痛身痛亦太陽表證欲發其表宜以汗解然陰陽表裡互有出入在權其輕重而善治之不能執一也其宜汗解者如經云太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之又云太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者以大青龍湯發之此發汗之正法也至於太陽之邪連及少陽則如經云傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡桂枝湯主之此專用少陽和解之法而兼桂枝以和太陽之表則又不純用汗法矣而脈必以浮為斷若脈沉者即不得治表如經云病發熱頭疼脈反沉若不瘥身體疼痛當救其里宜四逆湯又云發汗後身疼痛脈沉遲者桂枝芍藥生薑人參新加湯主之又云少陰病身體疼手足寒骨節痛脈沉者附子湯主之其間治法天淵在相其緩急以分別先後如傷寒醫下之續得下利清穀不止身疼痛者急當救里後身疼痛清便自調者急當救表救里宜四逆湯救表宜桂枝湯仲景論中本身昭晰不得以身痛屬表證概與發表致召亡陽之變也身痛同為表證然濕家之為病一身盡疼此邪著於裡外舍於肌肉之間要當溫經使自作汗而解無徑行發表之理如經云風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之又曰風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣惡風不欲去衣或身微腫者甘草附子湯主之此二者當溫經則其汗自透若大發其汗病反不除不嘔不渴方可溫經由此推之則嘔而且渴又屬濕熱壅滯汗法尤忌矣故仲景又曰太陽中暍者發熱惡寒身重而疼痛要之濕淫與熱淫皆能使身疼痛雖宜得汗而解而汗法不可一例施也霍亂下利本屬陰病陰病轉陽往往見身疼痛之證治宜先溫其里乃攻其表如理中四逆輩是也至吐利止而身痛不休當消息和解其外宜桂枝湯小和之此在仲景論中有法有方可以遵循其有寒盡化熱轉成陽明燥渴證者則又當別論矣凡用汗法宜相其人之津液經云脈浮緊者法當身疼痛宜以汗解之假令尺中遲者不可發汗何以知之然以榮氣不足血少故也又瘡家雖身疼痛不可發汗汗出則痙凡用汗法者其慎諸有身疼痛而兼體重者有但體重而身不疼者有身疼痛而體不重者如傷寒脈浮緊一身盡疼痛必惡寒體重嘔逆又傷寒脈浮緩身不疼但重乍有輕時無少陰證者此均當大發其汗也至少陰病四肢沉重其脈則沉而不浮矣他如風溫為病自汗出身重多眠三陽合病腹滿身重難以轉側與夫太陽中暍者身重而疼痛皆申發汗之禁總之體重亦有宜汗不宜汗之辨可與身痛參看腰痛一證其由頭疼身痛而牽連及之者同屬太陽表證表解則痛自已矣兼濕者當察其兼證分別寒濕與濕熱依法施治但太陽病與少陰相為表裡腰痛又須防腎虛之候不可不察四肢痙痛者同屬太陽經脈之郁與身痛參看痛在周身者邪之分布也痛在一處者邪之專注也專注之邪其血脈必別有凝泣之處須於解表藥加一二引經藥方驗其風寒暑濕之辨尤必察其兼證分別施治庶無差忒頭眩附目眩搖頭頭痛屬太陽證其有頭不痛而但苦眩旋者則得之陽明者居多凡病初起即苦頭眩者有風有熱有痰如經云陽明病但頭眩不惡寒故能食而咳其人必咽痛陽明病以能食為中風是因風而頭眩者也又云陽明病脈遲食難用飽飽則微煩頭眩必小便難此欲作谷疸瘀熱在裡乃發疸黃是因熱而頭眩者也由是而推之於痰則挾風為風痰挾熱為熱痰凡痰必有其致痰之因審其所因以治生痰之本則痰自去此皆實證立治之大法至於少陽之為病則為目眩目眩與頭眩有別而總為陽熱上升之所致也其有太陽病誤施汗下因虛致冒而頭眩者經云太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者真武湯主之又傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之是虛寒之候亟與溫里補虛猶虞不及總之汗下不可誤施經云動氣在左不可發汗發汗則頭眩動氣在右不可下下之則頭眩動氣在下不可下下之則猝起頭眩仲景早垂深戒矣又少陰病下利止而頭眩時時自冒者死諸逆發汗劇者言亂目眩者死此陰竭而虛陽上脫不可復救有搖頭者與頭眩又有別經云獨頭面搖卒口噤背反張者痙病也另詳痙門更有搖頭言者里痛也亦尚非逆候至於陽反獨留形體如煙燻直視搖頭者此為心絶必不可救咳咳之一證在尋常感冒由風邪襲於皮毛內合於肺其證但鼻塞聲重而不發熱人多目為傷風輕症而忽視之不以為意然致咳之因已有寒熱內外之不同矣若發熱而咳其病亦有傳變正不以咳為肺疾概從肺經論治也太陽病表證不解與寒飲相合因而致咳者經云傷寒表不解心下有水氣乾嘔發熱而咳者小青龍湯主之蓋內外合寒非溫不解方用麻黃桂枝所以去外寒也半夏乾薑所以去內寒也而佐以芍藥五味以收肺氣之逆此純溫之劑也至於肺脹咳而上氣煩躁而喘脈浮者即用本方加石膏蓋其肺氣已熱而中挾寒飲上凌及肺故不廢麻桂之辛溫而加石膏以降肺金清肅之氣使水從下趨此熱因寒用又非純溫所宜矣若陽明熱甚火來乘金因熱致咳者不但誤與麻桂變證不小即半夏之辛溫亦所不宜當遵仲景法以栝蔞根易半夏而欲折陽明之熱舍石膏又誰與歸其有自表入里轉屬少陽者經云傷寒中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或咳者小柴胡去人參大棗生薑加乾薑五味子主之蓋小柴胡湯之用半夏乃逐飲之聖藥又有柴胡黃芩以和在表之邪復用乾薑五味以收肺氣之逆且有黃芩而乾薑不嫌於過溫有半夏而五味亦不嫌於過斂也少陰為水臟全賴君火以化氣故與太陽相表裡其有陽邪陷入陰中而咳者如經云少陰病四逆其人或咳者四逆散加乾薑五味子湯主之蓋陽陷入陰其人四逆用柴胡以啓其生陽乾薑五味化飲平逆此乃和劑而非溫劑也若少陰君火自病者如經云少陰病下利六七日咳而嘔渴心煩不得眠豬苓湯主之此已從陽熱化氣其下利乃陽熱下利以豬苓湯分調水道則煩渴平而咳利均止矣凡此皆不宜純溫之證其宜急溫者則如經云少陰病腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳者真武湯加五味子細辛乾薑主之此則少陽本藏虛寒之病陽衰陰盛當急溫而無疑矣衄血衄血者邪熱在表也邪在於表宜以汗解不得汗因致衄經云傷寒脈浮緊不發汗因致衄者麻黃湯主之此非麻黃湯之治衄也謂宜麻黃而不依法以麻黃湯發汗乃作衄也又曰傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裡仍在表也當鬚髮汗若頭痛者必衄宜桂枝湯此又非桂枝湯之治衄也謂宜桂枝而不依法以桂枝湯發汗乃成衄也衄與汗同義而衄家不可發汗發汗則額上陷脈緊急直視不能眴不得眠是衄解之後無再發汗之理蓋風寒在表先犯太陽從陽化熱逼血妄行故經曰陽盛則欲衄又曰太陽病脈浮緊發熱自衄者愈是在經之邪隨衄而解則知衄正邪解之候也至陽明病口燥但欲漱水不欲咽者此必衄陽明熱甚則口燥而熱尚在於經未入於裡故但欲漱水不咽以此為欲衄之兆亦以熱在表故也太陽病當汗不汗轉從衄解其不當汗而妄汗者莫如誤發少陰汗擾動陰血為變滋烈經云少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出是名下厥上竭為難治則又不得責其為表熱矣二者一則誤於當汗不汗其變小一則誤於不當汗而汗其變大用藥者可不慎歟鼻鳴附鼻如煙煤鼻如扇張太陽中風鼻鳴乾嘔鼻鳴者風邪干肺也肺主皮毛風邪襲於皮毛之間未經深入故但取輕揚之劑解散其皮毛之邪則鼻鳴自已矣若挾熱者則鼻鳴而干宜兼清肺胃之熱然此猶淺焉者也至邪熱爍肺則鼻如煙煤是肺氣將絶亟與大劑甘寒生津瀉熱猶恐不及矣更有鼻孔扇張者或由痰鬱或由熱鬱其病亦尚淺而可治倘因虛竭鼻中之氣出入皆微或出多入少亦屬敗證百難救一耳聾耳聾屬少陽證少陽當半里半表邪入少陽挾痰上升清竅為蒙治當清解少陽則耳聾自罷又有發汗太過因虛而致耳聾者經云未持脈時病人叉手自冒心師因教試令咳而不咳者此必兩耳聾無聞也所以然者以重發汗虛故如此又曰病人兩耳無所聞者以虛故也既責其為虛不但不宜再發其汗而且不宜妄下惟有以輕清之劑通調表里使邪氣漸退粥食漸加正氣漸復自然而愈不能強治咽痛咽痛一證陰陽寒熱所因不同最難辨認大凡陽熱之證多起於太陽而陽明與少陽亦互見之陰寒之病多中於少陰而太陰與厥陰亦牽及之其間溫涼異治倘辨證先錯率意投劑召變甚捷可不慎諸風邪從皮毛而入首犯太陽肺先受邪與痰涎互結則咽痛而梗與以驅風利咽其邪尚淺而易療其結之甚者則加以紅腫則當參用破結消腫之品又甚者熱浮之氣彌滿三陽與毒涎惡血兩相膠結頃刻之間脹塞咽喉致氣不得通而死或用吐法以宣其痰涎或用刺法以去其惡血救之不容須臾緩矣凡陽熱之證雖至險極惡人猶易識至少陰咽痛人多不識即識之而溫里之劑又多畏而不敢輕投殊不知陰寒之甚格陽於上乃致咽痛真寒假熱非溫不辦而溫法又各有別不容概施如經云少陰病二三日咽痛者可與甘草湯不瘥者與桔梗湯又云少陰病咽中痛半夏散及湯主之又云少陰病咽中傷生瘡不能語言聲不出者苦酒湯主之此雖少陰病以尚無下利逆冷諸變而證有輕重方亦有緩急其不取寒涼直折一也若咽痛而復下利則如經云少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人咽痛者通脈四逆加桔梗湯主之此因陰寒氣盛元陽將脫故宜亟使陽氣歸根是非峻溫不可矣凡咽痛之宜用溫藥者仲景原為真寒假熱者之立法若辨證不的為禍甚速倘非陰盛陽衰之候即不得施回陽勝陰之法故仲景又曰少陰病下利咽痛胸滿心煩者豬膚湯主之蓋彼因下利而陽亡此因下利而陰涸治又不同也更有陽熱熾甚痰涎湧結其脈反遲而協熱下利者此又屬陽證似陰之候此惟吐法為最善經云病胸上諸實胸中鬱郁而痛不能食欲使人按之而反有涎唾下利日十餘行其脈反遲寸口脈微滑此可吐之吐之則利止蓋胸中閉塞者不可汗又胸中閉塞者不可下仲景已有深戒而病當胸中當吐之且吐中自寓發散之義則可使結開而利止也渴附口苦口甘口渴一證乃傷寒一大關鍵不可不細心體察凡風寒在表邪在太陽不言渴也一入陽明則不惡寒反惡熱口漸知渴矣其有太陽病初起而即口渴者溫熱之邪自里出表雖見表證邪不在表故仲景云太陽病發熱而渴不惡寒者為溫病又太陽中暍者其人汗出惡寒身熱而渴也是不宜發汗與風寒異治至於濕溫初起濕未化熱口雖渴卻不能飲化熱之後始大渴引飲矣故就口之渴與不渴可以辨邪之表裡中之寒熱而即可以渴之微甚辨熱之輕重臨證時首宜辨此凡陽熱之證一見口渴即當泄熱為主至三陰證如系本藏虛寒自病者本無所為渴也然陰病轉陽亦有發熱而渴者當與和調津液不宜直折其熱緣陰盛陽微口渴正陽回之候泄熱則轉瀉其陽矣其或陰液乾涸燥渴轉甚則量與泄熱之中尤當佐以養陰生津此為大渴引飲者立法若口中雖渴而不欲飲見水輒避者即屬真寒假熱之候其脈或沉細或空大當以溫劑引陽歸根則虛寒之狀反著倘誤與寒涼禍不旋踵矣霍亂後多見口渴之證經云霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之蓋吐下之後津液已傷且陰病轉陽宜以理脾為主使脾氣散精表裡並解津液流通而渴自止矣切不可見渴投涼反增其逆且五苓散上升脾津下通水道若太陽病不解犯入膀胱之府其人有表裡證渴欲飲水水入則吐者亦主此方以白飲和服方寸七多服暖水汗出愈若無太陽表證而但脈浮發熱渴欲飲水小便不利者五苓之溫化又所不宜則宜豬苓湯化熱通津凡若此者皆與治陽熱之渴用甘寒者不同也凡口渴多屬裡證若熱在經而不在裡者口雖渴但欲漱水不欲咽此欲作衄血及斑疹之先兆不可遽用寒涼壅遏邪氣當審其病因而施解表之法又凡諸渴證欲飲水者但當少少與之令胃氣和則愈若飲水過多恐增喘噦悸滿諸變不可不慎別有口苦者乃邪熱入於少陽故仲景以口苦咽乾為少陽病之提綱至於口甘內經稱為脾疸由濕熱鬱蒸而成宜掃除胸中陳腐之氣此二者口雖不渴總屬熱證辛溫忌投矣下集桂枝湯桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩切大棗十二枚擘上五味㕮咀以水七升微火煮取三升去滓適寒溫服一升服已須臾啜熱稀粥一升余以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令大汗如水流漓病必不除若一服汗出病瘥停後服不必盡劑若不汗重服依前法又不汗小促役其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病症猶在者更作服若汗不出者乃服二三劑禁生冷黏滑肉面五辛酒酪臭惡等物此太陽中風主治之方也經云太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之衛強故陽脈浮營弱故陰脈弱衛本行脈外又得風邪相助則其氣愈外浮陽主氣風為陽邪陽盛則氣易蒸故陽浮者熱自發也營本行脈內更與衛氣不諧則其氣愈內弱陰主血汗為血液陰弱則液易泄故陰弱者汗自出也嗇嗇惡寒內氣虛也淅淅惡風外體疏也惡寒未有不惡風惡風未有不惡寒二者相因所以經文互言之翕翕發熱乃就皮毛上形容鼻鳴陽邪壅也乾嘔陽氣逆氣太陽中風之病狀如此諦實此證宜用此方凡欲用仲景方先須辨證也愚按本方主以桂枝者以桂枝能入營而作汗非徒取其能驅風也輔以芍藥者以芍藥能和營而息風非徒取其能止汗也桂枝得芍藥於發汗之中仍寓斂液之義芍藥得桂枝於益血之內仍收化氣之功而桂枝又藉生薑之力攘之於外以導風邪之出路芍藥又得甘草大棗之力安之於內以斷風邪之入路凡讀仲景方宜深求制方之義再按仲景於桂枝湯一方獨自注云桂枝本為解肌解肌者乃解肌表之邪不使擾動營血以是示微發汗於不發汗之中也而要之桂枝本入營作汗之品賴有芍藥以收斂汗之功今人誤謂桂枝一味能固衛而斂汗失之遠矣觀其服法云服已須臾啜熱稀粥一升以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水流漓此段斡旋之法具有精義啜熱稀粥者欲藉穀氣以助營血而資其汗若如水流漓則營弱者益不能勝故曰病必不除此中用法之妙全在營衛強弱上討消息處桂枝湯方者先須參透此一關再按經文云太陽病頭痛發熱汗出惡風者桂枝湯主之此與前條太陽中風陽浮陰弱一段大同小異何所取而重疊其文耶殊不知彼條言太陽中風乃昭揭中風之病狀而示之以主方此條渾言太陽病則如所云頭項強痛惡寒乃中風傷寒公共之太陽病即如本條之頭痛發熱惡風亦太陽中風傷寒之公共證更何所辨而知其孰宜麻黃孰宜桂枝耶其關鍵全以汗出為辨汗出便是桂枝的對之證若汗不出而發熱脈浮緊者是麻黃湯證誤用桂枝之辛熱而益以芍藥之酸收則寒邪凝結漫無出路變證蜂起即顯犯桂枝之大禁矣此仲景教人辨證之法也桂枝湯有禁用三法用桂枝者不可不知其一曰桂枝本為解肌若其人脈浮緊發熱汗不出者不可與也夫脈浮緊發熱汗不出是寒傷營之脈證宜麻黃湯主治脈浮緩發熱汗自出是風傷衛之脈證宜桂枝湯主治今見寒傷營之脈證即不得主用風傷衛之治法以其同見頭項強痛惡寒之太陽病同見浮脈最易牽混故重言之曰常須識此勿令誤也不此之察而誤用之其人營氣本實邪無出路不能外泄勢必上湧又得辛熱酸斂之性怫鬱其營中之血不至吐膿血不止故曰凡服桂枝湯吐者其後必吐膿血也至若酒客病不可與桂枝得湯則嘔仲景即自注云以酒客不喜甘故也諸家皆以酒客胃中濕熱素盛故得之便滿逆而嘔則由此而類推之凡感外邪而中挾溫熱者其不可亂用桂枝也審矣豫每見今人誤認桂枝湯為斂汗之藥凡遇濕溫風熱等證見其汗出熱不解竟敢恣用桂枝而無忌此又仲景當日意料之所不及用之貽誤不自咎其辨證之不清反謂古方之難用而鑑此者轉引叔和桂枝下咽陽盛則斃之説實其言以相戒其亦勿思之甚也矣桂枝之禁例既明則凡見頭項強痛惡寒之太陽病而汗出脈浮緩者主以桂枝之解肌而無疑矣解肌者乃解其肌表之邪而仍欲使之微似有汗也故經中又指桂枝曰發汗欲發汗而仍不欲大發其汗故又曰和和則發汗之機必不迅故他方皆刻期取效而桂枝服後病證仍在仍宜作服觀其服法云若一服汗出病瘥停後服不必盡劑若不汗重服依前法又不汗後服小促役其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病證仍在更作服若汗不出乃至二三劑以是為調和營衛解肌發汗一定不易之法但須辨證明晰用當其病即未遽效仍堪復進以視麻黃湯之大發其汗固有間也再太陽病以風傷衛寒傷營二證分主桂枝麻黃二法其説始於許學士而前明方中行及國朝如喻嘉言程郊倩輩皆仍其説唯柯韻伯謂桂枝湯一方凡頭痛發熱惡風惡寒其脈浮弱汗自出者不拘何經不論中風傷寒雜病鹹得用此發汗若妄汗妄下而表不解者仍當用此解肌推柯氏之意蓋以仲景於桂枝湯散見於他經而用之者亦多故主論若此而豫就經文細繹之如經所云傷寒發汗解半日許復煩脈浮數者可更發汗宜桂枝湯一條柯氏殆據此以為傷寒亦宜桂枝之證而不知經文明言傷寒發汗解其用麻黃髮汗可知矣半日許復煩脈轉浮數則因發汗之後在外之風邪易襲而在內之營氣已傷煩因心擾數屬陰虛奚堪復任麻黃其改用桂枝者非太陽傷寒之宜桂枝乃發汗後復煩脈浮數之的宜桂枝也至陽明病之亦有用桂枝者若經雲陽明病脈遲汗出多微惡寒者表未解可發汗宜桂枝湯是也按陽明本自多汗但不惡寒而惡熱今微惡寒則太陽之表證未罷亟當從太陽領出其邪此又非陽明病之宜桂枝乃太陽表未解之的宜桂枝也且其下文又云陽明病脈浮無汗而喘者發汗則愈宜麻黃湯合此二條觀之要知邪自太陽初入陽明須察其邪自太陽中風而來而中風證未罷仍當從中風主治之法邪自太陽傷寒而來而傷寒證未罷仍當從傷寒主治之法益見桂枝麻黃分主中風傷寒二證為天然不易之定法矣至三陰經本無發汗之例雖太陰病有脈浮可發汗之條亦非太陰病宜用桂枝亦以脈浮自當發汗而本方芍藥生薑大棗亦得資以奠安太陰若謂妄汗妄下之後而表未解者亦宜用此解肌試思何謂妄汗正謂桂枝證誤用麻黃麻黃證誤用桂枝耳且發汗後不可更用桂枝湯下後不可更用桂枝湯仲景設有明禁其誤下後間有宜桂枝者亦須察其脈浮其氣上衝者方可與之若不爾者不可與也仲景經文本自明白易曉若如柯氏所云則求之多歧適以滋亂轉使後之學者漫無頭緒可尋況風寒之邪皆從太陽而入太陽一經實為傷寒家開手第一工夫此等源頭不清開手便錯余故不憚援引經文以直破其惑而臨證處方庶有把握不致淆亂矣再按桂枝湯固為太陽初病時立法而日久亦有宜用之者總以外證未解為辨至柯氏所指誤汗誤下兩層此恰渾舉不得自當分辨蓋誤汗之後即有亡陽漏風諸變另有專方救逆雖仲景有傷寒大下後復發汗心下痞惡風者表未解也不可攻痞當先解表之條亦因下後發汗其痞究從誤下所致又從惡寒上辨出表未解來自當先解其表表解乃可攻痞此外別無汗後復用桂枝明文更有表裡錯雜之邪宜先里後表者若下利清穀腹脹滿身疼痛者則里證急而表證緩又當先溫其里後攻其表必俟下利止而身痛未休再當消息和解其外解外仍不離桂枝成法此中出入變化具有元機全要平時體認經文臨病詳參脈證則一百一十三方皆無誤用奚啻桂枝也再按桂枝固為太陽主方而救逆之法從此方變化者無論增一味減一味其主治各不同但就原方增減分兩即另立湯名治證迥別如本方加桂即名桂枝加桂湯重加芍藥即名桂枝加芍藥湯之類是也另宜逐方詮解附於本方之後而總以此方為祖故以是冠一百一十三方之首桂枝加桂湯桂枝湯方內更加桂二兩成五兩上五味以水七升煮取三升去滓溫服一升桂枝湯治太陽中風乃兩和營衛之聖藥今照原方加桂便另立湯名主治之病迥然不同可見先聖立方之嚴即分兩亦不可苟也經云太陽傷寒者加溫針必驚也又云燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯與桂枝加桂湯更加桂按奔豚乃少陰腎水凌心之證何以主用桂枝太陽之方蓋太陽為諸陽主氣而行太陽之令者心主是也太陽傷寒理應發汗汗為心之液全賴心主之一點真陽以化氣而逐邪誤用溫針則寒邪不外出而內入內入則擾動心營心陽受寒邪所迫君主孤危腎水得而乘之矣核起而赤心陽不能內固色已外見氣從少腹上衝心水邪上逆真火將受其撲滅故亟灸核上先使溫經而復陽而方中重用桂枝者以桂枝能直入營分扶陽化氣得此重兵以建赤幟則君主得自振拔而腎水自降泄北補南一舉兩得此為制勝之師按此方加桂或作桂枝外另加肉桂但有成五兩三字當仍屬桂枝且此證本因太陽病誤治所致重用桂枝正以一物而全收安內攘外之功桂枝加附子湯於桂枝湯方內加附子一枚炮去皮破八片余依前法此治汗出漏風之方也經云太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者此方主之按太陽病當取漐漐微似有汗者佳不可令如水流漓大發其汗衛撤藩籬營不能守遂至漏不止矣腠理既開風無所御而津液盡隨陽氣外泄無復滲膀胱而柔筋脈乃至小便難四肢微急難以屈伸種種變證皆因衛氣撤護致在內之津液直趨於外有莫御之勢亟當乘津液尚未全涸之時固其衛氣使趨外之津液還返於內故主桂枝湯加附子以固衛之法為救液之法也此證全是衛氣外泄津液內奪之象而附子乃燥液之品仲景偏用之救液此何義也蓋衛陽將脫非得附子之大力必不能迅走衛分以回陽今但使衛陽亟固先斷其外泄之路則就吾身固有之津液還返於內陽回而津自復更無藉他藥生津潤燥之力此其立方之所以聖也按此方之加附子與亡陽證之用真武同義喻嘉言曰此陽氣與陰津兩亡更加外風復入與亡陽證微細有別故主桂枝加附子以固表驅風而復陽斂液也桂枝新加湯芍藥生薑各一兩人參三兩桂枝三兩去皮芍藥四兩甘草二兩炙人參三兩生薑四兩大棗十二枚擘上六味以水一斗一升微火煮取三升去滓分溫服經云發汗後身疼痛脈沉遲者此湯主之身疼痛表未盡也脈沉遲里已虛也得之發汗之後則營血亦微矣故加芍藥以益營血加生薑以逐表邪以其脈沉遲不得不兼人參以補虛但一桂枝湯而稍一轉移已非桂枝之舊法故曰新加按柯韻伯傷寒論翼謂此方系去芍藥生薑新加人參加芍藥生薑乃坊本之訛但諸家皆仍加芍藥生薑之説想柯氏之意以脈見沉遲似無再加芍藥之理但病屬發汗以後則芍藥益營之功自宜重恃程郊倩曰身疼痛脈沉遲得之太陽病發汗後非屬陰寒乃由內陽外越營陰遂虛營主血血少則隧道窒塞衛氣不流通故身疼痛於桂枝湯中倍芍藥生薑養營血而從陰分宣邪加人參托裡虛而從陽分長陰脈沉者營氣微遲者營中寒此沉遲之脈非本來之沉遲乃汗後新得之沉遲故治法亦新加人參而倍薑芍此説亦自解得明白喻嘉言曰桂枝人參湯中去芍藥者以誤下而邪入於陰芍藥主陰不能散陽邪也桂枝新加湯中倍芍藥者以誤汗而陽虛邪湊恐陽孤無偶用芍藥以和之俾不至散亂也此説亦當參看芍藥甘草附子湯芍藥三兩甘草二兩炙附子一枚泡去皮切八片以上三味以水五升煮取一升五合去滓分溫服此桂枝湯去桂薑棗加附子亦桂枝湯之變方也經云發汗病不解反惡寒者虛故也此湯主之發汗後之惡寒其非表邪可知若因其惡寒而投以桂枝誤也故以附子合芍藥甘草從陰分斂戢其陽陽回而虛自止矣凡汗後之惡寒屬虛汗不出之惡寒屬實不得以汗不出之惡寒攔入陽虛一路此又仲景言外之意宜識之桂枝甘草湯桂枝四兩去皮甘草二兩炙上二味以水三升煮取一升去滓頓服此於桂枝湯中摘取二味遂變和營固衛之方而為理虛護陽之劑也經云發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之汗者心之液發汗過多則心氣虛虛故悸叉手冒心心陽失護而求衛也因虛而悸故欲得按乃於桂枝湯中盡撤生薑之辛散大棗之泥滯並無藉於芍藥之酸收獨任桂枝入心營以助陽又得甘草逗遛中土載還陽氣則心君復辟中宮謐泰矣徐靈胎曰此乃亡陽之輕者同一心下悸證若其人頭眩身瞤動振振欲劈地又屬真武湯矣一證而輕重不同用方迥異其義精矣茯苓桂枝甘草大棗湯茯苓半斤桂枝四兩去皮甘草二兩炙大棗十二枚擘上四味以甘瀾水一斗先煮茯苓減二升納諸藥煮取三升去滓溫服一升日三服作甘瀾水法取水三斗置大盆內以杓揚之水上有珠子五六千顆相逐取用之發汗後其人臍下悸者欲作奔豚此湯主之按心下悸是心陽虛臍下悸是腎氣動腎氣一動便有凌心之勢若俟其奔豚既作則補救已晚亟當乘此欲作未作之時預伐其謀桂枝保心氣茯苓泄腎邪甘草大棗培土製水煮以甘瀾水取其力薄不致助水也再論桂枝加桂湯不用茯苓者以氣已從少腹上衝心難恃茯苓滲泄之力故寄重任於桂枝以助心陽而伐腎氣此則水勢尚在下焦尚堪培土以制水也桂枝去桂加茯苓白朮湯芍藥白朮茯苓生薑各三兩甘草二兩炙大棗十二枚擘上六味以水八升煮取三升去滓溫服一升小便利則愈此治太陽里水法也經云服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者本方主之按頭項強痛翕翕發熱明是桂枝湯證乃服湯已或下之而本證仍在反加無汗汗不外出水氣停於心下因而滿痛但滿而不硬痛而尚微又非誤下結胸之比皆因小便不利膀胱之水不行致中焦之氣不運雖見太陽諸證病恰在府而不在經病不在經不當攻表自宜去桂病已入府法當行水宜加苓朮培土製水而薑芍甘棗乃得協成利水散邪之功以其證本太陽故雖去桂而仍以桂枝名湯也按此條方中行謂中風兼寒故桂枝及下法皆誤喻嘉言亦從其解而程郊倩又以中氣虛津液少立論總覺牽強附會與方義不甚相合惟柯韻伯主太陽府病立論王晉三亦以為治太陽里水法則理路乃覺清晰而方義亦屬尉貼今從之桂枝人參湯桂枝四兩去皮甘草四兩炙白朮三兩人參三兩乾薑三兩上五味以水九升先煎四味取五升納桂枝更煮取三升去滓溫服一升日再服夜一服此理中加桂枝而易其名也經云太陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裡不解者此湯主之蓋因誤下則裡虛裡虛則熱入裡虛不能內守遂協同外熱變而為利下不止而必又心下痞硬邪滯上焦猶兼半表故曰表裡不解夫下利不止何以不用四逆以救里以表熱未罷也心下痞硬何以不用瀉心以清裡以裡氣已虛也此證輒防陽併入陰故不但瀉心中芩連不可用即桂枝湯中芍藥亦不可用乃取桂枝行陽於外以解表理中助陽於內以止利此表裡兩解之治法也葛根黃連黃芩湯葛根半斤黃連三兩黃芩二兩甘草二兩炙上四味以水八升先煮葛根減二升納諸藥煮取二升去滓分溫再服此桂枝證誤下救逆之法非葛根湯之變制也經云太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者此湯主之夫誤下致利亦有陽盛陽虛之別但下利脈不應促而反促者此屬表未解之診也邪束於表陽擾於內喘而汗出乃表裡俱熱之象則治表不宜用桂枝而當改葛根以解表治里不宜用理中而反取芩連以清裡矣按此當與前條桂枝人參證參看柯韻伯曰上條脈證是陽虛此條脈證是陽盛上條表熱裡寒此條表裡俱熱上條表裡俱虛此條表裡俱實同一協熱利同是表裡不解而寒熱虛實攻補不同補中亦能解表亦能除痞寒中亦能解表亦能止利神化極矣桂枝去芍藥湯於桂枝湯方內去芍藥余依前法此當與上條葛根黃連黃芩湯證參看經云太陽病下之後脈促胸滿者桂枝去芍藥湯主之按下後脈促同屬表未解之診而促脈中又有陽盛陽虛之別誤下脈促雖與上條同然既無下利不止之證又無喘而汗出之證但見胸滿而又非結胸硬痛者比則胸滿非下後陽邪之內陷實因下後陰邪之上搏但當扶陽逐邪不宜再益陰氣故治法仍主桂枝而方中芍藥自在急刪之列也桂枝去芍藥加附子湯於桂枝湯方內去芍藥加附子一枚泡去皮破八片余依前法太陽病脈促胸滿者桂枝去芍藥湯主之若微惡寒者去芍藥方中加附子湯主之按上條脈促胸滿是下後陽虛陰邪搏膈但當薑桂助陽散邪不宜芍藥益陰增滿若微惡寒則搏膈之陰邪漸將侵越衛外瞬有亡陽之變矣前方雖去芍藥而薑桂之力尚不足以勝回陽之任故必藉附子之剛烈迅走衛外以驅陰而復陽預杜亡陽之變也桂枝加厚朴杏仁湯於桂枝湯方內加厚朴二兩杏仁五十個去皮尖余依前法此亦當與葛根黃連黃芩湯證參看經云太陽病下之微喘者表未解故也桂枝加厚朴杏仁湯主之同屬喘之一證有表有里不可不辨下後汗出而喘者其喘必盛是裡熱壅遏火炎故也下後微喘者其汗必不大出是表邪閉遏氣逆故也表未解仍宜從表治主桂枝解表加朴杏以下逆氣按本草厚朴杏仁主消痰下氣故又曰喘家作桂枝湯加厚朴杏子佳也喻嘉言曰此誤風邪誤下作喘治法之大要若寒邪誤下作喘當用麻黃石膏即此可推桂枝加芍藥湯於桂枝湯方內更加芍藥三兩隨前共六兩余依桂枝湯法桂枝湯原方倍加芍藥即另立湯名主治各別與桂枝加桂湯同妙經云本太陽病醫反下之因爾腹滿時痛者屬太陰也桂枝加芍藥湯主之大實痛者桂枝加大黃湯主之按腹滿時痛痛而不實即已伏下利之機但究因太陽誤下表邪內陷留滯太陰非太陰藏寒本病故仍用桂枝領出太陽陷入太陰之邪但倍芍藥滋脾陰而除滿痛耳再按腹滿時痛倍用芍藥得毋疑其太斂程郊倩曰以其邪陷已深一經桂枝升舉陽邪正防脾陰隨表藥而外泄此為獨得真解桂枝加大黃湯桂枝二兩去皮大黃一兩芍藥六兩生薑二兩切甘草一兩炙大棗十二枚上六味以水七升煮取三升去滓溫服一升日三服按此條之大實痛則非腹滿時痛之比矣腹滿時痛是脾陰為虛陽所擾大實痛則脾氣與陽氣俱實大實大滿似宜亟下但陽邪究從太陽陷入太陰與陽明胃實不同仍宜桂枝領出陽邪但加大黃微導其滯則表裡兩邪各有去路程郊倩曰二證雖屬太陰然來路實從太陽則脈必尚有浮者存再按柯韻伯謂腹滿時痛是太陽太陰並病若大實痛是太陽陽明並病滿而時痛下利之兆大實而痛燥屎之徵桂枝加芍藥小試建中之劑桂枝加大黃微示調胃之功王晉三亦沿此論然經文大實痛三字直接上文並無轉屬陽明之説而仲景於太陰病亦有當行大黃芍藥之條若果陽明胃實則大實痛正承氣亟攻之證而桂枝加大黃究屬和解之法並非下奪之劑恐柯氏所云未免失之穿鑿桂枝去芍藥加蜀漆龍骨牡蠣救逆湯桂枝三兩去皮甘草二兩炙生薑三兩切大棗十二枚擘蜀漆二兩洗去腳龍骨四兩牡蠣五兩熬上為末以水一斗二升先煮蜀漆減二升納諸藥煮取三升去滓溫服一升經云傷寒脈浮醫以火迫劫之亡陽必驚狂臥起不安者此方主之按亡陽有二義發汗過多厥逆筋惕肉瞤而亡陽者乃亡陰中之陽故用真武輩以救之此以火劫致變驚狂臥起不安而亡陽者乃亡陽中之陽故無藉於芍藥斂陰而當加重鎮入心之品以急挽飛越之陽神也此證稍緩須臾神丹莫挽故重加救逆二字喻嘉言曰桂枝湯除去芍藥非惡其酸收也蓋陽神散亂當求之於陽桂枝湯陽藥也然必去芍藥之陰重始得疾趨以達於陽位既達陽位矣其神之驚狂者漫難安定更加蜀漆為之主統則神可賴之以安矣緣蜀漆之性最急丹溪謂其能飛補是也更加龍骨牡蠣有形之骨屬為之舟楫以載神而反其宅亦於重以鎮怯澀以固脫之外行其妙用如是而後天君復辟聿追晉重耳越勾踐返國之良圖矣桂枝甘草龍骨牡蠣湯桂枝一兩去皮甘草二兩炙牡蠣二兩炙龍骨二兩上為末以水五升煮取二升去滓溫服八合日三服經云火逆下之因燒針煩躁者此湯主之此證較上條稍輕以元陽尚未至飛越故無取蜀漆迅疾之性急追以滋擾但下後燒針誤而再誤因致煩躁則此煩躁非太陽病汗不出之煩躁又非少陰病吐利後之煩躁是已具起臥不安之象而為驚狂之漸即伏亡陽之機故主桂枝入心助陽而加甘草龍骨牡蠣以安中而鎮逆也桂枝麻黃各半湯桂枝一兩十六銖去皮芍藥生薑甘草麻黃各一兩去節杏仁二十四枚湯浸去皮尖及雙仁者大棗四枚擘上七味以水五升先煮麻黃一二沸去上沫納諸藥煮取一升八合去滓溫服按太陽病得之八九日如瘧狀發熱惡寒熱多寒少此當正邪勝復之關一則慮其邪之轉屬一則慮其正之已虛不可不細辨矣若其人不嘔清便欲自可是邪不屬裡一日二三度發是邪已外向脈又微緩則胃氣足以敵邪乃為欲愈之徵倘脈微而惡寒甚此陰陽俱虛不可更發汗更下更吐恐誤治傷陽反生他變若其人面色反有熱色者是為欲解未解之象以其不能得小汗以宣助陽氣致陽氣雖不內擾卻怫鬱於皮膚肌肉之間其身必癢此明證也故主桂麻而小其制但得汗出而邪盡解矣桂枝二麻黃一湯桂枝一兩十七銖芍藥一兩六銖麻黃十六銖去節生薑一兩六銖切杏仁十六個去皮尖甘草一兩二銖炙大棗五枚擘上七味以水五升先煮麻黃一二沸去上沫納諸藥煮取二升去滓溫服一升日三服此條與桂枝麻黃各半湯證相類經云服桂枝湯大汗出脈洪大者與桂枝湯如前法若形如瘧日再發者汗出必解宜用此湯彼以陽氣怫鬱在表故主桂麻並用此屬大汗出之後故桂枝略重而麻黃略輕桂枝二越婢一湯桂枝去皮芍藥甘草各十八銖炙生薑一兩三錢切大棗四枚擘麻黃十八銖去節石膏二十四銖碎綿裹上七味㕮咀以水五升先煮麻黃一二沸去上沫納諸藥煮取二升去滓溫服一升本方當裁為越婢湯桂枝湯合飲一升今合為一方桂枝二越婢一經云太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可更汗宜桂枝二越婢一湯按無陽何以用石膏因此諸家詮釋不得其解或謂無陽乃無津液之義與亡陽有別並與陽虛不同或謂陽邪來乘正陽為其所奪至柯韻伯謂此條必有錯簡愚按無陽二字乃謂無陽邪也發熱惡寒熱多寒少疑屬陽邪為患但脈見微弱知邪不在陽分也既無陽邪不當更汗文義便明白易曉故主以桂枝之二越婢之一以和陰而宣陽也按越婢二字之義喻嘉言謂化熱生津柔緩之性比女婢尤為過之恐仲景命名取義當不若是之遠也外臺方作越脾內經言脾不濡脾不能為胃行其津液此起太陰之津以滋陽明之液成無己亦作發越脾氣解桂枝加葛根湯桂枝湯原方加葛根四兩桂枝芍藥各減一兩余同上六味以水一斗先煮葛根減二升去上沫納諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥經云太陽病項背強𠘧𠘧反汗出惡風者此方主之按太陽病頭項強痛強不及背項背強𠘧𠘧五字連讀𠘧音殊鳥之短羽者動則引頸𠘧𠘧然形容病人俯仰不能自如之狀此屬太陽兼陽明之象汗出惡風太陽未罷故仍以桂枝為主方加葛根者恐邪氣愈轉愈深亟伐陽明之邪也麻黃湯麻黃三兩去節桂枝二兩去皮甘草一兩炙杏仁七十個湯泡去皮尖上四味以水九升先煮麻黃減二升去上沫納諸藥煮取二升半去滓溫服八合覆取微似汗不須啜粥余如桂枝法將息此太陽傷寒主治之方也經云太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之同屬脈浮頭項強痛惡寒之太陽病發熱汗出惡風脈緩者名為中風或已發熱或未發熱惡寒體重嘔逆脈陰陽俱緊者名曰傷寒中風頭痛傷寒亦頭痛中風發熱傷寒亦發熱中風惡風傷寒亦惡風至身疼腰痛骨節疼痛乃屬體重之徵似與中風不同然身疼痛亦有宜桂枝解表者然則從何辨其證之的宜麻黃不宜桂枝耶其著眼全在無汗而喘四字麻黃走衛發汗杏仁下氣定喘以是為主而佐以桂枝入營散寒甘草和中保液視桂枝之調和營衛以取微汗者不同也桂枝麻黃分主太陽病風傷衛寒傷營二證桂枝湯中不用麻黃而麻黃湯中何以反用桂枝或謂麻黃髮汗太峻取桂枝以監製之豫則不信也按桂枝辛熱能入營而助汗桂枝湯中尚取芍藥監製桂枝豈桂枝反能監製麻黃蓋凡病之在太陽者全要從營衛上討消息風則傷衛衛氣疏則風易入衛屬陽風為陽邪兩陽相合則衛強而營反弱故脈緩而有汗衛邪易出但取主桂枝入營助汗而無取麻黃過泄衛分之氣也寒則傷營營氣實則寒易著營主陰寒為陰邪兩陰相搏則寒凝而衛亦閉故脈緊而無汗營邪不易出宜主麻黃走衛發汗必兼藉桂枝以散營分之寒也此本發汗之峻劑故更不須啜稀粥以助藥力也不用薑棗者以薑性升而棗味滯慮礙杏仁下氣定喘之功也脈陰陽俱緊者名曰傷寒則緊固為寒邪之定脈矣然沉緊者不宜發汗當以浮字為辨故又曰脈浮者病在表當發汗宜麻黃湯也脈之緊者與數不同緊以象言有堅凝之義數以數言有迅走之狀傷寒脈數者為欲傳也但浮而數則病尚在表可乘其半渡而擊之亦宜以麻黃湯發汗也麻黃湯為發汗之重劑投之不當變逆非小即宜發汗之劑亦須相人之津液若尺中遲者不可發汗身重心悸者不可發汗咽喉乾燥者不可發汗淋家不可發汗瘡家不可發汗衄家不可發汗亡血家不可發汗汗家不可重發汗俱在麻黃之禁例矣然當發汗者或疑畏而不發邪氣不從表解轉陷入里其變逆亦不小總須審系營衛俱實無汗而喘者可放心用之而無疑此全在平脈辨證工夫傷寒有從衄解者經云太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗服藥已微除其人發煩熱目瞑劇者必衄衄乃解所以然者陽氣重故也麻黃湯主之又云傷寒脈浮緊不發汗因致衄者麻黃湯主之注家隨文衍義謂衄後當再用麻黃以散餘邪按傷寒有衄家不可發汗之禁而經又言太陽病脈浮緊發熱身無汗自衄者愈衄後病解何以又用麻黃之峻攻柯韻伯謂麻黃湯主之五字當屬未致衄以前是前人倒找文法此言近是再按太陽病之主麻黃湯總以脈浮無汗而喘為對證之藥其有太陽與陽明合病喘而胸滿者邪結上焦不可妄下治不從陽明而從太陽仍宜麻黃湯也太陽病過十日以上脈浮細嗜臥設胸脅滿痛者屬柴胡證若脈但浮者是邪尚戀太陽治亦從太陽而不從少陽仍宜麻黃湯也再按柯韻伯謂桂枝麻黃是通治太陽風寒之藥中風之重者便是傷寒傷寒之輕者便是中風桂枝發汗之輕劑麻黃髮汗之重劑不必在風寒上細分只在有汗無汗上著眼此啓後人淆亂之階不可為訓要之麻黃髮汗杏仁定喘無汗而喘是傷寒之的證麻黃湯是傷寒之的方用者審之麻黃杏仁甘草石膏湯麻黃四兩去節杏仁五十個甘草二兩炙石膏半斤碎綿裹上四味以水七升先煮麻黃減二升去上沫納諸藥煮取二升去滓溫服一升此即麻黃湯去桂枝而加石膏也即用以治發汗及下後汗出而喘之證然必審無大熱方可用之有大熱者恐兼里證無大熱者明是表邪未徹留戀在肺肺主衛故仍宜麻杏直泄肺邪去桂枝者辛熱之性不宜再擾動營血也加石膏者降肺金清肅之氣用以生津而保液也中風之誤下而喘者用厚朴杏仁加入桂枝湯中傷寒汗及下後而喘者用石膏加入麻黃湯中喻嘉言曰仲景正恐人以傷寒已得汗之證認為傷風有汗而誤用桂枝故特出汗後下後兩條示以同歸麻黃一治之要益見營衛攸分而成法不容混施矣程郊倩曰喘而汗出脈必浮數可去桂枝之熱而加石膏之涼亦脈浮數者可發汗之一徵也大青龍湯麻黃六兩去節桂枝二兩去皮甘草二兩炙杏仁五十粒去皮尖生薑三兩切大棗十二枚擘石膏如雞子大碎上七味以水九升先煮麻黃減二升去上沫納諸藥煮取三升去滓溫服一升取微似汗汗出多者溫粉撲之一服汗者停後服汗多亡陽遂虛惡風煩躁不得眠也此即合麻桂二方去芍藥而加石膏也按桂枝主風傷衛麻黃主寒傷營此則傷風見寒傷寒見風主大青龍方中行喻嘉言皆以此分為三大綱疏太陽上中下三篇程郊倩謂本論太陽煩躁一條系寒溫雜邪溫得風而陽熱化氣陰寒在表郁住陽熱之氣在經而生煩熱熱則並擾其陰而作躁故加石膏於麻黃湯中使辛熱之氣變為辛涼則寒得麻黃湯之辛熱而外解熱得石膏之辛涼而內解又以傷寒脈浮緩一條屬小青龍湯大字系坊本之訛而柯韻伯又謂此屬麻黃證之劇者由風熱相搏故倍麻黃以發汗加石膏以除煩不宜以風寒兩傷立説愚按經文中風脈浮緊傷寒脈浮緩本自回環互説若攔入溫熱一路則溫熱未有內鬱而不口渴者何以本文並不言渴而發熱惡寒身疼痛皆中風傷寒互見之證雖煩躁似屬熱象亦因不汗出則風寒之邪無從解邪無從解則鬱而成熱因致煩躁故方中麻桂生薑辛熱之藥用至十兩有奇而石膏僅如雞子大一塊又得甘草大棗相輔借其生津之妙用以作汗而除煩止躁謹將經文兩條闡發於後經云太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之按太陽中風脈當浮緩是桂枝湯證今浮緊是見寒傷營脈又發熱惡寒身疼痛而不汗出又與中風之汗自出者不同不汗出則風邪之傷衛者得寒凝而多束寒邪之傷營者得風拒而內郁內煩外躁正陽氣壅遏不宣將致化熱入里之候治法雖仍不離乎麻黃桂枝而證已見煩躁辛熱之性慮劫傷津液故加入石膏且得棗甘相輔用以生津而保液此正立方入微入細處不可概執石膏為涼解之品也又經云傷寒脈浮緩身不疼但重乍有輕時無少陰證者大青龍湯發之按傷寒二字便已括無汗而喘之證在內傷寒脈當浮緊是麻黃湯證今浮緩是見風傷衛脈傷寒體重身疼腰痛骨節疼痛今身不疼但重乍有輕時則又非全屬傷寒證其為風寒錯雜之邪顯然以無汗而喘之傷寒病又得風之陽邪相合非惟桂枝湯中之芍藥不宜用以斂陰即麻黃湯之純行辛熱亦恐有礙風邪則宜理肺金清肅之氣佐麻桂以驅風散寒故不得不借資於石膏矣此條徐靈胎疑有錯簡程郊倩謂小青龍之誤總由忘卻傷寒自有無汗而喘之本證在至張令韶又謂此證太陽兼太陰此方即越脾之義尤鑿按大青龍原為陽氣壅實汗不出者立法若汗出惡風便是中風之本證只取和營衛以解肌誤服此湯即致厥逆筋惕肉瞤種種亡陽之變然風寒兩傷之證又必辨無少陰證相雜蓋少陰之脈微細正恐與太陽浮緩浮弱之脈相混喻嘉言謂無少陰證仲景原文但重乍有輕時六字早已挈明言但身重而無少陰之欲寐其為寒因可審況乍有輕時不似少陰之晝夜俱重又兼風因可審此解頗為入細至成注謂不久厥吐利則尤辨證之顯者矣再按青龍取義諸家皆神其説以形自己一篇絢爛文字余則謂其理甚庸試觀夏日地中之陰氣未升而天上之陽威已極人在氣交之中皆苦炎熱霎時間龍升云興滂沱遍野人皆精神爽慧也天地鬱蒸得雨則和人身煩悶得汗則解其理本庸惟其庸也正其所以神乎小青龍湯麻黃三兩去節芍藥三兩五味子半升乾薑二兩甘草二兩炙桂枝三兩半夏三兩洗細辛三兩上八味以水一斗先煮麻黃減二升去上沫納諸藥煮取三升去滓溫服一升此治太陽寒水之法也雖同名青龍卻與大青龍主治迥別太陽表邪不解與陽熱相搏宜大青龍發之太陽表邪不解與寒飲相格宜小青龍逐之經云傷寒表不解心下有水氣乾嘔發熱而咳此為小青龍的對之證故方中用麻黃桂枝細辛之屬以散寒而解表用半夏乾薑五味之屬以蠲飲而降逆復以芍藥甘草兩和表裡但表裡錯雜之邪病出恆不一致若微利者水已下趨故去麻黃加芫花順其勢以導之也若渴者寒已化熱故去半夏加栝蔞根反其用以治之也若噎者寒格上焦也故去麻黃加附子以散寒若小便不利少腹滿者水蓄下焦也故去麻黃加茯苓以利水若喘者水邪射肺也故去麻黃加杏仁以下肺氣此方本不至發汗故或用麻黃或去麻黃皆相表裡證之輕重而為加減之圓機活法也按大青龍發汗以除陽熱猶龍之乘雲上天而布甘霖小青龍逐水以散陰寒猶龍之翻波逐浪而歸江海制方之妙亦猶龍之變化而不可測乎真武湯茯苓三兩芍藥三兩生薑三兩切白朮二兩附子一枚炮去皮破八片上五味以水八升煮取三升去滓溫服七合日三服真武為北方司水之神方名真武主鎮北方寒水之氣實與小青龍湯對峙蓋太陽膀胱少陰腎一臟一腑同居北方寒水之位傷寒表不解心下有水氣乾嘔發熱而咳此水氣屬太陽府邪太陽主表宜小青龍發之少陰病腹痛小便不利四肢沉重疼痛自下利者此水氣屬少陰藏邪少陰主裡宜真武湯鎮之方中茯苓白朮培土以制水也生薑附子溫中以散寒也更加芍藥斂少陰浮越之氣使水得坎止而歸其故宅此誠有合乎真武坐鎮北方攝伏龍蛇之神力矣但水邪泛溢其病體恆變動不居若咳者加五味子半斤細辛乾薑各一兩以水邪射肺法當兼散肺邪也若小便利者去茯苓以水道已通無取再泄腎氣也若下利去芍藥加乾薑二兩以脾氣下泄用以醒脾也若嘔者去附子加生薑足前成半斤以胃氣上逆用以溫胃也隨其逆而治之如法其諸神之神者乎按真武主治少陰水氣固與小青龍對峙而太陽病誤服大青龍致成厥逆筋惕肉瞤之變者亦用此以救逆蓋龍非得水不靈當陽氣鬱蒸之時但得龍升雨降煩熱頓除若淫溢不止則龍適滋害攝伏龍蛇舍真武更向何處乞靈哉再按太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者亦主此湯救逆按汗多亡陽何以不用四逆輩而用真武蓋四逆功在以熱卻寒真武功在以土製水水氣奔越不宜火溫而宜土製用真武者不宜混作回陽一例看麻黃附子細辛湯麻黃二兩去節細辛二兩附子一枚炮去皮破八片上三味以水一斗先煮麻黃減二升去上沫納藥煮取三升去滓溫服一升日三服經云少陰病始得之反發熱脈沉者麻黃附子細辛湯主之按少陰病不當發熱今始得之而反發熱則邪始入少陰猶兼表邪矣發熱脈浮者當從太陽解肌發汗之例今脈沉則諦實少陰病無疑少陰本有發汗之禁以其始得發熱故借細辛為嚮導引麻黃入散少陰之邪而亟亟加附子溫經助陽托住其里俾腎中真陽不致隨汗飛越此少陰溫經散邪之大法也徐靈胎曰此條必先從少陰諸現症細細詳審然後反發熱知為少陰之發熱否則何以知其非太陽陽明之發熱耶又必候其脈象之沉然後益知其為少陰無疑也凡審證皆當如此麻黃附子甘草湯麻黃二兩去節甘草二兩炙附子一枚炮去皮上三味以水七升先煮麻黃一二沸去上沫納諸藥煮取三升去滓溫服一升日三服經云少陰病得之二三日麻黃附子甘草湯微發汗而即自注云以二三日無里證故微發汗也按少陰與太陽為表裡三陰經中惟少陰尚有汗解之理以二三日之少陰病而無吐利煩躁嘔渴之裡證則邪未深入微發汗者即和解之義故可撤細辛之嚮導而但以甘草梢殺麻黃之力更得熟附固陽自無強責汗之弊此又少陰溫經散邪之緩法也葛根湯葛根四兩麻黃二兩去節桂枝二兩去皮芍藥二兩酒洗甘草二兩炙生薑三兩切大棗十二枚擘上七味㕮咀以水一斗先煮麻黃葛根減二升去沫納諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥余如桂枝法將息及禁忌此治太陽傷寒傳入陽明未離太陽故以葛根為君並加麻黃於桂枝湯中仍屬太陽與陽明同治並非陽明經之主方也故經云太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯主之太陽病項背強𠘧𠘧無汗惡風者葛根湯主之此明以有汗無汗辨邪之或自中風而來或自傷寒而來但見陽明一證即用葛根一味亟伐陽明之邪而太陽未盡之邪仍不離桂枝麻黃分別風寒主治其有太陽陽明同時病發不分先後者則太陽之邪合陽明胃中之水穀而下奔必自下利仍以葛根湯主治以葛根湯中自有麻桂並伐太陽之邪也今人誤以葛根湯為陽明經藥大謬葛根加半夏湯葛根湯原方加半夏半升洗煎服法同太陽與陽明合病者必自下利葛根湯主之不下利但嘔者葛根加半夏湯主之此合病中亦有主風主寒之不同喻嘉言曰風者陽也陽性上行故合陽明胃中之水飲而上逆寒者陰也陰性下行故合陽明胃中之水穀而下奔下奔則利但用葛根已足解邪而止利上逆則嘔必加半夏方能滌飲而止嘔此以見先聖制方一藥不苟處白虎湯石膏二斤碎知母六兩甘草二兩粳米六合上四味以水一斗煮米熟湯成去滓溫服一升日三服經云三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗者白虎湯主之按三陽合病其脈浮大其證欲眠而目合則汗諦實此三陽合病之證而見腹滿身重者陽盛於經裡氣莫支也口不仁而譫語者熱淫於內神識為蒙也因而濁氣上蒸則面垢陰津下泄則遺尿若汗若下皆足以奪津液而召變計惟白虎肅肺金而清胃熱則表裡之邪自解耳諸書皆謂白虎主治陽明經熱此三陽合病而何以獨責陽明因謂陽明居中土萬物所歸三陽合邪故統於陽明主治愚按方中之用石膏知母取降肺金清肅之氣而滋腎水生化之源水出高源胃土藉資灌溉兼以甘草粳米載之逗遛上焦以生津而化燥則煩熱自蠲所謂治病必求其本也又經云傷寒脈滑而厥者里有熱也白虎湯主之按厥之一證總為入里之候但有寒熱之不同脈微而厥為寒厥脈滑而厥為熱厥前因失治而致厥若既見厥而復失治則熱邪愈轉愈深陰津之亡可立而待故急用白虎保陰津而驅陽熱以預弭熱深厥深之變也再按大青龍之與白虎同用石膏而主治各別青龍主雨譬如甘霖遍野而蒸郁自消也白虎主風譬如涼飈薦爽而炎熇若失也故用青龍以無汗為辨用白虎以自汗為辨白虎加人參湯白虎湯原方加人參三兩煮服同前法白虎西方金神也主治在肺並非專屬陽明茲之加人參者則治在陽明胃矣按經文於白虎湯證並無一言及渴而加人參方中或曰口燥渴或曰大煩渴或曰渴欲飲水數升此多得之汗吐下後內熱未除胃液垂涸故加入人參於白虎湯中是移清金滌熱之功轉而為益胃滋干之用庶幾瀉子實而補母虛兩收其利再按白虎湯證主散邪滌熱故不宜加入人參留戀邪氣此加人參用以救垂盡之胃氣故宜人參益胃而白虎乃得協成其清熱止渴之用古聖立方一藥豈輕加哉小柴胡湯柴胡半斤黃芩三兩人參三兩甘草三兩半夏半斤洗生薑三兩切大棗十三枚擘上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服此少陽之主方也按仲景以口苦咽乾目眩責少陽之為病而少陽之邪大都從太陽傳入此當半里半表之界邪正分爭因而往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔此皆少陽必有之證邪不在表不宜汗吐又不在裡不宜妄下獨主小柴胡為和解之劑但轉入之邪恆難捉摸其或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳皆非少陽必有之證而少陽病見此另有加減之法而規矩總不難乎小柴胡湯也按柴胡感一陽之氣而生少陽之邪非此不解合之甘草以兩和表裡此為小柴胡湯中不可移掇之藥生薑兼散太陽之寒使半表之邪得從外宣黃芩兼清陽明之熱使半里之邪得從內徹半夏有逐飲之能取以降逆而止嘔大棗擅和中之用取以安土而戢木用人參者非取其補正以邪在半表半裡之界預行托住裡氣使邪不內入也以此為往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔諸證的對之主方其加減諸法並按本方逐條互參於後本方之用人參以邪正相爭故宜輔正用半夏以證見嘔滿故宜止嘔若但煩而不嘔不嘔則並無飲邪何須半夏逐飲不嘔而但煩則煩非本證心煩喜嘔之煩而正為熱邪摶結將欲入里之煩若用人參不能轉正反能實邪禍不小矣故並去之而加栝蔞實以栝蔞實能降熱痰而開胸痹也半夏辛溫而性燥寒濕之痰宜之熱痰則不宜也若渴則津液已竭並無痰之可伐矣本方雖有黃芩甘草大棗能養正而祛熱但胃中津液非人參不能鼓舞故加人參以喚胃氣而得栝蔞根以生津潤燥人參仍無實邪之患也黃芩苦寒本文用此以清半里之熱若腹中痛則陽邪轉陷太陰豈能復任黃芩之苦寒乎不宜黃芩何以反宜芍藥以證雖屬太陰而病因卻是從陽邪陷入故用此以約脾陰也太陽病轉屬太陰但於桂枝湯中加芍藥若桂枝加芍藥湯是也少陽病兼見太陰即於柴胡湯中加芍藥即本方之加芍藥是也後人執藥治病遂謂芍藥能止腹痛試思太陰寒濕之證芍藥宜之乎熱發大實痛之證芍藥宜之乎殊不知陽邪陷里本方中自有柴胡人參生薑半夏已足以升舉陽氣而理脾胃之困但加芍藥以約陰則邪返於陽而陰亦安不除痛而痛自止仍不離和解之法也本方之用大棗慮木邪賊土用以安中也若脅下痞硬則邪滯中焦便不宜大棗之守中矣脅下屬少陽部位痞硬則氣血交結故以牡蠣佐柴胡一以散氣分之結一以軟血分之堅也少陽屬木木乘土位則土不能制水故有心下悸小便不利之證若用黃芩是助水邪為瘧矣小便不利但當利其小便本方中已有參甘薑棗之植土而但當加茯苓之淡滲以兼導其水也渴為邪欲入里之兆若不渴則無里證可知外有微熱則太陽之表證未罷又可知矣表邪未解人參實邪究宜去之本方加桂枝則又易表裡和解之制而偏乎表以為治也咳屬水邪射肺人參大棗究非咳證所宜生薑散表有餘溫里不足故以乾薑易生薑以散寒而逐水用五味者以肺非自病乃水邪從下而上因之致咳故以五味與乾薑同用一以散水邪一以收肺逆與風火淫肺之忌五味不同也不去黃芩者留以制相火而存肺陰也按小柴胡湯之主少陽乃傷寒一大關鍵此際出則陽入則陰凡陽邪之入陰者全賴少陽把關守隘使不得遽入於陰治之可不慎歟凡他經所有之證少陽病皆得兼見其隨證加減之法絲絲入扣頭頭是道讀仲景書者當於此處猛下一參傷寒中風有柴胡證但見一證即是不必悉具此非教人以辨證之可從略也蓋病入少陽正當陰陽相持之會此際不出於陽即入於陰故一見少陽證即當用柴胡從少陽領出其邪使不內入須知其辨證從寬處正是其治病吃緊處且少陽本傳入之邪多有或然或不然之證又安能逐證一一見到也再按渴之一證有出入之不同傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者此少陽而兼太陽也治可從少陽而不從太陽服柴胡湯已渴者屬陽明也治又當從陽明而不從少陽凡見渴證者宜審少陽之脈責弦其有太陽病不解轉入少陽未經吐下而脈沉緊者但見脅下硬滿乾嘔不能食往來寒熱諸證則脈沉緊正是邪從少陽將欲入里之候急當用小柴胡從少陽領出其邪則太陽之邪自解陽明病脅下硬滿不大便而嘔舌上白胎者此邪未結於陽明但當用小柴胡湯使上焦得通津液自下則胃和而陽明之邪自解婦人熱入血室是熱邪已乘虛陷入陰分何以主小柴胡湯少陽之藥按三陰三陽少陽為從陽入陰之樞紐陽經熱邪已越少陽而陷入陰分亟當從陰分領出其邪使還從少陽而出也大柴胡湯柴胡半斤黃芩三兩半夏半斤洗芍藥三兩枳實四枚炙大黃二兩生薑五兩切大棗十二枚擘上七味以水一斗二升煮取六升去滓再煎溫服一升日三服此小柴胡去人參甘草加枳實芍藥大黃乃少陽陽明合治之方也往來寒熱熱結在裡是邪已內實因其內實而下解之乃通以去塞之法也心中痞硬嘔吐下利是邪已內陷因其內陷而下奪之此通因通用之法也表未罷仍主柴胡里已實宜加枳實大黃不用人參甘草者懼其緩中而戀邪也加芍藥者取其約營而存液也按少陽病本不可下此則熱邪結於陽明而少陽證仍在故主此為表裡兩解之法柴胡加芒硝湯柴胡二兩十六銖黃芩甘草炙人參生薑各一兩切半夏二十銖洗大棗四枚芒硝二兩上八味以水四升煮取二升去渣納芒硝更煮微沸分溫再服不解更作服小柴胡湯原方加芒硝而分兩較輕蓋潮熱固為內熱之候但其人業已微利是裡氣已通特因下不如法故府邪未解則無取大柴胡之峻攻其柴胡證之未罷者亦已先用小柴胡湯以解外此更無須柴胡之全劑故復減約其分兩而但加芒硝以微通其滯此劑之最輕者張令韶謂當用大柴胡湯加芒硝與經旨大悖矣徐靈胎曰大柴胡湯加大黃枳實乃合用小承氣也此加芒硝乃合用調胃承氣也皆少陽陽明同治之方柴胡加桂枝湯柴胡四兩黃芩人參桂枝芍藥生薑各一兩半甘草一兩半夏二合半大棗六枚擘上九味以水七升煮取三升去滓分溫服此合桂枝小柴胡二方而各取其半用以和解太陽少陽各半之邪經云傷寒六七日發熱微惡寒支節煩疼此太陽之表邪未解也微嘔心下支結則證兼少陽矣按支結者結而不痛與結胸殊不可攻下只宜和解此方之義和營衛以通津液仲景已自注明白故發汗多亡陽譫語者亦用此方以復陽和陰今人誤用此湯以發汗豈非大謬柴胡桂枝幹薑湯柴胡半斤桂枝去皮黃芩各三兩栝蔞根四兩乾薑三兩牡蠣三兩熬甘草二兩炙上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服初服微煩復服汗出便愈此方全是小柴胡加減法柯韻伯曰心煩不嘔而渴故去參夏加栝蔞根胸脅滿而微結故去棗加牡蠣小便雖不利而心下不悸故不去黃芩不加茯苓雖渴而表未解故不用參而加桂枝並以乾薑易生薑散胸脅之滿結也可見小柴胡加減之法出入變化妙用無窮真神於法者矣柴胡加龍骨牡蠣湯柴胡四兩半夏二合洗龍骨人參茯苓鉛丹生薑切桂枝去皮牡蠣各一兩半煅大黃二兩大棗六枚擘上十一味以水八升煮取四升納大黃切如棋子更煮一二沸去滓溫服一升傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之按此證全屬表邪誤下陰陽擾亂濁邪填膈膻中之氣不能四布而使道絶使道絶則君主孤危因而神明內亂治節不行百骸無主以致胸滿煩驚小便不利譫語一身盡重不可轉側種種皆表裡虛實正邪錯雜之證但病屬表邪陷入則陰陽出入之界全藉少陽為樞紐故以柴胡名湯而陰邪之上僭者復桂枝生薑半夏以開之陽邪之下陷者用黃芩大黃以降之使上下分解其邪邪不內擾而兼以人參大棗扶中氣之虛龍骨牡蠣鉛丹鎮心氣之逆且柴胡大黃之攻伐得人參扶正以逐邪而邪自解龍骨牡蠣之頑鈍得桂枝助陽以載神而神自返其處方之極錯雜處正其處方之極周到處不如此其何能施補天浴日之手而建扶危定傾之業耶神哉弗可及已小建中湯桂枝三兩去皮芍藥六兩甘草二兩炙生薑三兩切膠飴一升大棗十一枚擘上六味以水七升煮取三升去滓納膠飴更上微火消解溫服一升日三服此桂枝湯倍芍藥而加膠飴也本太陽表藥一轉移而即變為安太陰之制神化極矣傷寒二三日心中悸而煩者中土虛餒都城震恐桂枝湯本主和營復陽而但倍芍藥加膠飴奠安中土故曰建中甘能滿中仍與桂枝湯同故重申其禁曰嘔家不可用建中湯以甜故也傷寒陽脈澀陰脈弦腹中急痛者先與小建中湯蓋陽脈澀則中土已虛陰脈弦則木來賊土之象腹中急痛是脾陽下陷此時若用小柴胡制木其如中土先已虛餒何夫中土虛餒非甘不補土受木克非酸不安必先以小建中湯扶植中土土氣既實若不瘥再以小柴胡疏土中之木用藥自有先後非先以小建中姑為嘗試也梔子豉湯梔子十二枚擘香豉四兩綿裹上二味以水四升先煮梔子得二升半納豉煮取一升半去滓分為二服溫進一服得吐者止後服此非吐法之主方也因誤汗吐下後正氣已傷邪留上焦擾動陽氣因生煩熱無論虛煩實煩皆宜此方取吐虛煩者若經中所指虛煩不得眠反覆顛倒心中懊憹胃中空虛客氣動膈按之心下濡舌上胎飢不能食不結胸但頭汗出皆虛煩之候也實煩者若經中所指胸中窒心中結痛皆實煩之候也此方主宣膈上之熱使得湧吐而解若本有寒分者不宜故經有病人舊微溏不可與之戒今人用梔子俱炒黑不能作吐本方生用故入口即吐也香豉蒸罯而成性主上升故能載之以作吐乃吐法中之輕劑也凡用吐法當先審邪之高下心下滿而硬痛者結胸證也宜陷胸法心下痞硬者虛痞也宜瀉心法此則心中懊憹心中結痛心下濡故宜湧吐毫釐千里須當辨之梔子甘草豉湯於梔子豉湯方內加入甘草二兩余依前法得吐止後服梔豉湯證具若少氣者本方加甘草按少氣乃津液被奪加甘草者取其能益中而存液並取其能載藥而速吐也梔子生薑豉湯於梔子豉湯方內加入生薑五兩余依前法得吐止後服梔豉湯證具若嘔者本方加生薑蓋嘔則膈上之熱已犯及胃生薑升散領引胃中之熱一概湧之上出此導引之藥也梔子乾薑湯梔子十四枚擘乾薑二兩上二味以水三升半煮取一升半去滓分三服溫進一服得吐者止後服傷寒醫以丸藥大下之身熱不去微煩者梔子乾薑湯主之喻嘉言謂此乃溫中散邪之法余謂不然溫中不宜用梔子且中已宜溫何堪再吐按誤下多陽邪內陷此則雖經誤下而身熱不去微煩則陽邪猶未入里故可引之上越必以乾薑斷陽邪入里之路而梔子乃得載邪上出一寒一溫相反而實以相成此之謂聖梔子厚朴湯梔子十四枚擘厚朴四兩薑炙枳實四兩水浸去穰炒以上三味以水三升半煮取一升半去滓分三服溫進一服得吐止後服此雖取吐而不專恃乎吐法也傷寒下後心煩腹滿臥起不安者梔子厚朴湯主之蓋表邪雖經誤下心煩則邪半踞於上腹滿則邪半陷於下故以梔子湧上邪而以枳朴通下氣亦兩解之法也枳實梔子豉湯枳實二枚梔子十四枚豉一升上三味以清漿水七升空煮取四升內枳實梔子煮取二升下豉更煮五六沸去滓溫分再服覆令微似汗梔豉湯散上焦之結熱為取吐之輕劑此則先用清漿水空煮減三升則水性熟而沉使梔豉從枳實下行之力清上泄下以此通利三焦營衛得和而病自愈若有宿食者加大黃如博棋子大五六枚則食復之治法亦不外是矣因食而復去其食而邪自化從此可悟治病總當責邪也梔子柏皮湯梔子十五枚甘草一兩炙黃柏一兩上三味以水四升煮取一升半去滓分溫再服傷寒身黃髮熱者梔子柏皮湯主之按身黃髮熱熱已有外泄之機從內之外者治其內故用梔子柏皮直清其熱則熱清而黃自除用甘草者正引藥逗遛中焦以清熱而導濕也按梔豉湯乃取吐之輕劑此方之用梔子得炙草之甘緩黃柏之苦降而梔子又能從中焦分解濕熱洵乎處方之妙乃用藥而不為藥用者也瓜蒂散瓜蒂熬黃赤小豆各一分上二味各別搗篩為散已合治之取一錢匕以香豉一合用熱湯七合煮作稀糜去滓和散頓服之不吐者少少加得快吐乃止諸亡血虛家不可與之凡邪在胸中者宜吐所謂在上者因而越之是也三味皆探吐之品必煮作稀糜留戀中焦方得引邪上湧而出梔豉湯吐虛邪此方以吐實邪同一吐法而所主不同五苓散茯苓豬苓去皮白朮各十八銖澤瀉一兩六銖半桂枝半兩去皮上五味為末以白飲和服方寸匕多飲暖水汗出愈此治太陽表病不解邪陷入府凡渴而小便不利者宜之亦兩解表裡之法也以其有表證故用桂枝主表而化氣以其有里證故用苓澤主裡而利水水不下趨勢必上泛故用白朮奠安太陰以土製水此方不宜湯而宜散以散能逗遛中焦通調水道更借多服暖水之力使水精四布上輸下注熱解津回則小便利而渴自止矣按渴欲飲水有類白虎加人參證何以彼宜白虎此宜五苓蓋白虎主治陽明經熱五苓主清太陽府熱白虎證脈洪大是表證已解五苓證脈浮數表證未解以此為辨諸家皆以導濕滋干釋五苓之取義但以桂枝之辛溫苓澤之滲泄即白朮亦主燥脾與生津潤燥之義全不相涉而渴證宜之何也蓋此證由經入府水蓄於下不能輸津於上故治渴必先治水且散服而多飲暖水自有輸精散布之功豬苓湯豬苓去皮茯苓澤瀉滑石碎阿膠各一兩上五味以水四升先煮四味取二升去滓納阿膠煬消溫服十合日三服同屬渴欲飲水小便不利之證太陽從寒水化氣故宜五苓散主桂枝白朮之甘溫以宣陽而輸精陽明從燥土化氣故宜豬苓湯主滑石阿膠之涼降以育陰而利水但利小便還宜相人之津液若陽明汗出多而渴者是津液已虛便不宜重虛其津液也少陰病下利六七日咳而嘔渴心煩不得眠者何以亦主豬苓湯蓋咳渴嘔煩不得眠得之下利之後是陰津下迫陽邪上逆主豬苓湯育陰利水正以少陰腎與太陽膀胱一臟一腑相為表裡急引少陰之邪從府而解則下利得止而熱去津回矣文蛤散文蛤五兩上一味為散以沸湯和一方寸匕服湯用五合病在陽不從汗散反以冷水噀之灌之寒束其外熱被卻而不得去陽無出路彌更益煩水客皮膚肉上粟起陽氣為水邪所格故欲飲水反不得飲五苓散宣陽逐水則有餘育陰散熱則不足獨任文蛤一味可以兩收散熱導濕之功服文蛤散不瘥復用五苓散者以既得文蛤鹹寒之性清熱導濕免致增逆矣而表陽不宣水無出路文蛤不堪再任則仍取五苓宣陽逐水此救逆之次第也茯苓桂枝白朮甘草湯茯苓四兩桂枝三兩去皮白朮二兩甘草二兩炙上四味以水六升煮取三升去滓分溫三服此方主治太陰濕困而膀胱之氣不行經云心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者此湯主之按心下逆滿乃伏飲搏膈至於氣衝頭眩則寒邪上湧助飲為逆飲本陰邪故脈見沉緊脈沉不宜發汗誤汗則陽益不支而身為振搖故以桂枝茯苓扶陽化飲而加白朮甘草伸太陰之權以理脾而勝濕脾乃能為胃行其津液而膀胱之氣始化也再按金匱用此方以治痰飲其一曰心下有痰飲胸脅支滿目眩苓桂朮甘湯主之又曰短氣有微飲當從小便去之苓桂朮甘湯主之蓋治痰飲大法當以溫藥和之溫則脾陽易於健運而陰寒自化白朮茯苓雖能理脾而勝濕必合桂枝化太陽之氣以伐腎邪而通水道方能取效茯苓甘草湯茯苓桂枝各二兩去皮生薑三兩切甘草一兩上四味以水四升煮取二升分溫三服此即桂枝湯去芍藥大棗而加茯苓防水漬入胃而預杜其變也水停心下因致悸故主茯苓為治水之主藥甘草載桂枝入心以固陽生薑佐茯苓溫中心散寒俾水之停於心下者得桂薑之辛溫而解而茯苓乃得建利水之功五苓散用白朮理脾氣以輸精故渴者宜之此方用桂薑散水寒而逐飲故不渴者宜之再按此方及五苓散並茯苓桂枝甘草大棗湯茯苓桂枝白朮甘草湯俱相類五苓散散太陽之水停苓桂朮甘湯泄太陰之水蓄茯苓桂枝甘草大棗湯防少陰之水逆此方堵陽明之水漬數方增減不過一二味而主治各別能解此自不敢孟浪處方矣小承氣湯大黃四兩厚朴二兩炙去皮枳實三枚熬上三味以水四升煮取一升二合去滓分溫三服初服湯當更衣不爾者盡飲之若更衣者勿服之小承氣以大黃為君微加枳朴以開氣結不用芒硝迅走下焦經所謂微和胃氣勿令大泄下也故曰小凡矢未定成硬未可與大承氣者可先以小承氣試之腹中轉矢氣者大便已硬乃可攻也不轉矢氣者但初頭硬後必溏也同一承氣而有大小之分者大承氣枳朴重而益用芒硝以峻攻小承氣枳朴輕而不用芒硝以亟下故里證急者宜大承氣里證不甚急者宜小承氣是當細辨大承氣湯大黃四兩酒洗厚朴半斤炙去皮枳實五枚炙芒硝三兩上四味以水一斗先煮二物取五升去滓納大黃煮取二升去滓納芒硝更上微火一二沸分溫再服得下余勿服大承氣開陽明之結直達下焦其力猛而效速故曰大蓋胃大實故重任厚朴以破結而數獨倍於大黃矢已硬故雖有枳實以導下而功必資於芒硝至其煎法尤有深義厚朴枳實之汁以濃而力鋭大黃芒硝之性以生而力鋭故分作三次煎此斬關奪門之將用此以急下存陰也大承氣治陽明胃實之主藥必審明表證盡罷不惡寒但惡熱或潮熱汗出譫語腹滿痛或喘冒不能臥口乾燥脈滑而實或澀者方可用之下不宜早早則陽陷並不宜遲遲則陰亡恰好在陽明胃實之界一下奪而諸病盡解臨證時不可錯過陽明居中土萬物所歸無所復傳大熱入胃惟有下奪一法蓋陽明胃實之證有從太陽傳入者有從少陽轉屬者並有從三陰轉屬者三陰經中少陰更有急下之證此乃傷寒一大歸宿若應下失下變證蜂起津液之亡可立而待孟浪不可因循亦不可大承氣證非惟不大便腹滿痛者宜之即下利之證亦有宜從下奪者如經文所指下利不欲食下利心下硬下利脈反滑下利脈遲而滑少陰病自利清水色純青心下痛口乾燥者皆宜大承氣此通因通用之法不可不知調胃承氣湯大黃三兩清酒浸去皮甘草二兩炙芒硝半斤上三味㕮咀以水三升煮取一升去滓納芒硝更上火微煮令沸少少溫服調胃承氣湯以甘草緩硝黃下行之性使留戀中焦胃分以清熱而導滯不用枳朴以傷上焦之氣蓋熱邪聚胃宜分有形無形有形者當破其結而穢方解無形者但滌其熱而氣自和胃宜降則和故曰調胃桃核承氣湯桃仁五十個去皮尖桂枝二兩去皮大黃四兩芒硝二兩甘草二兩炙上五味以水七升煮取二升半去滓納芒硝更上火微沸下火先食溫服五合日三服當微利此治太陽瘀熱入腑膀胱蓄血其人如狂表已解而但少腹急結血自下者主用桃仁以利瘀承氣以逐實使血分之結熱亟從下奪與三承氣之攻陽明胃實者不同方主攻裡而仍用桂枝者用以分解太陽隨經之熱喻嘉言曰正恐餘邪稍有未盡其血得以留戀不下析義最精此先聖處方絲絲入扣處此與五苓散同為太陽府病立治法膀胱為太陽之府熱傷膀胱氣分則蓄溺當導其熱從小便而解熱傷膀胱血分則蓄血當導其熱從大便而解抵當湯水蛭三十個熬虻蟲三十個去翅足熬大黃三兩酒浸桃仁三十個去皮尖上四味為末以水五升煮取三升去滓溫服一升不下再服抵當攻血之峻劑也視桃仁承氣則加猛矣蓋病不止如狂而至於發狂則逆血攻心瞬將危殆雖表證仍在難任桂枝攻表雖少腹硬滿不事芒硝軟堅非迅走血分之品不能斬關取勝而桃仁大黃猶以力緩而難膺重寄故必資水蛭虻蟲方能直入血道峻奪其邪轉逆為順然抵當峻劑從何諦實血證可以用之無誤而仲景教人辨證之法全以小便之利與不利為斷小便不利非蓄血證小便自利非蓄水證故經特申言之曰小便不利者為無血也小便自利其人如狂者血證諦也諦者審也又當也言當審之至當也抵當丸水蛭二十個熬虻蟲二十五個去翅足熬桃仁二十個去皮尖大黃三兩上四味杵分為四丸以水一升煮一丸取七合服晬時當自下血若不下更服同一抵當而變湯為丸另有精義經云傷寒有熱少腹滿應小便不利今反利者為有血也當下之宜抵當丸蓋病從傷寒而得寒主凝泣血結必不易散故煮而連滓服之俾有形質相著得以逗遛血所並而逐之以視湯之專取蕩滌者不同也十棗湯芫花熬甘遂大戟大棗十枚擘上上三味等分各別搗為散以水一升半先煮大棗肥者十枚取八合去滓納藥末強人服一錢匕羸人服半錢溫服之平旦服若下少病不除者明日更服加半錢得快下利後糜粥自養太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之按下利嘔逆明是水邪為患但病屬太陽中風而來必須表罷可攻漐漐汗出有似表證但發作有惡寒非表矣頭痛有似表證但汗出不惡寒則非表矣而心下痞硬滿引脅下痛乾嘔短氣諸證全是水邪內壅之狀乃知汗出亦屬水氣外蒸頭痛亦屬水邪上逆主裡而不主表里未和則宜攻下但邪在胸脅與攻胃實不同法胃實者邪劫津液責其無水此則邪搏胸脅責其多水若施蕩滌腸胃之藥誅伐無過反滋變逆故用芫花甘遂大戟三味皆逐水之峻藥別搗為散而以大棗作湯取其甘味載藥入至高之分分逐水邪從上而下此法今人多畏而不敢用豈知不如此水邪何由攻下耶大陷胸湯大黃六兩去皮芒硝一升甘遂一錢匕上三味以水六升先煎大黃取二升去滓納芒硝一兩沸納甘遂末溫服一升得快利止後服結胸兼涉陽明仍用本湯大陷胸湯由胸膈直達腸胃亟從下奪不用一藥監製此最猛劣之劑故曰大經云太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之按動數變遲三十六字形容結胸之狀如繪蓋動數為欲傳之脈遲則不能復傳陽邪因誤下而內陷而里飲復與之相格心下因硬膈間拒痛本方雖用硝黃而關鍵全在甘遂末一味使下陷之陽邪上格之水邪俱從膈間分解而硝黃始得成其下奪之功若不用甘遂便屬承氣法不成陷胸湯矣又經云傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯若結胸無大熱者此為水結在胸膈也但頭微汗出者大陷胸湯主之觀此條云水結胸脅而仍主此者則全資甘遂逐水之功也大陷胸丸大黃半斤去皮葶藶半斤熬芒硝半斤杏仁半斤去皮尖熬黑上四味搗篩二味納杏仁芒硝合研如脂和散取如彈丸一枚別搗甘遂末一錢匕白蜜二合水二升煮取一升溫頓服之一宿乃下如不下更服取下為效禁如藥法結胸者項亦強如柔痙狀下之則和宜大陷胸丸按結胸而至於項強則胸結十分緊迫濁邪布滿胸中升而上阻津液不行筋脈失養故如柔痙狀邪踞於上法當峻下但湯劑直趨下焦必變湯為丸煮而連滓服之使其逗遛病所自上而下方能與邪相當而結自解喻嘉言曰方中用大黃甘遂芒硝可謂峻矣乃更加葶藶杏仁以射肺邪而上行其急煮時又倍加白蜜令留戀而潤導之而下行其緩必識此意方知用法之妙小陷胸丸黃連一兩半夏半升洗栝蔞實大者一枚上三味以水六升先煮栝蔞取三升去滓納諸藥煮取二升去滓分溫三服小結胸病正在心下按之則痛脈又浮滑視大結胸證從心上至少腹痛不可近者有間矣邪入未深故本方黃連清熱蔞半散結但開中焦之熱結勿犯下焦故曰小大陷胸證痛不可近小陷胸證按之則痛大陷胸證痛連心上小陷胸證正在心下同一陷胸證隔天淵不能通用白散桔梗貝母各三分巴豆一分去皮心熬黑研如脂上三味為末納巴豆更於臼中杵以白飲和服強人服半錢匕羸者減之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯身熱皮粟不解欲引衣自覆者若以水噀之洗之益令熱卻不得出當汗而不汗則煩假令汗出已腹中痛與芍藥三兩如上法此為寒實結胸立法以其胸之結也用桔梗貝母以開結以其寒之實也用巴豆以攻寒與大小結胸不同法必審無大熱者方可用寒實結胸恰從何辨其為寒實而可任此方之猛峻耶蓋本文明言病發於陽以冷水灌之噀之其熱被卻不得去太陽寒水之氣復與外寒相格因成寒實之證故可主以此湯無疑也經言寒實結胸無大熱者與三物小陷胸湯白散亦可服夫小陷胸之黃連與此方之巴豆寒熱天淵何堪通用想三物小陷胸湯即屬白散之藥味但有為湯為散之不同此説亦是麻仁丸麻子仁二升芍藥枳實各半斤擘大黃去皮厚朴去皮杏仁各一斤去皮尖熬別研作脂上六味為末煉蜜為丸如桐子大飲服十丸日三服漸加以利為度趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則難其脾為約麻仁丸主之按經言太陽陽明者脾約是也此與攻胃實不同故用芍藥以益陰麻杏以潤燥而大黃厚朴分兩皆從輕減服止十丸以次漸加皆示不欲遽下之意蜜煎導法方蜜七合一味納銅器中微火煎之稍凝飴狀攪之勿令焦著欲可丸並手捻作挺令頭鋭大如指長二寸許當熱時急作冷則硬以納穀道中以手急抱欲大便時乃去之按汗出矢硬何殊陽明內實之證但小便自利則津液內竭慎不可攻矣一切下劑皆在禁例誤投之則重虛其津液故宜蜜煎導而通之不從內治而從外治但使硬矢得下仍無傷於胃氣也豬膽導法大豬膽一枚瀉汁和醋少許以灌穀道中如一食頃當大便出此與蜜煎導方同義但蜜煎導借其熱勢以行津液此則於導滯之中兼寓滌熱之意微細有別土瓜導亦同此法生薑瀉心湯生薑四兩切甘草三兩炙人參三兩乾薑一兩黃芩三兩黃連一兩半夏半升洗大棗十二枚擘上八味以水一斗煮取六升去滓再煎取三升溫服一升日三服傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之按傷寒成痞多因誤下此則不因誤下而成痞皆因胃中不和太陽未盡之餘邪入而與內飲相搏結陽邪居胃之上口故心下痞硬乾噫食臭水邪居胃之下口故脅下有水氣而腹中雷鳴下利故君以生薑兩擅散邪逐飲之用而熱之格於上者用芩連之苦以瀉之寒之格於下者用乾薑半夏之溫以瀉之復以人參甘草大棗和養胃氣使邪不能犯正而痞自解以痞在心下故方以瀉心名此寒熱錯雜之邪故以寒熱錯雜之藥治之而一一對證制方之義精矣甘草瀉心湯甘草四兩黃芩乾薑各三兩黃連一兩半夏半升洗大棗十二枚擘上六味以水一斗煮取六升去滓再煎取三升溫服一升日三服傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故便硬也甘草瀉心湯主之按下利完穀腹中雷鳴是因胃中空虛心下痞硬而滿乾嘔心煩不得安是因客氣上逆若以心下痞而復下之是重犯虛虛之戒本方照生薑瀉心除去人參生薑以胃中虛不宜生薑之散以氣上逆無取人參之補但君甘草坐鎮中州使胃虛得復而痞自解耳半夏瀉心腸半夏半升洗黃連一兩乾薑甘草炙人參黃芩各三兩大棗十二枚擘上七味以水一斗煮取六升去滓再煎取三升溫服一升日三服傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡湯不中與之宜半夏瀉心湯按此即生薑瀉心湯去生薑而君半夏又屬小柴胡之變方以其證起於嘔故推半夏為主藥耳大黃黃連瀉心湯大黃二兩黃連一兩上二味以麻沸湯漬之須臾絞去滓分溫再服脈浮而緊而復下之緊反入里則作痞按之自濡但氣痞耳心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之此條柯韻伯謂按之濡當作按之硬必有當急下之證故制比峻攻之劑疑屬錯簡此説強經就我轉使作聖之靈思巧法盡行埋沒愚按經文言緊反入里里邪不能再使出表當從里解但按之不濡中挾飲邪按之自濡中不挾飲故曰但氣痞也若表邪未罷脈當尺寸俱浮今但關上浮則屬中焦痞結氣有上逆之象既曰氣痞但當順其氣本方大黃黃連分兩既輕漬以沸湯絞去滓而溫服則但取其氣不取其味使氣順而痞自解況經文本有表未解不可攻痞之條此之表解而邪入里攻痞自宜此法先聖處方妙在能用藥而不為藥用觀其服法本非急下之劑與大陷胸之用大黃小陷胸之用黃連藥雖同而制則異矣附子瀉心湯大黃二兩黃連一兩黃芩一兩附子一枚炮去皮破別煮取汁上四味㕮咀三味以麻沸湯二升漬之絞去滓納附子汁分溫再服心下痞而復惡寒汗出者附子瀉心湯主之此條柯氏於心下痞之下自添大便硬心煩不得眠八字謂惡寒者表未解不當用大黃若汗出是胃實不當用附子若汗出為亡陽不當用芩連當有大便硬心煩不得眠句始與此方相合愚按此説尤悖大凡惡寒汗不出者屬表實惡寒汗自出者屬表虛若但汗出惡寒仲景自有芍藥甘草附子湯之制今心下痞而復惡寒汗出則表虛而裡實但固表則里邪愈壅但清裡則表陽將亡故以三黃附子合而用之附子自能固表三黃自能清裡且三黃得附子其苦寒不致留滯陰邪附子得三黃其剽悍不致劫傷津液此正善用反佐之法故能以一方而全收復陽驅邪之效若必加入大便硬心煩不得眠八字以求與本方之三黃相合則本經之用大黃豈必盡為胃實而設亦有本自下利而反用大黃者至心煩不得眠安知非由胃虛客氣上逆之證亦不得概從苦寒直折且附子雄烈之性又安見與大便硬心煩不得眠者相宜柯氏膠執己見擅改經文無論其所言背謬即使見果確鑿亦當存闕疑之例況一偏之見泥藥求方使先聖極空靈極神變之活法而轉以死法求之悖甚矣余歷考前賢醫案用附子瀉心湯而愈者不一而足且余亦嘗試驗故敢直闢柯氏之謬黃連湯黃連甘草炙乾薑桂枝各三兩去皮人參二兩半夏半升洗大棗十二枚擘上七味以水一斗煮取六升去滓溫服一升日三夜二服傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之按胸中有熱則陽邪格於上故欲嘔吐胃中有邪氣則陰邪格於下故腹中痛腹中痛欲下而不得下也欲嘔吐欲吐而仍不得吐也上熱下寒法當和解方用黃連瀉胸熱乾薑散胃寒復以半夏寬中而開結佐以桂枝通陽而化陰然上徵下奪宜從中治故用人參甘草大棗建立中氣而上下之邪各隨所主之藥而分解此瀉心之變方而又與瀉心之取義不同黃芩湯黃芩三兩甘草炙芍藥各二兩大棗十二枚擘上四味以水一斗煮取三升去滓溫服一升日再夜一服太陽與少陽合病自下利者與黃芩湯按合病而至於下利則邪氣將從少陽轉陷入里故君黃芩徹少陽之熱而復以芍藥約之甘棗和之使熱清而利自止雖半表半裡之邪而里多於表故治法不從表而從里太陽陽明合病下利表證為多主葛根湯陽明少陽合病下利里證為多主承氣湯太陽少陽合病下利半里半表之證為多此方即是和法同一合病下利而主治不同何等深細黃芩加半夏生薑湯於黃芩湯方內加半夏半升洗生薑三兩余依黃芩湯服法太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯按嘔亦屬少陽證故加半夏生薑以止嘔即小柴胡加減法也乾薑黃連黃芩人參湯乾薑黃連黃芩人參各三兩上四味以水六升煮取二升去滓分溫再服傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐乾薑黃連黃芩人參主之按此證系陰格於內拒陽於外以乾薑開通陰寒芩連泄去陽熱復以人參鼓助胃氣並可助乾薑之辛溫衝開陰邪俾格開而吐自止旋覆代赭石湯旋覆花三兩代赭石一兩人參二兩生薑五兩切半夏半升洗甘草三兩炙大棗十二枚擘上七味以水一斗煮取六升去滓再煎取三升溫服一升日三服傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆代赭湯主之按心下痞硬中虛而有留邪也噫氣不除胃逆而兼蓄飲也主旋覆導飲下行代赭鎮心降逆而邪之留滯者復生薑半夏以開之氣之逆亂者用人參甘草大棗以和之虛回邪散則痞可解而噫亦止矣厚朴生薑甘草半夏人參湯厚朴半斤去皮炙生薑半斤切半夏半升洗人參一兩甘草二兩炙上五味以水一斗煮取三升去滓溫服一升日三服發汗後腹脹滿者厚朴生薑半夏人參湯主之按汗後陽虛不能化氣陰邪內結壅而為滿本方主厚朴除滿而生薑半夏人參甘草皆醒胃和脾使氣得化而滿自除矣理中丸並湯人參白朮甘草炙乾薑各三兩上四味搗篩為末蜜和為丸如雞子黃大以沸湯數合和一丸研碎溫服之日三服夜二服腹中未熱益至三四丸然不及湯方法以四物依兩數切用水八升煮取三升去滓溫服一升日三服若臍上築者腎氣動也去朮加桂四兩吐多者去朮加生薑三兩下多者還用術悸者加茯苓二兩渴欲飲水者加朮足前成四兩半腹中痛者加人參足前成四兩半寒者加乾薑足前成四兩半腹滿者去朮加附子一枚服湯後如食頃飲熱粥一升許微自溫勿揭衣被經云大病瘥後喜唾久不了了胃上有寒當以丸藥理之宜理中丸霍亂頭痛發熱身疼痛寒多不用水者宜理中湯蓋理中者理中焦之寒也寒在胃上取丸藥之暖逗遛於上以溫胃而散寒若寒勝熱之霍亂利在急溫則不宜丸而宜湯緩宜丸急宜湯此先聖之成法不可紊也再理中湯加減之法與小青龍小柴胡加減法同義宜當細玩不得草草讀過桂枝附子湯桂枝四兩去皮附子三枚炮去皮破八片生薑三兩切甘草三兩炙大棗十二枚擘上五味以水六升煮取三升去滓分溫三服傷寒八九日風濕相搏身體煩疼不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之按身體煩疼不能自轉側固屬風濕相搏之候然風濕相搏有屬濕溫有屬寒濕於何辨之蓋以證言則嘔而渴者屬溫不嘔不渴者屬寒以脈言則實而數者屬溫虛浮而澀者屬寒諦實此證此脈便可主以桂枝附子湯而無疑也徐靈胎曰此即桂枝去芍藥加附子湯但彼桂枝用三兩附子用一枚以治下後脈促胸滿之證此桂枝加一兩附子加二枚以治風濕相搏身疼脈浮澀之證一方而治病迥殊方名亦異分兩之不可忽如此義亦精矣後人何得以古方輕於加減也桂枝附子去桂加白朮湯白朮四兩甘草二兩炙附子三枚炮生薑三兩大棗十二枚上五味以水六升煮取二升去滓分溫三服初服其人身如痹半日許復服之三服盡其人如冒狀勿怪此以附術並走皮內逐水氣未得除故使之耳法當加桂四兩此本一方二法以大便硬小便自利去桂也以大便不硬小便不利當加桂附子三枚恐多也虛弱家及産婦宜減服之按前證若其人大便硬小便自利者去桂加白朮湯主之小便自利無取桂枝開膀胱而化氣恐滲泄太過重虛津液也大便硬反用白朮者以白朮能益脾而輸精也當察二便以與前方相出入附術並走皮內逐水氣未得除之先其人身如痹繼復如冒狀亦險絶矣險而穩此其立方之所以聖也藉非胸有把握安能任用附子至三枚之多而履險如夷哉四逆湯甘草二兩炙乾薑一兩半附子一枚生用去皮破八片上三味以水三升煮取一升二合去滓分溫再服強人可用大附子一枚乾薑三兩四逆者手足厥冷也方以四逆名用治三陰經吐利厥逆之寒證也乾薑溫中散寒生附驅陰復陽二味合用乃能徹上徹下開闢群陰而挽垂絶之陽復以甘草者正取其甘緩留中制雄鋭之師迅奏膚功迎陽復辟此三陰經中之第一方也經云脈浮而遲表熱裡寒下利清穀者四逆湯主之蓋下利清穀里證已急急當救里若復瞻顧表熱恐陽隨下利而亡矣此表裡緩急先後之界失治即駟馬難追急當著眼自利不渴者屬太陰以其藏有寒故也夫自利不皆屬寒自利不渴則寒證可知雖未至手足厥逆而溫中散寒當防於未然矣此太陰用四逆之大法少陰病脈沉者沉為在裡急當救里若欲吐而膈上有寒飲乾嘔者益屬陰邪上逆之象尤當從事於此湯之急溫此少陰用四逆之大法諸四逆厥者不可下之虛家亦然凡厥者陰陽氣不相順接便為厥厥者手足逆冷是也厥有寒有熱凡下利厥逆而惡寒者大汗若大下利而厥冷者則屬虛寒可知皆主是湯此厥陰宜四逆之大法又經云吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之按此二條乃寒邪直中三陰而成霍亂之證汗出惡寒手足厥冷下利清穀脈微欲絶若不急溫瞬有轉筋入腹之變此三陰通用四逆之大法四逆證具若無脈沉微惡寒等陰象雖下利而並非清穀反下重者既屬轉經之熱邪不可誤用貽禍難挽當須細辨四逆加人參湯四逆湯原方加人參一兩惡寒脈微而復利利止亡血也四逆加人參湯主之按亡血即亡津液之謂故加人參補虛以生津液也通脈四逆湯甘草二兩炙乾薑三兩強人四兩附子大者一枚生用去皮破八片上三味以水三升煮取一升二合去滓分溫再服其脈即出者愈面色赤者加蔥九莖腹中痛者去蔥加芍藥二兩嘔者加生薑二兩咽痛者去芍藥加桔梗一兩利止脈不出者去桔梗加人參二兩四逆湯為驅陰復陰之主藥此因陰盛格陽故加蔥以通其格經云少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面色赤面色赤加蔥九莖按下利清穀手足厥冷脈微欲絶而裡寒者陰盛於內也身反不惡寒面色赤而外熱者格陽於外也面色赤者加蔥九莖此通脈四逆之正法也或腹中痛者去蔥之辛散加芍藥斂脾陰而止痛或嘔者加生薑以止嘔或咽痛者去芍藥之酸斂加桔梗以清咽四逆主治其本諸加減法兼治其標若利止脈不出者去桔梗加人參即與四逆加人參湯同義至四逆證具裡寒外熱汗出而厥者此陽有立亡之象亦宜此方主治通脈四逆加豬膽汁湯於通脈四逆原方加豬膽汁半合余如前法煎成納豬膽汁溫服其脈即出吐已下斷汗出而厥四肢拘急不解脈微欲絶者通脈四逆加豬膽汁湯主之按汗出而厥四肢拘急脈微欲絶皆四逆及通脈四逆固有之證何取乎膽汁之加要其著眼全在吐已下斷四字蓋吐已下斷津液內竭投通脈四逆純陽之劑正恐格不相入故藉膽汁導引之力以和陰而復陽也乾薑附子湯乾薑一兩附子一枚生用去皮破八片上二味以水三升煮取一升去滓頓服下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑附子湯主之按下後則陰氣盛而陽已虛復發汗以散其陽則虛陽擾亂故晝日煩躁不得眠也夜而安靜非吉兆也止以入夜純陰用事而衰陽欲躁擾不能也此法不用甘草較四逆湯尤峻取其直破陰霾復還陽氣必審無嘔渴表證脈沉微身無大熱者則煩躁的為虛陽擾亂之煩躁乃可主以此方而不至誤用也獨陰自治於陰分孤陽自擾於陽分故用薑附助陽以配陰白通湯乾薑附子湯原方加蔥白四莖煎服法照前少陰病下利白通湯主之按少陰下利腎中真陽將隨下利而亡故以薑附溫腎而加蔥白以升舉下陷之真陽也白通加豬膽汁湯白通湯原方加人尿五合豬膽汁一合以水三升煮取一升去滓納豬膽汁人尿和令相得分溫再服少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之按少陰下利治用白通藥本不誤正以陰氣太甚與辛熱之藥格不相入故加人尿豬膽汁以為嚮導與通脈四逆加豬膽汁同義服湯脈暴出者乃為藥力所迫而陽氣將泄露無餘仍主死也微續乃正氣漸復故可生也茯苓四逆湯茯苓六兩人參一兩甘草二兩乾薑一兩半附子一枚生用去皮破八片上五味以水五升煮取三升去滓溫服七合日三服發汗若下之病仍不解煩躁者茯苓四逆湯主之按未經汗下而煩躁屬陽盛既經汗下後而煩躁屬陽虛且汗下之後津液告竭故於四逆湯中加茯苓以安下人參以補虛也四逆散柴胡枳實炙甘草炙芍藥上四味各十分搗篩白飲和服方寸匕日三服當歸四逆湯當歸桂枝芍藥細辛各三兩甘草炙通草各二兩大棗二十五枚上七味以水八升煎取三升溫服一升日三服此又屬血虛而致四逆者也血虛則不宜薑附重劫津液故以當歸補血為主佐以芍藥甘草大棗和陰而生津復以桂枝細辛通草通陽而溫表使陰陽之氣順接則四末溫而厥逆止按此方為亡血家設法亡血家四逆有脈細欲絶者血虛不能榮於外也有脈浮革者血虛不能固於中也同為當歸四逆湯主治當歸四逆加吳茱萸生薑湯即前方加吳茱萸二兩生薑半斤切以水六升清酒二升和煮取五升去滓溫分五服手足厥寒脈細欲絶者當歸四逆湯主之若其人內有久寒者宜當歸四逆加吳茱萸生薑湯主之按內有久寒不用幹薑附子者總因亡血家慮其劫陰召變但以吳萸生薑溫中散寒而復以清酒和之則陰陽和而手足自溫附子湯附子二枚炮茯苓三兩人參二兩白朮四兩芍藥三兩上五味以水八升煮取三升去滓溫服一升日三服按經云少陰病身體疼手足寒骨節痛脈沉者此湯主之沉為在裡只宜溫里此全以脈沉為辨又云少陰病得之一二日口中和其背惡寒者當灸之此湯主之此又以口中和為辨口中和而背惡寒則非陽邪怫鬱之惡寒乃可主以此湯而無疑此少陰病溫經散寒正治之法主附子之雄烈下消腎中之水寒上資君主之熱化人參助陽芍藥和陰茯苓利竅以逐水白朮燥濕以燠土併力溫托絶不加入一毫升散之藥但使元陽得振而病自解柯韻伯曰此與真武湯似同而實異倍朮附去生薑加人參是溫補以壯元陽真武湯還是溫散而利胃水也此辨明真武附子界限卻清甘草附子湯甘草二兩炙附子二枚炮去皮破八片白朮二兩桂枝四兩去皮上四味以水六升煮取三升去滓溫服一升日三服初服得微汗則解能食汗出復煩者服五合恐一升多者宜服六七合為始經云風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之按此段形容風濕相搏之病狀最著濕壅於經故身腫痛劇而小便不利風淫於衛故汗出短氣而惡風不欲去衣附子白朮宣太陰以驅濕甘草桂枝通太陽以散風凡風濕證大發其汗病必不解此方亦是不欲發汗之意當取微汗為佳赤石脂禹餘糧湯赤石脂一斤碎禹餘糧一斤碎上二味以水六升煮取二升去滓分三服傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹糧湯主之復利不止者當利其小便按此段經文本已自解明白利在下焦關閘盡撤急當固下焦之脫石脂餘糧固澀之品性皆重墜直走下焦攔截穀道修其關閘此以土勝水之法若復利不止則又當通支河水道以殺其下奔之勢而關閘始得完固炙甘草湯甘草四兩炙生薑二兩切桂枝三兩去皮麥冬半斤去心麻子仁半斤人參二兩阿膠二兩大棗十二枚擘生地黃一斤上九味以清酒七升水八升先煎八味取三升去滓內膠煬銷盡溫服一升日三服一名復脈湯傷寒脈結代心動悸者炙甘草湯主之按脈結代而心動悸則心悸非水飲搏結之心悸而為中氣虛餒之心悸矣經文明以結陰代陰昭揭病因證津液衰竭陰氣不交於陽已可概見君以炙甘草坐鎮中州而生地麥冬麻仁大棗人參阿膠之屬一派甘寒之藥滋陰復液但陰無陽則不能化氣故復以桂枝生薑宣陽化陰更以清酒通經隧則脈復而悸自安矣甘草乾薑湯甘草四兩炙乾薑二兩炮上二味以水三升煮取一升五合去滓分溫再服按此方系因誤用桂枝陽越於上致有厥逆咽中干煩躁吐逆譫語諸變特出此復陽救逆之法觀方中甘草倍乾薑專任其甘緩之性特微加乾薑為嚮導引陽還返於下並非資乾薑之辛熱以復陽也用者須識此意芍藥甘草湯芍藥四兩甘草四兩炙上二味以水三升煮取一升五合去滓分溫再服按陽越於上既用甘草乾薑湯以復其陽而攣急未解明是津液不榮經脈但以芍藥甘草和之而腳即伸亦正所以救桂枝之逆也此法試之頗驗不可以其平易而忽之麻黃連軺赤小豆湯麻黃二兩去節赤小豆一升連軺二兩杏仁四十枚去皮尖生薑二兩切生梓白皮一升甘草一兩炙大棗十二枚上八味以潦水一斗先煮麻黃再沸去上沫納諸藥煮取三升分溫三服半日服盡傷寒瘀熱在裡身必發黃麻黃連軺赤小豆湯主之按瘀熱在裡則傷寒之表邪亦瘀而不行內外合邪因致發黃治亦當內外並解傷寒解外仍不離麻黃杏仁甘草之成法熱瘀則不宜桂枝而改用連軺以散在經之熱更用赤小豆梓白皮以清在裡之熱而復以薑棗和之以其發黃從傷寒而來猶兼半表亦麻黃湯之變制也茵陳蒿湯茵陳蒿六兩梔子十四枚擘大黃三兩上三味以水一斗先煮茵陳減六升納二味煮取三升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯主之陽明病發熱汗出者此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴飲水漿者此為瘀熱在裡身必發黃茵陳蒿湯主之按發黃證若小便自利而發黃者屬蓄血小便不利而發黃者屬瘀熱小便不利而至渴欲飲水濕從火化也腹微滿熱瘀不行也茵陳利濕山梔降熱大黃行瘀導在裡之濕熱從小便而解而身黃自除麻黃升麻湯麻黃二兩半去節升麻一兩一分當歸一兩一分知母黃芩葳蕤各十八銖白朮石膏乾薑芍藥天冬去心桂枝茯苓甘草各六銖炙上十四味以水一斗先煮麻黃一二沸去上沫納諸藥煮取三升去滓分溫三服相去如炊三斗米頃令盡汗出愈傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利下重者為難治麻黃升麻湯主之按此條傷寒六七日陰液已傷也復經大下陽津重竭也下後陽氣陷入陰中而陰氣亦復衰竭故寸脈沉而遲陽氣既已下陷將隨下利而亡故下部脈不至以致咽喉不利唾膿血手足厥逆泄利不止種種見證皆因陽去入陰上徵下奪最為危候故稱難治本方用一派甘寒清熱之藥不嫌重復獨任麻黃升麻二味從陰分提出陽氣復以桂枝幹薑佐諸陰藥化氣生津蓋熱不清則津不復陽不升則津不固錯雜之邪以錯雜之藥解之先聖立方之精如此吳茱萸湯吳茱萸一升洗人參三兩生薑六兩大棗十二枚上四味以水七升煮取二升去滓溫服七合日三服此本溫胃之方而亦以通治厥少二陰吐利垂絶之證蓋陽明居中土食谷欲嘔土受木克胃氣垂敗按吳萸本厥陰藥茲以人參甘草大棗奠安中土而主吳萸溫中散寒以泄土中之木則嘔吐而谷可納至少陰病吐利手足逆冷煩躁欲死此因上下交徵胃氣隨吐利而將敗而厥陰更得侮其所不勝病本在腎病機在肺而主治則在胃得此劑補火生土而濁陰自退矣黃連阿膠湯黃連四兩黃芩一兩芍藥二兩阿膠三兩雞子黃二枚生用上四味以水五升先煮三物取二升去滓內膠煬盡小冷內雞子黃攪令相得溫服七合日三服少陰病得之二三日以上心中煩不得臥此真陰為邪熱煎熬故以育陰清熱為治芩連瀉熱也膠黃養陰也再佐以芍藥斂陰復液則熱清而煩自除按此條之不得臥乃熱傷陰而心腎不交也雞子黃入心阿膠入腎病本少陰自宜心腎同治桃花湯赤石脂一升一半全用一半篩末乾薑一兩粳米一升上三味以水七升煮米令熟去滓納赤石脂末方寸匕溫服七合日三服若一服愈余勿服少陰便膿血是感君火熱化奔迫太過閉藏失職關閘盡撤不急治則亡陰故取石脂乾薑之辛澀以散邪固脫加梗米以益中虛先使中氣不下墜而復以一半石脂末調服俾黏著大腸攔截穀道方以桃花名者非特色相似亦取晹谷春回之意也半夏散並湯半夏洗桂枝去皮甘草炙上三味等分各別搗篩已合治之白飲和服方寸匕日三服若不能散服者以水一升煎七沸內散兩方寸匕更煎三沸下火令小冷少少咽之少陰病咽中痛半夏散及湯主之按少陰咽痛大都上熱下寒不宜寒涼直折本方用半夏開痰桂枝散邪復甘草以緩其急使無劫液之虞能咽者用散不能咽者用湯須令小冷少少咽之此病在上者但治其上不欲其犯及中下也豬膚湯豬膚一斤上一味以水一斗煮取五升去滓加白蜜一升白粉五合熬香和令相得溫分六服少陰病下利咽痛胸滿心煩者豬膚湯主之按下利咽痛有陰盛而陽格於上者治以驅陰復陽若通脈四逆加桔梗是也有陰虛而液不上蒸者治宜育陰復液若本方豬膚湯是也腎液既從下溜而不上蒸則陰火充斥因致煩滿故以豬膚滋腎臟之液而緩以白蜜白粉留戀中焦輸精布液以解其上徵下奪之危喻嘉言曰豬膚與用黑驢皮之意頗同若以燖豬皮外毛根薄膚則蘞劣無力且與熬香之説不符但用外皮去其內層之肥白為是甘草湯甘草二兩上一味以水三升煮取一升五合去滓溫服七合日二服少陰病二三日咽痛者可與甘草湯按咽痛而不下利得病只二三日是邪熱客於少陰之標也少陰咽痛總不宜苦寒直折故但取甘草之甘以緩腎急而制火邪也桔梗湯桔梗一兩甘草二兩上二味以水三升煮取一升去滓分溫再服少陰病二三日咽痛者與甘草湯不瘥既得甘緩之力而經氣尚阻而不通仍用本方加桔梗一兩載藥上浮成開邪利咽之功苦酒湯半夏十四枚雞子一枚去黃上二味納半夏著苦酒中以雞子殼置刀環中安火上令三沸去滓少少含咽之不瘥更作三劑少陰病咽中傷生瘡不能語言聲不出者苦酒湯主之諦實咽痛之屬少陰病始而痛者繼且咽中傷生瘡矣不能語言聲不出則陰火沸騰並舌本亦強矣半夏雞子消痰利咽二味並用俾半夏無燥液劫津之慮雞子得通聲利竅之功而消腫斂瘡更有藉於苦酒之斂降其煎法服法總使其逗遛病所妙義天開真令人不可思議烏梅丸烏梅三百個人參六兩當歸四兩黃連一斤黃柏六兩蜀椒四兩炒去汁桂枝六兩乾薑十兩附子八兩炮細辛六兩上十味各搗篩合治之以苦酒浸烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得納臼中與蜜杵二千下丸如梧桐子大先食飲服十丸日三服稍加至二十丸禁生冷滑物臭食等經云傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為藏厥非蛔厥也蛔厥者其人當吐蛔今病者靜而復時煩者此為藏寒蛔上入其膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之又主久利按此方主治蛔厥其妙處全在米飯和蜜先誘蛔喜及蛔得之而烏梅及醋之酸椒薑桂附及細辛之辛黃柏黃連之苦則蛔不堪而伏矣但厥後氣血不免擾亂故加人參當歸奠安氣血此方雖寒熱錯雜但溫藏之力居多又得烏梅之酸澀以固脫故又主久利白頭翁湯白頭翁二兩黃連黃柏秦皮各三兩上四味以水七升煮取二升去滓溫服一升不愈再服一升按此方寒以勝熱苦以堅陰用治熱利下重欲飲水者蓋下重則熱邪奔迫欲飲水則津液為熱所傷矣或通或澀皆所不宜但清其熱而利自止竹葉石膏湯竹葉二把石膏一斤半夏半升洗人參三兩麥冬一升去心甘草二兩炙粳米半升上七味以水一斗煮取六升去滓納粳米煮米熟湯成去米溫服一升日三服傷寒解後虛羸少氣氣逆欲吐者竹葉石膏湯主之按此係肺胃之津液因病熱而受傷故主此方滋養肺胃以復陰氣而清餘熱石膏竹葉之辛涼得人參麥冬甘草粳米以相輔便為益胃生津之品因氣逆欲吐微加半夏以平逆氣此愈得調理之法其靈警有如此者牡蠣澤瀉湯牡蠣熬澤瀉蜀漆洗盡腥栝蔞根葶藶子熬海藻洗去鹽商陸根熬以上各等分上七味異搗下篩為散更入臼中杵之白飲和方寸匕小便處止後服大病瘥後從腰以下有水氣者牡蠣澤瀉散主之按大病瘥後津液已傷而從腰以下有水氣是水蓄於陰分也水蓄陰分非咸不降故以牡蠣澤瀉海藻鹹寒之性入陰軟堅而加蜀漆以通經隧葶藶商陸以逐水邪復以栝蔞根於潤下導滯之中回護津液為散服者亦以病後當從緩治也燒裩散上取婦人中裩近隱處剪燒灰以水和服方寸匕日三服小便即利陰頭微腫即愈婦人病取男子裩當燒灰經云傷寒陰陽易之為病其人身體重少氣少腹裡急或引陰中拘攣熱上衝胸頭重不欲舉眼中生花膝脛拘急者此方主之按大病新瘥餘邪未盡強合陰陽二氣交感互易為病推其病本感從前陰而入仍當導其邪使驅從前陰而出故必小便利而始愈方中單用燒裩一味取其氣之所感以類相從古所傳禁方有令人不可思議者大率類是
