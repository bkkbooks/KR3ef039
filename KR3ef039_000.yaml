front:
  text: 序余既為呂君𣗪村作傳從其子小𣗪茂才索君遺箸得內經要論一卷傷寒尋源三卷受而讀之因憶與君交念年輒能倣佛君況君治病之暇好飲酒善奕棋余常過君几上縱橫殘帙一編爛然則所箸傷寒尋源也床頭越釀一甕旁幾楸枰一奩二奕友見客至輒避去窗半破風吹有聲短童發鬅鬙侍側室中懶不治日惟孜孜箸書是三卷上下二卷皆成書中卷詳諸證候猶有未備蓋未竟作也君之驅使草木如其奕下子無一間著而其嗜醫殆甚於其嗜酒技也而進於道宜哉夫三墳言道書闕有間唐令列醫學付之執技之流薦紳先生罕言之去古日遠説益淆雜人命至重可為寒心君是書庶不背古亟為檢校以行於世要論一卷尚俟續刊咸豐甲寅長夏吳縣潘遵祁識自序醫學始於內經而仲景傷寒論實為羽翼內經之書內經闡發天人奧旨非尋常能測其涯涘仲景就人一身之表裡腑臟推闡陰陽搜抉病機此以人道合天道使學者有切實下手工夫不止為傷寒立法也而其書以傷寒命名者蓋以病之最繁而善變者莫如傷寒傷寒及雜證總在六經上辨認能解得六經辨證之法雖繁劇如傷寒尚不為多岐所眩而雜症即一以貫之故學醫者必從此問津乃不迷於所行惜其書散亡於兵燹之餘經王叔和裒輯成帙後之學者墨守叔和序例之説以為凡傷寒之病多從風寒得之殊不知傷寒不必盡屬寒因若風若濕若溫若熱皆統轄於傷寒二字內仲景大法井井本有矩矱可循特以序次錯綜必待善悟者觸類旁通方能得其神髓淺嘗之輩未經深求於是執麻黃桂枝治風寒之成法而概施之於溫熱病誤矣及其既誤遂謂仲景之法宜於風寒不宜溫熱於是談溫熱者接踵而起補方造論非無可採然舍仲景而言溫熱究屬一家之論必仍向仲景討根源而傷寒之面目始全僕究心仲景書二十餘年差有心得因將仲景引而不發言下躍如之旨一一拈出分為三編首編辨明風寒濕溫熱源流及六經種種辨證諸法次將各證辨別疑似疏為中編後將制方精義疏為下編探歷聖之淵源綜諸家之得失理必求其至當言匪涉於無稽仲景自序有云若能尋余所集雖不能盡愈諸病庶可以見病知源爰名是編曰傷寒尋源俾及門諸子得藉是以為讀仲景書之津梁於醫事亦不無小補云道光三十年歲次庚戌冬日錢唐呂震名撰
